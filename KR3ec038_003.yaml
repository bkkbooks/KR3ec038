body:
  text: 䕡茹瀉破血辛寒有小毒蝕惡肉排膿血殺疥蟲除熱痹破癥瘕內經同烏賊骨治婦人血枯根如萊蔔皮黃肉白葉長微闊折之有汁結實如豆一顆三粒甘草為使庵䕡子瀉行水散血苦辛微寒別録微溫入肝經血分行水散血散中有補治陽痿經澀腰膝骨節重痛産後血氣作痛閃銼折傷撲打方多用之能制蛇見之則爛葉似菊而薄莖似艾而粗薏苡為使鬱金宣行氣解鬱瀉泄血破瘀辛苦氣寒純陽之品其性輕揚上行入心及包絡兼入肺經涼心熱散肝鬱下氣破血行滯氣亦不損正氣破瘀血亦能生新血治吐衄尿血婦人經脈逆行經不下行上為吐衄諸症用鬱金末加韭汁薑汁童便服其血自清痰中帶血者加竹瀝血氣諸痛産後敗血攻心癲狂失心癲多喜笑尚知畏懼證屬不足狂多忿怒人莫能制證屬有餘此病多因驚憂瘀血塞於心竅所致鬱金七兩白礬三兩米糊丸服名白金丸鬱金入心散惡血明礬化頑痰故也痘毒入心鬱金一兩甘草二錢半煮乾焙研末冰片五分每用一錢加豬血五七滴新汲水下治斑痘始有白泡忽搐入腹紫黑無膿下蠱毒同升麻服不吐則下出川廣體鋭圓如蟬肚外黃內赤色鮮微香味苦帶甘者真市人多以薑黃僞之薑黃瀉破血行氣苦辛本草大寒藏器大明曰熱色黃入脾兼入肝經理血中之氣下氣破血除風消腫功力烈於鬱金治氣脹血積産後敗血攻心通月經療撲損片子者能入手臂治風寒濕痹血虛臂痛者勿用時珍曰入臂治痛其兼理血中之氣可知出川廣陳藏器曰鬱金苦寒色赤薑黃辛溫色黃術味苦色青三物不同所用各別經疏曰薑黃主治介乎三稜鬱金之間時珍曰薑黃鬱金莪朮形狀不同大略相近但鬱金入心專治血薑黃入脾兼治血中之氣術入肝治氣中之血稍為不同今時以扁如乾薑者為片子薑黃圓如蟬腹者為蟬肚鬱金並可染色術形雖似鬱金而色不黃也蓬莪朮瀉破血行氣消積辛苦氣溫入肝經血分破氣中之血能通肝經聚血消瘀通經開胃化食解毒止痛治心腹諸痛冷氣吐酸奔豚痃癖酒醋磨服痃音賢小腹積痃癖多見於男子癥瘕多見於婦人莪朮香烈行氣通竅同三稜用治積聚諸氣良按五積心積曰伏梁起臍上至心下肝積曰肥氣在左脅肺積曰息賁在右脅脾積曰痞氣在胃脘右側腎積曰奔豚在小腹上至心下治之不宜專用下藥恐損真氣宜於破血行氣藥中加補脾胃藥氣旺方能磨積正旺則邪自消也經曰大積大聚其可犯也哀其大半而止過者死東垣五積方用三稜莪朮皆兼人參贊助成功按治積諸藥神麯麥芽化穀食萊蔔化麵食硇砂阿魏山查化肉食紫蘇化魚蟹毒葛花枳椇消酒積麝香消酒積果積芫花牽牛大戟行水飲三稜莪朮鱉甲消癥瘕木香檳榔行氣滯礞石蛤粉功痰積巴豆攻冷積大黃芒硝攻熱積雄黃膩粉攻涎積虻蟲水蛭攻血積雖為泄劑亦能益氣王好古曰故治氣短不能接續大小七香丸積香丸諸湯散中多用之根如生薑莪生根下似卵不齊堅硬難搗灰火煨透乘熱搗之入氣分或醋磨酒磨或煮熟用入血分荊三稜瀉行氣破血消積苦平色白屬金皮黑肉白入肺金血分破血中之氣亦通肝經聚血兼入脾經散一切血瘀氣結瘡硬食停老塊堅積乃堅者削之從血藥則治血從氣藥則治氣須輔以健脾補氣藥良昔有人患癥瘕死遺言開腹取之得病塊如石文理五色削成刀柄因砍三稜柄消成水乃知此藥可療癥瘕消腫止痛通乳墮胎功近香附而力峻虛者慎用色黃體重若鯽魚而小者良醋浸炒或麵裹煨白茅根瀉火補中止血止噦甘寒入手少陰心足太陰陽明脾胃補中益氣除伏熱消瘀血利小便解酒毒治吐衄諸血心肝火旺逼血上行則吐血肺火盛則衄血茅根甘和血寒涼血引火下降故治之撲損瘀血搗汁服名茅花湯亦治鼻衄産淋血閉寒熱血瘀則閉閉則寒熱作矣淋瀝崩中血熱則崩傷寒噦逆即厄逆說文曰噦氣牾也東垣作乾嘔之甚者未是肺熱喘急內熱煩渴黃疸水腫清火行水時珍曰良藥也世人以微而忽之惟事苦寒之劑傷沖和之氣烏足知此哉茅針潰癰癤酒煮服一針潰一孔二針潰二孔口瘡之神藥角蒿蘆根瀉熱止嘔甘益胃寒降火治嘔噦反胃胃熱火升則嘔逆食不下金匱方蘆根煎服消渴客熱傷寒內熱止小便數肺為水之上源脾氣散精上歸於肺始能通調水道下輸膀胱腎為水臟而主二便三經有熱則小便數甚至不能少忍火性急速故也蘆中空故入心肺清上焦熱熱解則肺之氣化行而小便復其常道矣能解魚蟹河豚毒取迸水肥厚者去須節用苧根瀉熱散瘀甘寒而滑補陰破瘀解熱潤燥治天行熱疾大渴大狂胎動下血諸淋血淋搗貼赤遊丹毒癰疽發背金瘡折傷止血易痂雞魚骨哽搗如龍眼雞骨雞湯下魚骨魚湯下汁能化血為水苧皮與産婦作枕止血運安腹上止産後腹痛散瘀之功漚苧汁療消渴薔薇根瀉濕熱苦澀而冷入胃大腸經除風熱濕熱生肌殺蟲治泄痢消渴牙痛口糜煎汁含漱遺尿好眠癰疽瘡癬花有黃白紅紫數色以黃心白色粉紅者入藥子名營實酸溫主治略同千金曰薔薇根角蒿口瘡之神藥角蒿所在多有開淡紅紫花角微彎長二寸許辛苦有小毒治惡瘡有蟲及口齒瘡芭蕉根瀉熱味甘大寒治天行熱狂煩悶消渴産後血脹並搗汁服塗癰腫結熱為末油調敷霜後者佳大黃大瀉血分濕熱下有形積滯大苦大寒入足太陰脾手足陽明厥陰大腸胃心包肝血分其性浮而不沉其用走而不守若酒浸亦能引至高之分仲景太陽門調胃承氣湯大黃注曰酒浸陽明門大承氣湯大黃注曰酒洗少陽陽明小承氣湯大黃不用酒製皆有分別東垣曰邪氣在上非酒不至若用生者則遺至高之邪熱病愈後或目赤喉痹頭痛膈上熱疾生也用以蕩滌腸胃下燥結而除瘀熱治傷寒時疾發熱譫語大腸有燥糞故譫語宜下之譫音占溫熱瘴瘧下痢赤白腹痛裡急黃疸水腫癥瘕積聚積久成形謂之積屬陰聚散無常謂之聚屬陽積多是血或食或痰聚多是氣留飲宿食心腹痞滿二便不通皆土鬱奪之吐血衄血血閉血枯損傷積血一切實熱血中伏火行水除痰蝕膿消腫能推陳致新然傷元氣而耗陰血下多亡陰若病在氣分胃虛血弱人禁用病在氣分而用之是為誅伐無過東垣曰能推陳致新如定禍亂以致太平所以有將軍之號時珍曰仲景瀉心湯治心氣不足吐衄血者用大黃黃連黃芩乃瀉心包肝脾胃四經血中之伏火也又治心下痞滿按之軟者用大黃黃連瀉心湯亦瀉脾胃之濕熱非瀉心也病發於陰而反下之則痞滿乃寒傷營血邪結上焦胃之上脘當心故曰瀉心經曰太陰所至為痞滿又曰濁氣在上則生䐜脹是已病發於陽而反下之則結胸乃熱邪陷入血分亦在上脘故大陷胸湯丸皆用大黃亦瀉脾胃血分之邪而降其濁氣也若結胸在氣分只用小陷胸湯痞滿在氣分只用半夏瀉心湯或問心氣不足而吐衄何以不補心而反瀉心丹溪曰少陰不足亢陽無輔致陰血妄行故用大黃瀉其亢甚之火又心本不足肝肺各受火邪而病作故用黃芩救肺黃連救肝肺者陰之主肝者心之母血之合也肺肝火退則血歸經而自安矣寇宗奭曰以苦泄其熱就以苦補其心蓋一舉而兩得之李士材曰古人用大黃治虛勞吐衄意甚深微蓋濁陰不降則清陽不生瘀血不去則新血不生也川産錦紋者良有酒浸酒蒸生熟之不同生用更峻黃芩為使欲取通利者不得驟進穀食大黃得穀食便不能通利耳夷堅志湯火傷者搗生大黃醋調敷止痛無瘢黃芩瀉火除濕苦入心寒勝熱瀉中焦實火除脾家濕熱治澼痢腹痛便血曰澼寒痛忌用凡腹痛有寒熱虛實食積瘀血痰濕之不同寒宜溫熱宜清虛宜補實宜下食宜消導瘀血宜行散痰濕宜化痰利濕痛時手不可按者為實痛按之痛止者為虛痛寒熱往來邪在少陽黃疸五淋血閉實熱在血分氣逆癰疽瘡瘍及諸失血消痰丹溪以黃芩降痰假其降火也按痰因火動當先降火利水解渴安胎胎孕宜清熱涼血血不妄行則胎安養陰退陽補膀胱水酒炒則上行瀉肺火利胸中氣肺主氣熱傷氣瀉熱所以保肺治上焦之風熱濕熱丹溪曰黃芩上中二焦藥火嗽喉腥五臭肺為腥目赤腫痛過服損胃血虛寒中者禁用得柴胡退寒熱得芍藥治痢得厚朴黃連止腹痛得桑皮瀉肺火得白朮安胎之聖藥時珍曰仲景治少陽證小柴胡湯太陽少陽合病下利黃芩湯少陽證下後心滿瀉心湯並用之蓋黃連苦寒入心瀉熱除脾家濕熱使胃火不流入肺不致刑金即所以保肺也肺虛不宜者苦寒傷土損其母也少陽證雖在半表半裡而心膈痞滿實兼心肺上焦之邪心煩喜嘔默默不欲食又兼脾胃中焦之證故用黃芩以治手足少陽相火黃芩亦少陽藥也楊士瀛曰柴胡退熱不及黃芩時珍曰柴胡乃苦以發之散火之標也黃芩乃寒能勝熱折火之本也東垣治肺熱身如火燎煩燥引飲而晝盛者宜一味黃芩湯以瀉肺經氣分之火黃芩一兩煎服本事方用治崩中暴下黃明者良中虛名枯芩即片芩瀉肺火清肌表之熱內實名條芩即子芩瀉大腸火補膀胱水上行酒炒瀉肝膽火豬膽汁炒山茱萸龍骨為使畏丹皮丹砂黃連瀉火燥濕大苦大寒入心瀉火王海藏曰瀉心實瀉脾也實則瀉其子鎮肝涼血凡治血防風為上部之使黃連為中部之使地榆為下部之使燥濕開鬱解渴單用能治消渴除煩益肝膽厚腸胃消心瘀能去心竅惡血止盜汗涼心治腸澼瀉痢便血曰澼有臟連丸濕熱鬱而為痢黃連治痢要藥噤口者熱壅上焦同人參煎湯呷之但得下咽便好喻嘉言曰下痢必先汗解其外後調其內首用辛涼以解表次用苦寒以攻裡機要云後重宜下腹痛宜和身重宜除濕脈弦宜去風風邪內結宜汗身冷自汗宜溫膿血稠黏宜重劑以竭之下痢赤屬血分白屬氣分戴氏曰俗謂赤熱白寒者非也通作濕熱處治但有新久虛實之分痞滿燥濕開鬱張仲景治九種心下痞五等瀉心湯皆用之腹痛清熱心痛伏梁心積目痛眥傷人乳浸點或合歸芍等分煎湯熱洗散熱活血癰疽瘡疥諸痛癢瘡皆屬心火酒毒胎毒小兒初生合甘草為末蜜調令咽之明目傳信方羊肝一具黃連一兩搗丸名羊肝丸凡是目疾皆治定驚鎮肝止汗解毒除疳同豬肝蒸為丸殺蛔蛔得苦則伏虛寒為病者禁用久服黃連苦參反熱從火化也昂按炎上作苦味苦必燥燥則熱矣旦苦寒沉陰肅殺伐傷生和之氣也韓𢘅曰黃連與肉桂同行能交心腎於頃刻時珍曰治痢用香連丸姜連丸用黃連乾薑薑黃散用黃連生薑左金丸用黃連吳茱萸治口瘡用黃連細辛止下血用黃連大蒜一陰一陽寒因熱用熱因寒用最得制方之妙出宜州者粗肥出四川者瘦小狀類鷹爪連珠者良去毛治心火生用虛火醋炒肝膽火豬膽汁炒上焦火酒炒有吞酸嘈雜等證亦有吐酸者名酢心宜黃連吳茱萸降火開鬱酢音醋中焦火薑汁炒下焦火鹽水或童便炒食積火黃士炒治濕熱在氣分吳茱萸湯炒在血分乾漆水炒點眼赤人乳浸時珍曰諸法不獨為之引導蓋辛熱制其寒苦鹹寒制其燥性用者詳之黃芩龍骨為使惡菊花玄參殭蠶白鮮皮畏款冬牛膝忌豬肉時珍曰方有臟連丸黃連豬肚丸豈忌肉而不忌臟腑乎殺烏頭巴豆毒黃連瀉心火佐以龍膽瀉肝膽火白芍瀉脾火石膏瀉胃火知母瀉腎火黃柏瀉膀胱火木通瀉小腸火黃芩瀉肺火梔子佐之瀉大腸火黃連佐之柴胡瀉肝膽火黃連佐之瀉三焦火黃芩佐之鄭奠一曰兀兀欲吐用黃連數分甚效胡黃連瀉熱療驚疳苦寒去心熱益肝膽厚腸胃治骨蒸勞熱五心心窩左右手心足心煩熱三消渴而多飲為上消肺熱也心移熱於肺傳為膈消是也多食善飢為中消胃熱也痹成為消中是也渴而小便數有膏為下消腎熱而水虧也五痔牝痔牡痔脈痔腸痔血痔濕熱下流傷血分無所施泄則逼肛門而為痔腫溫瘧瀉痢女人胎蒸消果子積為小兒驚疳良藥朱二允曰解吃煙毒合茶服之甚效性味功用同黃連故名出波斯國今秦隴南海亦有之心黑外黃折之塵出如煙者真畏惡同黃連苦參瀉火燥濕補陰苦燥濕寒勝熱沉陰主腎補陰益精養肝膽安五臟濕熱去則血氣和平而五臟自安利九竅生津止渴明目止淚淚為肝熱治溫病血痢純下清血者風傷肝也宜散風涼血下如豆汁者濕傷脾也宜清熱滲濕腸風溺赤黃疸酒毒熱生風濕生蟲又能祛風逐水殺蟲治大腸疥癩然大苦大寒肝腎虛而無熱者勿服張從正曰凡藥皆毒也雖苦參甘草不可不謂之毒久服必偏勝為患經曰五味入胃各歸其所喜攻久而增氣物化之常也氣增而久夭之由也王冰注曰氣增不已則臟有偏勝偏勝則臟有偏絶故令人暴夭筆談曰久用苦參擦牙遂病腰痛由其氣傷腎也經又曰大毒治病十去其六常毒治病十去其七小毒治病十去其八無毒治病十去其九穀肉果菜食養盡之無使過之傷其正也按人參補脾沙參補肺紫參補肝丹參補心玄參補腎苦參不在五參之內然名參者皆補也藥能醫病不能養人食能養人不能醫病糯米泔浸去腥氣蒸用玄參為使惡貝母菟絲子漏蘆反藜蘆苦參一兩或酒煎或醋煮能吐天行時毒知母瀉火補水潤燥滑腸辛苦寒滑上清肺金而瀉火瀉胃熱膀胱邪熱腎命相火下潤腎燥而滋陰入二經氣分黃柏入二經血分故二藥必相須而行消痰定嗽止渴安胎莫非清火之用治傷寒煩熱蓐勞産勞骨蒸退有汗之骨蒸燥渴虛煩久瘧下痢治嗽者清肺火也治渴者清胃熱也退骨蒸者瀉腎火也利二便消浮腫小便利則腫消東垣曰熱在上焦氣分結祕而渴乃肺中伏熱不能生水膀胱絶其化源宜用滲濕之藥瀉火清金滋水之化源熱在下焦血分便閉而不渴乃真水不足膀胱乾涸無陰則陽無以化宜用黃柏知母大苦寒之藥滋腎與膀胱之陰而陽自化小便自通丹溪曰小便不通有熱有濕有氣結於下宜清宜燥宜升又有隔二隔三之治如肺不燥但膀胱熱宜瀉膀胱此正治如因肺熱不能生水則清肺此隔二之治如因脾濕不運而精不上升故肺不能生水則燥胃健脾此隔三之治瀉膀胱黃柏知母之類清肺車前茯苓之類燥脾二術之類昂按凡病皆有隔二隔三之治不獨便閉也然苦寒傷胃而滑腸多服令人瀉李士材曰苦寒肅殺非長養萬物者也世以其滋陰施之虛損之人則如水益深矣特表出以為戒得酒良上行酒浸下行鹽水拌忌鐵龍膽草瀉肝膽火下焦濕熱大苦大寒沉陰下行益肝膽而瀉火相火寄於肝膽有瀉無補瀉其邪熱即所以補火也兼入膀胱腎經除下焦之濕熱與防己同功酒浸亦能外行上行治骨間寒熱腎主骨驚癇邪氣肝經風火時氣溫熱熱痢疸黃寒濕腳氣足傷濕熱則成腳氣腫而痛者為濕腳氣宜清熱利濕搜風又有攣縮枯細痛而不腫者名乾腳氣宜養血潤燥咽喉風熱赤睛胬肉瀉肝膽火能明目元素曰柴胡為主龍膽為使目疾要藥昂按若目疾初起宜發散忌用寒涼癰疽瘡疥過服損胃甘草水浸一宿曝用小豆貫衆為使忌地黃青黛瀉肝散鬱火鹹寒色青瀉肝散五臟鬱火解中下焦蓄蘊風熱衍義曰一婦患臍腹二陰遍生濕瘡熱癢而痛出黃汁二便澀用鰻鱺松脂黃丹之類塗之熱痛愈甚其婦嗜酒喜食魚蝦發風之物乃用馬齒莧四兩研爛入青黛一兩和塗熱痛皆去仍服八正散而愈此中下焦蓄蘊風熱毒氣若不出當作腸風內痔婦不能禁酒物果仍發痔治傷寒發斑吐咯血痢陰虛火炎者忌用合杏仁研置柿餅中煨食名聖餅子治咯血小兒驚癇疳熱丹熱敷癰瘡蛇犬毒即靛花取嬌碧者水飛淨用內多石灰故須淘淨大青瀉心胃熱毒微苦鹹大寒解心胃熱毒治傷寒時疾熱狂陽毒發斑熱甚傷血裡實表虛則發斑輕如疹子重如錦紋紫黑者熱極而胃爛也多死活人書治赤斑煩痛有犀角大青湯黃疸熱痢丹毒喉痹處處有之高二三尺莖圓葉長葉對節生八月開小紅花成簇實大如椒色赤用莖葉牽牛大瀉氣分濕熱辛熱有毒屬火善走入肺經瀉氣分之濕熱肺主氣火能平金而泄肺能達右腎命門走精隧通下焦郁遏及大腸風祕氣祕利大小便逐水消痰殺蟲墮胎治水腫喘滿痃癖氣塊若濕熱在血分胃弱氣虛人禁用東垣曰牽牛苦寒誤矣其味辛辣久嚼猛烈雄壯所謂苦寒安在哉乃瀉氣之藥比諸辛藥泄氣尤甚若濕從下受下焦主血血中之濕宜苦寒之味而反用辛熱之藥泄上焦之氣是血病瀉氣使氣血俱損也王好古曰以氣藥引則入氣以大黃引則入血時珍曰一婦腸結年幾六十服養血潤燥藥則泥結服硝黃藥則若罔知如此三十餘年其人體肥膏梁而多郁日吐酸痰乃寬此乃三焦氣滯有升無降津液皆化為痰不能下潤腸腑非血燥也潤劑留滯硝黃入血不能入氣故無效用牽牛為末皂角膏丸才服便通外甥素多酒色病二便不通脹痛呻吟七晝夜用通利藥不效豫言此乃濕熱之邪在精道壅隧路病在二陰之間故前阻小便後阻大便病不在大腸膀胱也用楝實茴香穿山甲諸藥倍牽牛三服而平東垣補下焦陽虛天真丹用牽牛鹽水炒黑佐沉香杜仲肉桂破故紙諸藥深得補瀉兼施之妙有黑白二種黑者亦名黑醜力速取子淘去浮者舂去皮用得木香乾薑良此藥漢前未入本草故仲景方中無此別録始載之宋後始多用者防己通行水瀉下焦血分濕熱大苦大寒本經平別録溫太陽膀胱經藥能行十二經通腠理利九竅瀉下焦血分濕熱為療風水之要藥治肺氣喘嗽水濕熱氣諸癇降氣下痰濕症腳氣足傷寒濕為腳氣寒濕鬱而為熱濕則腫熱則痛防己為主藥濕加苡仁蒼朮木瓜木通熱加芩柏風加羌活萆薢痰加竹瀝南星痛加香附木香活血加四物大便祕加桃仁紅花小便祕加牛膝澤瀉痛連臂加桂枝威靈仙痛連脅加膽草又有足跟痛者屬腎虛不與腳氣同論水腫風腫癰腫惡瘡或濕熱流入十二經致二陰不通者非此不可然性險而健陰虛及濕熱在上焦氣分者禁用十劑曰通可去滯通草防己之屬是也通草即木通是徐之才亦以行水者為通與燥劑無以別矣木通甘淡瀉氣分濕熱防己苦寒瀉血分濕熱本集以行水為通劑改熱藥為燥劑出漢中根大而虛通心有花紋色黃名漢防己黑點黃腥木強者名木防己不佳陳藏器曰治風用木防己治水用漢防己酒洗用惡細辛畏萆薢葶藶大瀉氣祕通行水辛苦大寒屬火性急大能下氣行膀胱水腫中水氣膹急者非此不能除破積聚癥結伏留熱氣消腫除痰止嗽定喘水濕泛溢為腫脹為痰嗽為喘滿通經利便久服令人虛十劑曰泄可去閉葶藶大黃之屬是也大黃泄陰分血閉葶藶泄陽分氣閉氣味俱厚不減大黃然有甜苦二種甜者性緩苦者性急泄肺而傷胃宜大棗輔之仲景有葶藶大棗瀉肺湯治肺氣喘急不得臥昂按輔以大棗補土所以制水子如黍米微長色黃合糯米微炒去米用得酒良榆皮為使甘遂大通瀉經隧水濕苦寒有毒能瀉腎經及隧道水濕直達水氣所結之處以攻決為用為下水之聖藥仲景大陷腸湯用之主十二種水大腹腫滿名水蠱喻嘉言曰腎為水穀之海五臟六腑之源脾不能散胃之水精於肺而病於中肺不能通胃之水道於膀胱而病於上腎不能司胃之關時其輸泄而病於下以致積水浸淫無所底止腎者胃之關也前陰利水後陰利谷王好古曰水者脾肺腎三經所主有五臟六腑十二經之部分上頭面中四肢下腰腳外皮膚中肌肉內筋骨脈有尺寸之殊浮沉之別不可輕瀉當知病在何經何臟方可用之按水腫有痰裹食和瘀血致清不升濁不降而成者有濕熱相生隧道阻塞而成者有燥熱衝擊祕結不通而成者證屬有餘有服寒涼傷飲食中氣虛衰而成者有大病後正氣衰憊而成者有小便不通水液妄行脾莫能制而成者證屬不足宜分別治之然其源多由中氣不足而起丹溪曰水病當以健脾為主使脾實而氣運則水自行宜參苓為君視所挾證加減苟徒用利水藥多致不救瘕疝積聚留飲宿食痰迷癲癇虛者忌用皮赤肉白根作連珠重實者良麵裹煨熟用或用甘草薺苨汁浸三日其水如墨以清為度再麵裹煨瓜蒂為使惡遠志反甘草張仲景治心下留飲與甘草同用取其相反以立功也有治水腫及腫毒者以甘遂末敷腫處濃煎甘草湯服之其腫立消二物相反感應如此大戟大瀉通臟腑水濕苦寒有毒能瀉臟腑水濕行血發汗利大小便治十二種水腹滿急痛積聚癥瘕頸腋癰腫風毒腳腫通經墮胎誤服損真氣時珍曰痰涎為物隨氣升降無處不到入心則迷成癲癇入肺則塞竅為咳喘背冷入肝則脅痛乾嘔寒熱往來入經絡則麻痹疼痛入筋骨則牽引隱痛入皮肉則瘰癧癰腫陳無擇並以控涎丹主之殊有奇效此乃治痰之本痰之本水也濕也得氣與火則結為痰大戟能泄臟腑水濕甘遂能行經絡水濕白芥子能散皮裡膜外痰氣惟善用者能收奇功也又曰錢仲陽謂腎為真水有補無瀉復云痘症變黑歸腎者用百祥膏下之非瀉腎也瀉其腑則臟自不實腑者膀胱也百祥惟大戟一味能行膀腕之水故也竅謂非獨瀉腑乃腎邪實而瀉肝也實則瀉其子大戟浸水青緑肝膽之色也痘症毒盛火熾則水益涸風挾火勢則土受虧故津液內竭不能化膿而成黑陷之證瀉其風火之毒所以救腎扶脾也昂按瀉心乃所以補心瀉腎即所以救腎邪熱退則真陰復矣機要用大戟一兩棗三枚同煮焙乾去戟用棗丸服名棗變百祥丸杭産紫者為上北産白者傷人漿水煮去骨用得大棗則不損脾畏菖蒲反甘草商陸大通行水苦寒有毒諸家辛酸時珍苦寒沉陰下行與大戟甘遂同功療水腫脹滿腫屬脾脹屬肝腫則陽氣猶行如單脹而不腫者名臌脹為木橫剋土難治腫脹朝寬暮急為血虛朝暮俱急為氣血兩虛腫脹由心腹而散四肢者吉由四肢而入心腹者危男自下而上女自上而下皆難治瘕疝癰腫喉痹不通薄切醋炒塗喉中良濕熱也病瀉蠱毒敷惡瘡墮胎孕令人見鬼神取花白者根赤者傷人只堪貼臍入麝三分搗貼小便利則腫消黑豆湯浸蒸用得蒜良芫花大通行水苦寒有毒去水飲痰癖療五水在五臟皮膚脹滿喘急痛引胸脅咳嗽瘴瘧五水者風水皮水正水石水黃汗也水積胸中堅滿如石名石水汗如柏汁名黃汗久不愈必致癰膿時珍曰仲景治傷寒太陽證表未解心下有水而咳乾嘔發熱或喘或利者小青龍湯主之表已解有時頭痛汗出惡寒心下有水乾嘔痛引兩脅或喘或嗽者十棗湯主之蓋青龍散表邪使水從汗出內經所謂開鬼門也十棗逐里邪使水從兩便出內經所謂潔淨府去陳莝法也十棗湯芫花甘遂大戟等分棗十枚葉似柳二月開花紫碧色葉生花落陳久者良醋煮過水浸曝用根療疥可毒魚反甘草鬥訟者取葉擦皮膚輒作赤腫假傷以誣人蕘花大通行水辛散結苦泄熱行水捷藥主治略同芫花澤漆通行水辛苦微寒消痰退熱止嗽殺蟲利大小腸治大腹水腫益丈夫陰氣生平澤葉園黃緑頗類貓睛一名貓兒眼睛草莖中有白汁黏人時珍曰別録云是大戟苗非也功相類耳常山宣吐痰截瘧通行水辛苦而寒有毒能引吐行水祛老痰積飲痰有六風痰寒痰濕痰熱痰食痰氣痰也飲有五流於肺為支飲於肝為懸飲於心為伏飲於經絡為溢飲於腸胃為痰飲也常山力能吐之下之專治諸瘧然悍暴能損真氣弱者慎用時珍曰常山蜀漆韌痰截瘧須在發散表邪及提出陽分之後用之瘧有經瘧臟瘧風寒暑濕痰食瘴鬼之別須分陰陽虛實不可概論常山蜀漆得甘草則吐得大黃則利得烏梅穿山甲則入肝得小麥竹葉則入心得秫米麻黃則入肺得龍骨附子則入腎得草果檳榔則入脾蓋無痰不作瘧一物之功亦在驅逐痰水而已李士材曰常山發吐唯生用多用為然與甘草同用亦必吐若酒浸炒透但用錢許每見奇功未見其或吐也世人泥於雷斆老人久病忌服之說使良藥見疑沉疴難起抑何愚也常山吐瘧痰瓜蒂吐熱痰烏附尖吐濕痰萊蔔子吐氣痰藜蘆吐風痰雞骨者良酒浸蒸或炒用栝蔞為使忌蔥茗莖葉名蜀漆功用略同古方有蜀漆散取其苗性輕揚發散上焦邪結甘草水拌蒸藜蘆宣引吐辛寒至苦有毒入口即吐善通頂令人嚏風癇證多用之張子和曰一婦病風癇初一二年一作後漸日作甚至一日數作求死而已值歲大飢採百草食見野草若蔥採蒸飽食覺不安吐膠涎數日約一二斗汗出如洗甚昏困後遂輕健如常人以所食蔥訪人乃憨蔥苗即藜蘆是矣時珍曰和王妃年七十中風不省牙關緊閉先考太醫吏目月池翁診視藥不得入不獲已打去一齒濃煎藜蘆湯灌之少頃噫氣遂吐痰而蘇藥不瞑眩厥疾不瘳誠然取根去頭用黃連為使反細辛芍藥諸參惡大黃畏蔥白吐者服蔥湯即止木通古名通草輕通行水瀉小腸火甘淡輕虛上通心包降心火清肺熱心火降則肺熱清矣化津液肺為水源肺熱清則津液化水道通下通大小腸膀胱導諸濕熱由小便出故導赤散用之凡利小便者多不利大便以小水愈通大便愈燥也木通能入大腸兼通大便通利九竅血脈關節治胸中煩熱遍身拘痛楊仁齊云遍身隱熱疼痛拘急足冷皆伏熱傷血血屬於心宜木通以通心竅則經絡流行也大渴引飲中焦火淋瀝不通下焦火心與小腸相表裡心移熱於小腸則淋祕水腫浮大利小便耳聾泄腎火通竅目眩口燥舌乾舌為心苗喉痹咽痛火炎上焦鼻齆熱壅清道則氣窒不通失音清金脾熱好眠脾主四肢倦則好眠心為脾母心熱清脾熱亦除除煩退熱止痛排膿破血催生行經下乳火不亢於內氣順血行故經調有準乳汁循常汗多者禁用東垣曰肺受熱邪津液氣化之源絶則寒水斷流膀胱受濕熱癃閉約束則小便不通宜此治之寒水太陽膀胱也朱二允曰火在上則口燥眼赤鼻乾在中則心煩嘔噦浮腫在下則淋祕足腫必藉此甘平之性瀉諸經之火火退則小便自利便利則諸經火邪皆從小水而下降矣君火宜木通相火宜澤瀉利水雖同所用各別藤有細孔兩頭皆通故通竅通草古名通脫木輕通利水退熱色白氣寒體輕味淡氣寒則降故入肺經引熱下行而利小便味淡則升故入胃經通氣上達而下乳汁治五淋水腫目昏耳聾鼻塞失音淡通竅寒降火利肺氣退熱催生澤瀉通利水瀉膀胱火甘淡微咸入膀胱利小便瀉腎經之火邪功專利濕行水治消渴痰飲嘔吐瀉痢腫脹水痞腳氣疝痛淋瀝陰汗陰間有汗尿血泄精既利水而又止泄精何也此乃濕熱為病不為虛滑者言也虛滑則當用補澀之藥濕熱之病濕熱既除則清氣上行又能養五臟益氣力起陰氣補虛損止頭旋有聰耳明目之功脾胃有濕熱則頭重耳鳴目昏滲去其濕則熱亦隨去土乃得令而精氣上行故本經列之上品云聰耳明目而六味丸用之今人多以昏目疑之多服昏目小便過利而腎水虛故也眼中有水屬膀胱過利則水涸而火生張仲景八味丸用澤瀉寇宗奭謂其接引桂附入腎經李時珍曰非接引也乃取其瀉膀胱之邪氣也古人用補藥必兼瀉邪邪去則補藥得力一闔一闢此乃玄妙後人不知此理專一於補必致偏勝之患矣王履曰地黃山茱茯苓丹皮皆腎經藥桂附右腎命門之藥何待接引乎錢仲陽謂腎為真水有補無瀉或云脾虛腎旺故瀉腎扶脾不知腎之真水不可瀉瀉其伏留之邪耳脾喜燥腎惡燥故兼補為難易老云去脬中留垢以其微咸能瀉伏水故也昂按六味丸有熟地之溫丹皮之涼山藥之澀茯苓之滲山茱之收澤瀉之瀉補腎而兼補脾有補而必有瀉相和相濟以成平補之功乃平淡之神奇所以為古今不易之良方也即有加減或加紫河車一具或五味麥冬杜仲牛膝之類不過一二味極三四味而止今人或疑澤瀉之瀉而減之多揀本草補藥恣意加入有補無瀉且客倍於主責成不專而六味之功且退處於虛位失制方配合之本旨矣此近世庸師之誤也鹽水拌或酒浸用忌鐵車前草通行水瀉熱涼血甘寒涼血去熱止吐衄消瘕瘀明目通淋凡利水之劑多損於目惟此能解肝與小腸之熱濕熱退而目清矣雷斆曰使葉勿使莖蕊子甘寒清肺肝風熱滲膀胱濕熱利小便而不走氣與茯苓同功強陰益精令人有子腎有二竅車前子能利水竅而固精竅精盛則有子五子衍宗丸用之枸杞菟絲各八兩五味覆盆各四兩車前二兩蜜丸慣遺泄者車前易蓮子時珍曰人服食須佐他藥如六味丸之用澤瀉可也若單用則過瀉治濕痹五淋暑濕瀉痢歐陽文忠患暴下國醫不能愈夫人云市有藥三文一貼甚效公不肯服夫人雜他藥進之一服而愈問其方乃車前子為末米飲下二錢一云此藥利水而不動氣水道利則清濁分谷臟自止矣目赤障翳能除肝熱催生下胎酒蒸搗餅焙研酒蒸搗餅入滋補藥炒研入利水泄瀉藥燈草輕通利水清熱甘淡而寒降心火心能入心清肺熱利小腸心與小腸相表裡心火清則肺熱小腸亦清而熱從小便出矣通氣止血治五淋水腫燒灰吹喉痹塗乳止夜啼擦癬最良縛成把擦摩極癢時蟲從草出浮水可見十餘次則能斷也瞿麥通利水破血苦寒降心火利小腸逐膀胱邪熱為治淋要藥故八正散用之五淋大抵皆屬濕熱熱淋宜八正及山梔滑石之類血淋宜小薊牛膝膏腎虛淋宜補腎不可獨瀉老人氣虛者宜參術兼木通山梔亦有痰滯中焦作淋者宜行痰兼通利藥最忌發汗汗之必便血破血利竅決癰消腫明目去翳通經墮胎性利善下虛者慎用寇宗奭曰心經雖有熱而小腸虛者服之則心熱未清而小腸別作病矣花大如錢紅白斑斕色甚斌媚俗呼洛陽花用蕊殼丹皮為使惡螵蛸産後淋當去血瞿麥蒲黃皆為要藥萹蓄一名扁竹通淋苦平殺蟲疥利小便治黃疸熱淋蛔咬腹痛蟲蝕下部煮服葉細如竹弱莖蔓引促節有粉三月開紅花天仙藤通活血消腫苦溫疏氣活血治風勞腹痛妊娠水腫有天仙藤散專治水腫葉似葛圓而小有白毛根有須四時不凋一云即青木香藤地膚子通利水補陰甘苦氣寒益精強陰入膀胱除虛熱利小便而通淋時珍曰無陰則陽無以化亦猶東垣治小便不通用知柏滋腎之意王節齊曰小便不禁或頻數古方多以為寒而用溫澀之藥殊不知屬熱者多蓋膀胱火邪妄動水不得寧故不能禁而頻數也故老人多頻數是膀胱血少陽火偏旺也治法當補膀胱陰血瀉火邪為主而佐以收澀之劑如牡蠣山茱五味之類不可獨用病本屬熱故宜瀉火因水不足故火動而致便數小便既多水益虛矣故宜補血補血瀉火治其本也收之澀之治其標也治㿗疝散惡瘡煎湯洗瘡疥良葉作浴湯去皮膚風熱丹腫洗眼除雀盲澀痛葉如蒿莖赤子類蠶砂惡螵蛸石韋通淋補勞甘苦微寒清肺金以滋化源凡行水之藥必皆能先清肺火通膀胱而利水道益精氣補五勞利濕清熱之功高陽生對宣帝治勞傷用石韋計治淋崩發背炒末冷調酒服生石陰柔韌如皮背有黃毛去毛微炙用杏仁滑石射干為使得菖蒲良生古瓦上者名瓦韋治淋海金砂通淋瀉濕熱甘寒淡滲除小腸膀胱血分濕熱治腫滿五淋莖痛得梔子牙硝硼砂治傷寒熱狂大熱利小便此釜底抽薪之義也莖細如線引竹木上葉級皺處有砂黃赤色忌火茵陳通利濕熱治諸黃苦燥濕寒勝熱入足太陽膀胱經發汗利水以泄太陰陽明脾胃之濕熱為治黃疸之君藥脾胃有濕熱則發黃黃者脾之色也熱甚者身如桔色汗如柏汁亦有寒濕發黃身熏黃而色暗大抵治以茵陳為主陽黃加大黃梔子陰黃加附子乾薑各隨寒熱治之又治傷寒時疾狂熱瘴瘧頭痛頭旋女人瘕疝皆濕熱為病香薷宣通利濕清暑辛散皮膚之蒸溫解心腹之凝結屬金水而主肺為清暑之主藥肺氣清則小便行而熱降暑必兼濕治暑必兼利濕若無濕但為乾熱非暑也治嘔逆水腫熬膏服小便利則消腳氣口氣煎湯含敷單服治霍亂轉筋時珍曰暑月乘涼飲冷致陽氣為陰邪所遏反中入內遂病頭痛發熱惡寒煩躁口渴吐瀉霍亂宜用之以發越陽氣散暑和脾則愈若飲食不節勞役作傷之人傷暑大熱大渴汗出如雨煩躁喘促或瀉或吐者乃內傷之證宜用清暑益氣湯人參白虎湯之類以瀉火益元可也若用香薷是重虛其表而濟之熱矣蓋香薷乃夏月解表之藥如冬月之用麻黃氣虛者尤不宜多服今人謂能解暑概用代茶誤矣李士材曰香薷為夏月發汗之藥其性溫熱只宜於中暑之人若中熱者誤服之反成大害世所未知按潔古云中暑為陰證為不足中熱為陽證為有餘經曰氣盛身寒得之傷寒氣虛身熱得之傷暑故中暑宜溫散中熱宜清涼身寒寒字當熱字看傷寒必病熱陳者勝宜冷飲熱服令人瀉青蒿瀉熱補勞苦寒得春木少陽之令最早二月生苗故入少陽厥陰肝膽血分治骨蒸勞熱童便搗汁取汁熬膏蓐勞虛熱凡苦寒之藥多傷胃氣惟青蒿芳香入脾獨宜於血虛有熱之人以其不犯胃氣也風毒熱黃久瘧久痢瘙疥惡瘡鬼氣尸疰時珍曰月令通纂言伏內庚日採蒿懸門庭可辟邪冬至元旦各服一錢亦良則青蒿之治鬼疰蓋亦有所伏也補中明目童便浸葉用熬膏亦良使子勿使葉使根勿使莖附子大燥回陽補腎命火逐風寒濕辛甘有毒大熱純陽其性浮而不沉其用走而不守通行十二經無所不至能引補氣藥以復散之元陽引補血藥以滋不足之真陰引發散藥開腠理以逐在表之風寒同乾薑桂枝溫經散寒發汗引溫暖藥達下焦以祛在裡之寒濕能引火下行亦有津調貼足心者入八味丸內亦從地黃等補陰治三陰傷寒吳綬曰附子陰證要藥凡傷寒傳變三陰中寒夾陰身雖大熱而脈沉細者或厥陰腹痛甚則唇青囊縮者急須用之若待陰極陽竭而用之已遲矣東垣治陰盛格陽傷寒面赤目赤煩渴引飲脈七八至但按之則散用姜附湯加人參投半斤得汗而愈此神聖之妙也中寒中風卒中曰中漸傷曰傷輕為感冒重則為傷又重則為中氣厥痰厥虛寒而厥者宜之如傷寒陽盛格陰身冷脈伏熱厥似寒者誤投立斃宜承氣白虎等湯咳逆風寒嘔噦胃寒膈噎膈噎多由氣血虛胃冷胃槁而成飲可下而食不可下槁在吸門喉間之厭會也食下胃脘痛須臾吐出槁在賁門胃之上口也此上焦名噎食下良久吐出槁在幽門胃之下口也此中焦名膈朝食暮吐槁在闌門大小腸下口也此下焦名反胃又有痰飲食積瘀血壅塞胃口者如寒痰胃冷則宜薑附參術胃槁者當滋潤宜四物牛羊乳血瘀者加韭汁當與韭汁牛乳二條參看論治脾泄命火不足冷痢寒瀉霍亂轉筋脾虛寒客中焦為霍亂寒客下焦肝腎為轉筋熱霍亂者禁用拘攣風痹癥瘕積聚督脈為病脊強而厥小兒慢驚痘瘡灰白癰疽不斂一切沉寒痼冷之證經曰陰盛主內寒陽虛生外寒助陽退陰殺邪辟鬼本草未載通經墮胎凡陰證用薑附藥宜冷服熱因寒用也蓋陰寒在下虛陽上浮治之以寒則陰益盛治之以熱則拒格不納用熱藥冷飲下嗌之後冷體既消熱性便發情且不違而致大益此反治之妙也又有寒藥熱飲治熱證者此寒因熱用義亦相同也經曰正者正治反者反治如用寒治熱用熱治寒此正治也或以寒治寒以熱治熱此反治也經所謂必伏其所主而先其所因蓋借寒藥熱藥為反佐以作嚮導也亦曰從治王好古曰用附子以補火必防涸水如陰虛之人久服補陽之藥則虛陽益熾真陰愈耗精血日枯而氣無所附麗遂成不救者多矣母為烏頭附生者為附子連生者為側子細長者為天雄兩岐者為烏喙五物同出異名附子以西川彰明赤水産者為最皮黑體圓底平八角重一兩以上者良或云二兩者更勝然難得生用發散熟用峻補趙嗣真曰仲景麻黃附子細辛湯熟附配麻黃發中有補四逆湯生附配乾薑補中有發其旨微矣丹溪曰烏附行經仲景八味丸用為少陰嚮導後世因以為補藥誤矣附子走而不守取其健悍走下以行地黃之滯耳相習用為風及補藥殺人多矣昂按附子味甘氣熱峻補元陽陽微欲絶者回生起死非此不為功故仲景四逆真武白通諸湯多用之其有功於生民甚大況古人日用常方用之最多本非禁劑丹溪乃僅以為行經之藥而云用作補藥多致殺人言亦過矣蓋丹溪法重滋陰故每訾陽藥亦其偏也王節齊曰氣虛用四君子湯血虛用四物湯虛甚者俱宜加熟附蓋四君四物皆平和寬緩之劑須得附子健悍之性行之方能成功附子熱藥本不可輕用但當病則雖暑熱時月亦可用也水浸麵裹煨令發坼乘熱切片炒黃去火毒用又法甘草二錢鹽水薑汁童便各半盞煮熟用今人用黑豆煮亦佳畏人參黃耆甘草防風犀角緑豆童便反貝母半夏栝蔞白芨白蘞中其毒者黃連犀角甘草煎湯解之黃土水亦可解烏頭功同附子而稍緩附子性重峻溫脾逐寒烏頭性輕疏溫脾逐風寒疾宜附子風疾宜烏頭烏附尖吐風痰治癲癇取其鋒鋭直達病所丹溪治許白雲屢用瓜蒂梔子苦參藜蘆等劑吐之不透後用附子尖和漿水與之始得大吐膠痰數碗天雄補下焦命門陽虛寇宗奭張元素皆曰補上焦丹溪曰可為下部之佐時珍曰其尖皆向下生故下行然補下乃所以蓋上也若上焦陽虛則屬心肺之分當用參耆不當用雄附矣治風寒濕痹為風家主藥發汗又能止陰汗側子散側旁生宜於發散四肢充達皮毛治手足風濕諸痹草烏頭大燥開頑痰辛苦大熱搜風勝濕開頑痰治頑瘡以毒攻毒頗勝川烏然至毒無所釀製不可輕投野生狀類川烏亦名烏喙薑汁炒或豆腐煮用熬膏名射罔敷箭射獸見面立死白附子燥祛風濕治面疾辛甘有毒大熱純陽陽明經藥能引藥勢上行治面上百病陽明之脈縈於面白附能去頭面遊風作面脂消斑疵補肝虛祛風痰治心痛血痹諸風冷氣中風失音陰下濕癢根如草烏之小者長寸許皺紋有節炮用陶宏景曰此藥久絶無復真者今惟涼州生破故紙一名補骨脂燥補命火辛苦大溫入心包命門補相火以通君火暖丹田壯元陽縮小便亦治遺尿治五勞七傷五臟之勞七情之傷腰膝冷痛腎冷精流腎虛泄瀉腎虛則命門火衰不能熏蒸脾胃脾胃虛寒遲於運化致飲食減少腹脹腸鳴嘔涎泄瀉如鼎釜之下無火物終不熟故補命門相火即所以補脾破故紙四兩五味三兩肉蔻二兩吳茱一兩姜煮棗丸名四神丸治五更泄瀉婦人血氣婦人之血脫氣陷亦猶男子之腎冷精流墮胎出南番者色赤嶺南者色緑酒浸蒸用亦有童便乳浸鹽水炒者得胡桃胡麻良惡甘草唐鄭相國方破故紙十兩酒浸蒸為末胡桃肉二十兩去皮爛研蜜和每日酒調一匙或水調服白飛霞曰破故紙屬火堅固元陽胡桃屬水潤燥養血有水火相生之妙忌蕓薹羊血加杜仲名青娥丸云薹油菜也肉蓯蓉補腎命滑腸甘酸鹹溫入腎經血分補命門相火滋潤五臟益髓強筋治五勞七傷絶陽不興絶陰不産腰膝冷痛崩帶遺精峻補精血時珍曰補而不峻故有蓯蓉之號驟用恐妨心滑大便長大如臂重至斤許有松子鱗甲者良酒浸一宿刷去浮甲劈破除內筋膜酒蒸半日又酥炙用忌鐵蘇恭曰今日所用多草蓯蓉功力稍劣鎖陽補陽滑腸甘溫補陰益精興陽潤燥養筋強筋故能興陽治痿弱滑大便便燥者啖之可代蓯蓉煮粥彌佳鱗甲櫛比狀類男陽酥炙巴戟天補腎祛風甘辛微溫入腎經血分強陰益精治五勞七傷辛溫散風濕治風氣腳氣水腫根如連珠擊破中紫而鮮潔者僞也中雖紫微有白糝粉色而理小暗者真也蜀産佳山葎根似巴戟但色白人或醋煮以亂之去心酒浸焙用覆盆子為使惡丹參胡盧巴燥補腎命除寒濕苦溫純陽入右腎命門暖丹田壯元陽治腎臟虛冷陽氣不能歸元同附子硫黃瘕疝冷氣同茴香巴戟川烏川楝吳茱萸寒濕腳氣出嶺南番舶者良云是番萊蔔子酒浸曝或蒸或炒仙茅燥補腎命辛熱有小毒助命火益陽道明耳目補虛勞治失溺無子心腹冷氣不能食溫胃腰腳冷痹不能行曖筋骨相火盛者忌服葉如茅而略闊根如小指黃白多涎竹刀去皮切糯米泔浸去赤汁出毒用忌鐵唐婆羅門始進此方當時盛傳服之多效照前制陰乾蜜丸酒服禁牛乳牛肉許真君書曰甘能養肉苦能養氣咸能養骨酸能養筋滑能養膚和苦酒服之必效淫羊藿一名仙靈脾補腎命辛香甘溫入肝腎補命門時珍曰手足陽明三焦命門藥益精氣堅筋骨利小便治絶陽不興絶陰不産冷風勞氣四肢不仁手足麻木一名仙靈脾北部有羊一日百合食此藿所致故名去枝羊脂拌炒山藥為使得酒良蛇床子補腎命去風濕辛苦而溫強陽益陰補腎祛寒祛風燥濕治痿囊濕女子陰痛陰癢濕生蟲同礬煎湯洗子臟虛寒産門不閉炒熱尉之腎命之病及腰痠體痛帶下脫肛喉痹齒痛濕癬惡瘡殺蟲止癢風濕諸病煎湯浴止風癢時珍曰腎命三焦氣分之藥不獨補助男子而且有益婦人世人舍此而求補藥於遠域豈非貴耳賤目乎似小茴而細微妙殺毒則不辣以地黃汁拌蒸三遍佳惡丹皮貝母巴豆菟絲子平補三陰甘辛和平凝正陽之氣入足三陰脾肝腎強陰益精溫而不燥不助相火治五勞七傷精寒淋瀝口苦燥渴脾虛腎燥而生內熱菟絲益陰清熱祛風明目補衛氣助筋脈益氣力肥健人補肝腎之效老學庵筆記豫族弟少服菟絲子凡數年飲食倍常血氣充盛忽因浴見背腫隨視隨長乃大疽也適值金銀花開飲至數斤腫遂消菟絲過服尚能作疽以此知金石藥不可不戒昂按此人或感他毒未可盡歸咎於菟絲也無根蔓延草上子黃如黍粒得酒良淘去泥沙酒浸一宿曝乾搗末山藥為使覆盆子平補肝腎甘酸微溫益腎臟而固精補肝虛而明目起陽痿縮小便寇氏曰服之當復其溺器故名澤肌膚烏髭發榨汁塗發不白女子多孕同蜜為膏治肺氣虛寒李士材曰強腎無燥熱之偏固精無凝澀之害金玉之品也狀如覆盆故名去蒂淘淨搗餅用時酒拌蒸葉絞汁滴目中出目弦蟲除膚赤收濕止淚蒺藜子平補肝腎苦溫補腎辛溫瀉肺氣而散肝風益精明目肝以散為補凡補肝藥皆能明目治虛勞腰痛遺精帶下咳逆肺痿乳閉癥瘕痔漏陰㿉音頽腎肝肺三經之病催生墮胎刺蒺藜主惡血故能破症下胎沙苑蒺藜緑色似腎故補腎炒用亦可代茶刺蒺藜三角有刺去刺酒拌蒸風家宜刺蒺藜補腎則沙苑者為優余功略同瑞竹堂方齒牙打動者蒺藜根燒灰敷之使君子補脾殺蟲消積甘溫健脾胃除虛熱殺臟蟲治五疳便濁瀉痢瘡癬為小兒諸病要藥經疏曰五疳便濁瀉痢腹蟲皆由脾胃虛弱因而乳停食滯濕熱瘀塞而成脾胃健則積滯消濕熱散水道利而前證盡除矣時珍曰凡能殺蟲之藥多是苦辛獨使君子棐子甘而殺蟲每月上旬蟲頭向上中旬頭橫下旬向下道藏云初一至初五蟲頭向上凡有蟲病者每月上旬空心食數枚蟲皆死而出也按地黃胡麻皆殺蟲出閩蜀五瓣有稜內仁如棐亦可煨食久則油不可用忌飲熱茶犯之作瀉益智子燥脾腎補心腎辛熱本脾藥兼入心腎主君相二火補心氣命門三焦之不足心為脾母補火故能生土能澀精固氣本草未載又能開發鬱結使氣宣通味辛能散溫中進食攝涎唾胃冷則涎湧縮小便腎與膀胱相表裡益智辛溫固腎鹽水炒同烏藥等分酒煮山藥糊丸鹽湯下名縮泉丸治嘔吐泄瀉客寒犯胃冷氣腹痛崩帶泄精澀精固氣因熱而崩濁者禁用出嶺南形如棗核用仁砂仁即縮砂蔤宣行氣調中辛溫香竄補肺益腎和胃醒脾快氣調中通行結滯治腹痛痞脹痞滯有傷寒下早裡虛邪入而痞者有食壅痰塞而痞者有脾虛氣弱而痞者須分虛實治之不宜專用利氣藥恐變為鼓脹鼓脹內脹而外有形痞脹惟覺痞悶而已皆太陰為病也噎膈嘔吐上氣咳嗽赤白瀉利濕熱積滯客於大腸砂仁亦入大小腸經霍亂轉筋奔豚崩帶祛痰逐冷消食醒酒止痛安胎氣行則痛止氣順則胎安散咽喉口齒浮熱化銅鐵骨鯁王好古曰得檀香豆蔻入肺得人參益智入脾得黃柏茯苓入腎得赤石脂入大小腸醫通曰辛能潤腎燥引諸藥歸宿丹田地黃用之拌蒸亦取其能達下也經疏曰腎虛氣不歸元用為嚮導殆勝桂附熱藥為害出嶺南研用白豆蔻宣行氣暖胃辛熱流行三焦溫暖脾胃三焦利脾胃運則諸證自平矣而為肺家本藥肺主氣散滯氣消酒積除寒燥濕化食寬膨治脾虛瘧疾感寒腹痛吐逆反胃肺胃火盛及氣虛者禁用白睛翳膜白睛屬肺能散肺滯太陽經目眥紅筋太陽脈起目眥番舶者良研細用肉豆蔻一名肉果燥脾澀腸辛溫氣香理脾暖胃下氣調中逐冷祛痰消食解酒治積冷心腹脹痛挾痰挾食者並宜之中惡吐沫小兒吐逆乳食不下又能澀大腸止虛瀉冷痢初起忌用出嶺南似草蔻外有皺紋內有斑紋糯米粉裹煨熟用忌鐵草豆蔻一名草果燥濕祛痰除痰截瘧辛熱香散暖胃健脾破氣開鬱燥濕祛寒除痰化食治瘴癘寒瘧佐常山能截瘧或與知母同用取其一陰一陽治寒熱瘴瘧蓋草果治太陰獨勝之寒知母治陽明獨勝之火寒客胃痛散滯氣利膈痰因滯因寒者多效霍亂瀉痢噎膈反胃痞滿吐酸痰飲積聚解口臭氣酒毒魚肉毒故食料用之過劑助脾熱耗氣損目閩産名草蔻如龍眼而微長皮黃白薄而稜峭仁如砂仁而辛香氣和滇廣所産名草果如訶子皮黑厚而稜密子粗而辛臭雖是一物微有不同麵裹煨熟取仁用忌鐵香附一名莎草根宣調氣開鬱性平氣香味辛能散微苦能降微甘能和乃血中氣藥通行十二經八脈氣分主一切氣人身以氣為主氣盛則強虛則衰順則平逆則病絶則死矣經曰怒則氣上恐則氣下喜則氣緩悲則氣消驚則氣亂思則氣結勞則氣耗此七情之氣也以香附為君隨證而加升降消補之藥素問中仍有寒則氣收熱則氣泄名九氣利三焦解六郁痰鬱火鬱氣鬱血鬱濕鬱食鬱止諸痛通則不痛治多怒多憂痰飲痞滿胸腫腹脹飲食積聚霍亂吐瀉腎氣腳氣癰疽瘡瘍血凝氣滯所致香附一味末服名獨勝丸治癰疽由鬱怒得者如瘡初作以此代茶潰後亦宜服之大凡瘡疽喜服香藥行氣通血最忌臭穢不潔觸之故古人治瘍多用五香連翹飲康祖左乳病癰又臆間生核痛楚半載禱張王夢授以方薑汁製香附為末每服二錢米飲下遂愈吐血便血崩中帶下月候不調氣為血配血因氣行經成塊者氣之凝將行而痛氣之滯行後作痛氣血俱虛也色淡亦虛也色紫氣之熱色黑則熱之甚也錯經者氣之亂肥人痰多而經阻氣不運也香附陰中快氣之藥氣順則血和暢然須輔以涼血補氣之藥丹溪曰能引血藥至氣分而生血此正陽生陰長之義胎産百病能推陳致新故諸書皆云益氣行中有補丹溪曰天行健運不怠所以生生無窮即此理耳時珍曰凡人病則氣滯而餒香附為氣分君藥臣以參耆佐以甘草治虛怯甚速也去毛用生則上行胸膈外達皮膚熟則下走肝腎旁徹腰膝童便浸炒則入血分而補虛鹽水浸炒則入血分而潤燥或蜜水炒青鹽炒則補腎氣酒浸炒則行經絡醋浸炒則消積聚且斂其散薑汁炒則化痰飲炒黑又能止血忌鐵時珍曰得參術則補氣得歸地則補血得木香則散滯和中得檀香則理氣醒脾得沉香則升降諸氣得芎藭蒼朮則總解諸郁得梔子黃連則清降火熱得茯神則交濟心腎得茴香破故紙則引氣歸元得厚朴半夏則決壅消脹得紫蘇蔥白則發汗散邪得三稜莪朮則消積磨塊得艾葉則治血氣暖子宮乃氣病之總司女科之仙藥也大抵婦人多郁氣行則鬱解故服之尤效非宜於婦人不宜於男子也李士材曰乃治標之劑惟氣實血未大虛者宜之不然恐損氣而燥血愈致其疾矣世俗泥於女科仙藥之一語惜未有發明及此者木香宣行氣辛苦而溫三焦氣分之藥能升降諸氣泄肺氣疏肝氣和脾氣怒則肝氣上肺氣調則金能制木而肝平木不剋土而脾和治一切氣痛九種心痛皆屬胃脘曰寒痛熱痛氣痛血痛濕痛痰痛食痛蛔痛悸痛蓋君心不易受邪真心痛者手足冷過腕節朝發夕死嘔逆反胃霍亂瀉痢後重同檳榔用劉河間曰痢疾行血則膿血自愈調氣則後重自除癃閉痰壅氣結痃癖症塊腫毒蟲毒衝脈為病氣逆裡急殺鬼物御瘴霧去腋臭寬大腸消食安胎氣逆則胎不安過服損真氣丹溪曰味辛氣升若陰火衝上者反助火邪當用黃柏知母少以木香佐之王好古曰本草主氣劣氣不足補也通壅導氣破也安胎健脾胃補也除痰癖症塊破也不同如此汪機曰與補藥為佐則補與瀉藥為君則瀉李時珍曰諸氣膹郁皆屬於肺上焦氣滯用之者金鬱泄之也中氣不運皆屬於脾中焦氣滯用之者脾胃喜芳香也大腸氣滯則後重膀胱氣不化則癃閉肝氣鬱則為痛下焦氣滯用之者塞者通之也番舶上耒形如枯骨味苦黏舌者良名青木香今所用者皆廣木香土木香磨汁用東垣用黃連制亦有蒸用麵裹煨用者煨用實腸止瀉畏火藿香宣去惡氣辛甘微溫入手足太陰肺脾快氣和中開胃止嘔胃弱胃熱而嘔者忌用去惡氣進飲食治霍亂吐瀉心腹絞痛肺虛有寒上焦壅熱能理脾肺之氣古方有藿香正氣散正氣通暢則邪逆自除出交廣方莖有節葉微似茄汁古惟用葉今枝莖亦用之因葉多僞也茴香古作懷香燥補腎命門治寒疝大茴辛熱入腎膀胱暖丹田補命門開胃下食調中止嘔療小腸冷氣㿗疝陰腫疝有七種氣血寒水筋狐㿗也肝經病不屬腎經以厥陰肝脈絡陰器也多因寒濕所致亦有挾虛者當加參術於溫散藥中乾溼腳氣多食損目發瘡小茴辛平理氣開胃亦治寒疝食料宜之大如麥粒輕而有細稜者名大茴出寧夏他處小者名小茴自番舶來實八瓣者名八角茴香炒黃用得酒良得鹽則入腎發腎邪故治陰疝受病於肝見證於腎大小茴各一兩為末豬脬一個連尿入藥酒煮爛為丸服甘松香宣理氣醒脾甘溫芳香理諸氣開脾郁治腹卒然滿痛風疳齒䘌腳氣膝浮煎湯淋洗出涼州及黔蜀葉如茅用根根極繁密山奈宣溫中辟惡辛溫暖中辟惡治心腹冷痛寒濕霍亂風蟲牙痛生廣中據葉皆如生薑入合諸香用高良薑宣燥暖胃散寒辛熱暖胃散寒消食醒酒治胃脘冷痛凡心口一點痛俗言心氣痛非也乃胃脘有滯或有蟲及因怒因寒而起以良薑酒洗七次香附醋洗七次焙研因寒者姜二錢附一錢因怒者附二錢姜一錢寒怒兼者每錢半米飲加薑汁一匙鹽少許服初梁緄患心脾痛夢神授此方二味等分服後入各炒方用霍亂瀉痢吐惡噎膈瘴瘧冷癖肺胃熱者忌之出嶺南高州子名紅豆蔻溫肺散寒醒脾燥濕消食解酒東垣脾胃藥中常用之並東壁土炒用蓽茇茇一作撥燥除胃冷散浮熱辛熱除胃冷溫中下氣消食祛痰治水瀉氣痢牛乳點服虛冷腸鳴亦入大腸經冷痰噁心嘔吐酸水痃癖陰疝辛散陽明之浮熱治頭痛偏頭痛者口含溫水隨左右以末吹一字入鼻效牙痛寒痛宜乾薑蓽茇細辛熱痛宜石膏牙硝風痛宜皂角殭蠶蜂房二烏蟲痛宜石灰雄黃鼻淵多服泄真氣動脾肺之火損目出南番嶺南亦有類椹子而長青色去挺用頭醋浸刮淨皮粟免傷人肺烟草新增宣行氣闢寒辛溫有毒治風寒濕痹滯氣停痰山嵐瘴霧其氣入口不循常度頃刻而周一身令人通體俱快醒能使醉醉能使醒飢能使飽飽能使飢人以代酒代茗終身不厭故一名相思草然火氣熏灼耗血損年人自不覺耳閩産者佳煙筒中水能解蛇毒金銀花瀉熱解毒甘寒入肺散熱解毒清熱即是解毒補虛凡物甘者皆補療風養血止渴丹溪曰癰疽安後發渴黃耆六一湯吞忍冬丸切當忍冬養血黃耆補氣渴何由作治癰疽疥癬楊梅惡瘡腸澼血痢五種尸疰經冬不凋名忍冬又名左纏藤花葉同功花香尤佳釀酒代茶熬膏並妙忍冬酒治癰疽發背一切惡毒初起便服奇效乾者亦可惟不及生者力速忍冬五兩甘草二兩水二碗煎至一碗再入酒一碗略煎分三服一日一夜吃盡重者日二劑服至大小腸通利則藥力到忍冬丸照前分兩酒煮曬乾同甘草為末以所煮余酒打糊為丸陳藏器曰熱毒血痢濃煎服之為末糖調常服能稀痘蒲公英一名黃花地丁瀉熱解毒甘平花黃屬土入太陰陽明脾胃化熱毒解食毒消腫核專治乳癰乳頭屬厥陰乳房屬陽明同忍冬煎入少酒服搗敷亦良疔毒亦為通淋妙品諸家不言治淋試之甚驗擦牙烏髭發瑞竹堂有還少丹方取其通腎東垣曰苦寒腎經君藥白汁塗惡刺凡螳螂諸蟲盛夏孕育遊諸物上必遺精汁干久則有毒人手觸之成疾名狐尿刺慘痛不眠百療難效取汁厚塗即愈千金方極言其功葉如萵苣花如單瓣菊花四時有花花罷飛絮斷之莖中有白汁鄭方升曰一莖兩花高尺許者掘下數尺根大如拳旁有人形拱抱搗汁酒服治噎膈如神紫花地丁瀉熱解毒辛苦而寒治癰疽發背疔腫瘰癧無名腫毒葉如柳而細夏開紫花結角生平地者起莖生溝壑者起蔓杜牛膝一名天名精一名地菘瀉熱吐痰破血解毒甘寒微毒能破血一婦産後口渴氣喘面赤有斑大便泄小便祕用行血利水藥不效用牛膝濃煎膏飲下血一桶小便通而愈能止血吐痰除熱解毒殺蟲治乳蛾喉痹砂淋血淋良方曰濃煎加乳麝少許神效小兒牙關緊閉急慢驚風不省人事者絞汁入好酒灌之即蘇以醋拌渣敷項下服汁吐瘧痰驚風服之亦取其吐痰漱汁止牙痛搗之敷蛇蟲螫毒根白如短牛膝地黃為使煎湯洗痔渣塞患處良鶴蝨瀉殺蟲苦辛有小毒殺五臟蟲治蛔齧腹痛面白唇紅時發時止者為蟲痛肥肉汁調末服沈存中筆記云是杜牛膝子或曰非也別是一種最黏人衣有狐氣炒熱則香山豆根瀉熱解毒苦寒瀉心火以保金氣去肺大腸之風熱心火降則不灼肺而金清肺與大腸相表裡肺金清則大腸亦清消腫止痛治喉癰喉風齦腫齒痛含之咽汁喘滿熱咳腹痛下痢五痔諸瘡解諸藥毒敷禿瘡蛇狗蜘蛛傷療人馬急黃血熱極所致苗蔓如豆經冬不凋牛蒡子一名鼠黏子一名惡實瀉熱解毒辛平潤肺解熱散結除風利咽膈理痰嗽消斑疹利二便行十二經散諸腫瘡瘍之毒利腰膝凝滯之氣性冷而滑利痘症虛寒泄瀉者忌服實如葡萄而褐色酒拌蒸待有霜拭去用根苦寒竹刀刮淨絞汁蜜和服治中風汗出乃愈搗和豬脂貼瘡腫及翻花瘡肉翻出如花狀山慈菰瀉熱解毒甘微辛有小毒功專清熱散結治癰瘡疔腫瘰癧結核醋磨塗解諸毒蟲毒蛇蟲狂犬傷根與慈菰小蒜相類去毛殼用玉樞丹中用之廣筆記云出處州遂昌縣洪山無毛云真者有毛誤也漏蘆瀉熱解毒咸軟堅苦下泄寒勝熱入胃大腸通肺小腸散熱解毒通經下乳排膿止血生肌殺蟲治遺精尿血癰疽發背古方以漏蘆湯為稱首及預解時行痘疹毒取其寒勝熱又能入陽明故也出閩中莖如油麻枯黑如漆者真甘草拌蒸連翹為使貫衆瀉熱解毒味苦微寒有毒而能解邪熱之毒治崩中帶下産後血氣脹痛破癥瘕發斑痘王海藏快斑散用之化骨哽能軟堅殺三蟲根似狗脊而大汁能制三黃化五金伏鍾乳結砂制汞解毒軟堅以此浸水缸中日飲其水能闢時疾射干瀉火解毒散血消痰苦寒有毒能瀉實火火降則血散腫消而痰結自解故能消心脾老血行太陰肺脾厥陰肝之積痰治喉痹咽痛為要藥擂汁醋和噙之引涎千金方治喉痹有烏扇膏治結核瘕疝便毒瘧母鱉甲煎丸治瘧母用之皆取其降厥陰相火也通經閉利大腸鎮肝明目扁竹花根也葉橫鋪如烏羽及扇故一名烏扇烏翣泔水浸一日䈽竹葉煮半日用續隨子一名千金子瀉行水破血解毒辛溫有毒行水破血治癥瘕痰飲冷氣脹滿蠱毒鬼疰利大小腸下惡滯物塗疥癬瘡玉樞丹用之治百病多效經疏曰乃以毒治毒之功去殼取色白者壓去油用時珍曰續隨子大戟澤漆甘遂莖葉相似主療亦相似長於利水用之得法皆要藥也馬藺子一名蠡實瀉濕熱解毒甘平治寒疝喉痹癰腫瘡癤婦人血氣煩悶血運崩帶利大小腸久服令人瀉叢生葉似薤而長厚結角子如麻大赤色有稜炒用治疝用醋拌根葉同功萆麻子瀉通竅拔毒出有形滯物辛苦有毒性善收亦善走能開通諸竅經絡治偏風不遂喎斜搗餅左貼右右貼左即止口噤鼻窒耳聾搗爛綿裹塞耳塞鼻喉痹舌脹油作紙燃煙燻能利水氣治水症浮腫研服當下青黃水壯人只可五粒能出有形滯物治針刺入肉搗敷傷處頻看刺出即去藥恐努出好肉竹木骨哽萆麻子一兩凝水石二兩研勻以一捻置舌根噙咽自然不見胞胎不下萆麻一粒巴豆一粒麝香一分貼臍中並足心胎下即去之若子腸挺出者搗膏塗頂心即收能追膿拔毒敷瘰癧惡瘡外用屢奏奇功鵜鶘油能引藥氣入內萆麻油能拔氣出外故諸膏多用之然有熱毒氣味頗近巴豆內服不可輕率去皮黃連水浸每晨用浸水吞一粒至三四粒治大風疥癩形如牛蜱黃褐有斑鹽水煮去皮研或用油忌鐵食萆麻一生不得食炒豆犯之脹死白頭翁瀉熱涼血苦堅腎寒涼血入陽明胃大腸血分治熱毒血痢仲景治熱痢有白頭翁湯合黃連黃柏秦皮東垣曰骨欲堅急食苦以堅之痢則下焦虛故以純苦之劑堅之溫瘧寒熱齒痛骨痛腎主齒骨齦屬陽明鼻衄禿瘡瘰癧疝瘕血痔偏墜搗敷患處明目消疣有風反靜無風則搖近根外有白茸得酒良王瓜即土瓜根瀉熱利水行血苦寒瀉熱利水治天行熱疾黃疸消渴搗汁飲便數帶下月閉瘀血利大小腸排膿消腫下乳通乳藥多用之單服亦可墮胎根如栝蔞之小者味如山藥根子通用經疏曰主治略似栝蔞傷寒發斑用王瓜搗汁和伏龍肝末服甚效王不留行通行血甘苦而平其性行而不住能走血分通血脈乃陽明沖任之藥陽明多氣多血除風去痹止血定痛通經利便下乳俗云穿山甲王不留行婦人服之乳長流催生治金瘡止血癰瘡散血出竹木刺孕婦忌之花如鈴鐸實如燈籠子殼五稜取苗子蒸漿水浸用冬葵子滑腸利竅甘寒淡滑潤燥利竅通營衛滋氣脈行津液利二便消水腫用榆皮等分煎服通關格下乳滑胎秋葵復種經冬至春作子者名冬葵子根葉同功春葵子亦滑不堪入藥蜀葵花赤者治赤帶白者治白帶赤者治血燥白者治氣燥亦治血淋關格皆取其寒潤滑利之功也白蘚皮通祛風濕氣寒善行味苦性燥行水故燥入脾胃除濕熱兼入膀胱小腸行水道通關節利九竅為諸黃風痹之要藥一味白蘚皮湯治産後風時珍曰世醫止施之瘡科淺矣兼治風瘡疥癬女子陰中腫痛濕熱乘虛客腎與膀胱所致根黃白而心實取皮用惡桑螵蛸桔梗茯苓萆薢萆薢通祛風濕補下焦甘苦性平入足陽明厥陰胃肝祛風去濕以固下焦陽明主肉屬濕厥陰主筋屬風補肝虛去風堅筋骨風濕去則筋骨堅益精明目治風寒濕痹腰痛久冷關節老血膀胱宿水陰痿失溺莖痛遺濁痔瘻惡瘡諸病皆陽明濕熱流入下焦萆薢能除濁分清古方有萆薢分清飲史國信云若欲興陽先滋筋力若欲便清先分肝火萬金護命方云凡人小便頻數便時痛不可忍者此疾必因大腸祕熱不通水液只就小腸大腸愈加干竭甚則身熱心躁思水即重證也此疾本因貪酒色或過食辛熱葷膩之物積有熱毒腐物瘀血乘虛流入小腸故便時作痛也此便數而痛與淋證澀而痛不同宜用萆薢一兩鹽水炒為末每服二三錢使水道轉入大腸仍以蔥湯頻洗穀道令氣得通則便數及痛自減也腎有二竅淋證出於溺竅濁證出於精竅有黃白二種黃長鞕音硬白虛軟軟者良薏苡為使畏大黃柴胡前胡忌茗醋時珍曰萆薢菝葜土茯苓形不同而主治不甚相遠豈一類數種乎萆薢根細長淺白菝葜根作塊而黃土茯苓通祛濕熱補脾胃甘淡而平陽明胃大腸主藥健脾胃祛風濕脾胃健則營衛從風濕除則筋骨利利小便止瀉泄治筋骨拘攣楊梅瘡毒楊梅瘡古方不載明正德間起於嶺表其證多屬陽明厥陰而兼及他經蓋相火寄於厥陰肌肉屬於陽明故也醫用輕粉劫劑其性燥烈入陽明劫去痰涎從口齒出瘡即干愈然毒氣竄入經絡筋骨血液枯槁筋失所養變為拘攣癰漏竟致廢痼土茯苓能制輕粉之毒去陽明濕熱用一兩為君苡仁金銀花防風木通木瓜白蘚皮各五分皂角子四分氣虛加人參七分血虛加當歸七分名搜風解毒湯瘰癧瘡腫濕鬱而為熱營衛不和則生瘡腫經曰濕氣害人皮肉筋脹是也土茯苓淡能滲甘能補患膿疥者煎湯代茶甚妙大如鴨子連綴而生俗名冷飯糰有赤白二種白者良可食良亦可生啖忌茶白蘞瀉火散結苦能泄辛能散甘能緩寒能除熱殺火毒散結氣生肌止痛治癰疽瘡腫面上疱瘡金瘡撲損箭鏃不出者同丹皮或半夏為末酒服斂瘡方多用之故名每與白芨相須搽凍耳同黃柏末油調蔓赤枝有五葉根如卵而長三五枝同窠皮烏肉白一種赤蘞功用皆用鄭奠一曰能治溫瘧血痢腸風痔瘻赤白帶下預知子補勞瀉熱苦寒補五勞七傷治痃癖氣塊天行溫疾蛇蟲咬毒殺蟲療蠱綴衣領中凡遇蠱毒則聞其聲而預知之故名利便催生藤生子如皂角褐色光潤出蜀中云亦難得旱蓮草一名鯉腸又名金陵草補腎甘鹹汁黑補腎止血黑髮烏髭千金云當及時多收其效甚速經疏云性涼不益脾胃故千金方金陵煎丸用薑汁和劑苗如旋覆實似蓮房斷之有計須臾而黑熬膏良劉寄奴草瀉破血止血苦溫破血通經除症下脹止金瘡血多服令人吐利一莖直上葉尖長糙澀花白芯黃如小菊花有白絮如苦蕒絮子細長亦似苦蕒子莖葉花子皆可用劉裕小字寄奴微時曾射一蛇明日見童子林中搗藥問之答曰吾王為劉寄奴所傷合藥敷之裕曰王何不殺之童曰寄奴王者不可殺也叱之不見乃收藥回每遇金瘡敷之立愈馬鞭草瀉破血消脹殺蟲味苦微寒破血通經殺蟲消脹治氣血症瘕癰瘡陰腫搗汁塗敷墟陌甚多方莖葉似益母對生夏秋開細紫花穗如車前草類蓬蒿而細根白而小用苗葉穀精草輕明目辛溫輕浮上行陽明胃兼入厥陰肝明目退翳之功在菊花之上亦治喉痹齒痛陽明風熱收谷後荒田中生葉似嫩秧花如白星小兒雀盲者羯羊肝一具不洗竹刀割開入穀精煮熟食之或作丸茶下青葙子一名草決明瀉肝明目味苦微寒入厥陰肝祛風熱鎮肝明目治青盲障翳蟲疥惡瘡瞳子散大者忌服能助相火類雞冠而穗尖長決明子瀉肝明目甘苦鹹平入肝經除風熱治一切目疾故有決明之名又曰益腎精瞳子神光屬腎日華曰明目甚於黑豆作枕治頭風狀如馬蹄決明搗碎煎惡大麻仁蓼實宣溫中辛溫溫中明目耐風寒下水氣時珍曰古人種蓼為蔬收子入藥今為酒麴用其汁耳以香蓼青蓼紫蓼為良有香蓼青蓼紫蓼赤蓼木蓼水蓼馬蓼馬勃輕解熱外用敷瘡辛平輕虛清肺解熱東垣普濟消毒飲中用之散血止嗽治喉痹咽痛吹喉中良或加白礬或硝掃喉取吐痰愈鼻衄失音外用敷諸瘡良生濕地朽木上狀如肺肝紫色虛軟彈之粉出取粉用木鱉子瀉熱外用治瘡苦溫微甘有小毒利大腸治瀉痢疳積瘰癧瘡痔乳癰蚌毒消腫追毒生肌除䵟音旱黑斑專入外科核扁如鱉緑色揀去油者能毒狗木部茯苓補心脾通行水甘溫益脾助陽淡滲利竅除濕色白入肺瀉熱而下通膀胱能通心氣於腎使熱從小便出然必其上行入肺能清化源而後能下降利水也寧心益氣調營理衛定魄安魂營主血衛主氣肺藏魄肝藏魂治憂恚驚悸心肝不足心下結痛寒熱煩滿口焦舌乾口為脾竅舌為心苗火下降則熱除咳逆肺火嘔噦胃火膈中痰水脾虛水腫淋瀝泄瀉滲濕遺精益心腎若虛寒遺溺泄精者又當用溫熱之劑峻補其下忌用茯苓淡滲之藥小便結者能通多者能止濕除則便自止生津止渴濕熱去則津生退熱安胎松根靈氣結成以大塊堅白者良去皮乳拌蒸多拌良白者入肺膀胱氣分赤者入心小腸氣分時珍曰白入氣赤入血補心脾白勝利濕熱赤勝惡白蘞畏地榆秦艽龜甲雄黃忌醋皮專能行水治水腫膚脹以皮行皮之義五皮散用之凡腫而煩渴便祕溺赤屬陽水宜五皮散疏鑿飲不煩渴大便溏小便數屬陰水宜實脾飲流氣飲腰以上腫宜汗腰以下腫宜利小便茯神補心主治略同茯苓但茯苓入脾腎之用多茯神入心之用多開心益智安魂養神療風眩心虛健忘多恚即茯苓抱根生者昂按以其抱心故能補心也去皮及中木用茯神心木名黃松節療諸筋攣縮偏風喎斜心掣健忘心木一兩乳香一錢石器炒研名松節散每服二錢木瓜湯下治一切筋攣疼痛乳香能伸筋木瓜能舒筋也琥珀通行水散瘀安神甘平以脂入土而成實故能通塞以寧心安魂魄療癲邪從鎮墜藥則安心神色赤入手少陰足厥陰心肝血分故能消瘀血破癥瘕生肌肉合金瘡從辛溫藥則破血生肌其味甘淡上行能使肺氣下降而通膀胱經曰飲食入胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱凡滲藥皆上行而後下降故能治五淋利小便燥脾土從淡滲藥則利竅行水然石藥終燥若血少而小便不利者僅致燥急之苦又能明目磨翳松脂入土年日久結成或云楓脂結成以摩熱拾芥者真市人多煮雞子及青魚枕僞之摩呵亦能拾芥宜辨用柏子仁末入瓦鍋同煮半日搗末用松節燥濕去風松之骨也堅徑不凋故取其苦溫之性以治骨節間之風濕丹溪曰能燥血中之濕杵碎浸酒良史國公藥酒中用之松脂苦甘性燥祛風去濕化毒殺蟲生肌止痛養生家煉之服食今熬膏多用之齲齒有孔松脂紝塞蟲即從脂出松毛釀酒煮汁代水亦治風痹腳氣柏子仁補心脾潤肝腎辛甘而潤其氣清香能透心腎而悅脾昂按凡補脾藥多燥此潤藥而香能舒脾燥脾藥中兼用最良養心氣潤腎燥助脾滋肝王好古曰肝經氣分藥益智寧神養心聰耳明目甘益血香通竅益血止汗心生血汗為心液除風濕愈驚癇澤皮膚闢鬼魅炒研去油油透者勿用畏菊花側柏葉補陰涼血苦澀微寒本草微溫養陰滋肺而燥土最清血分為補陰要藥止吐衄崩淋腸風尿血痢血一切血證去冷風濕痹歷節風痛肢節大痛晝靜夜劇名白虎歷節風亦風寒濕所致塗湯火傷搗爛水調塗生肌殺蟲炙罨凍瘡汁烏髭發取側者丹溪曰多得月令之氣隨月建方取或炒或生用桂牡蠣為使惡菊花宜酒萬木皆向陽柏獨四指受金之正氣堅徑不凋多壽之木故元旦飲椒柏酒以辟邪肉桂大燥補腎命火辛甘大熱氣厚純陽入肝腎血分平肝補腎補命門相火之不足兩腎中間先天祖氣乃真火也人非此火不能有生無此真陽之火則無以蒸糟粕而化精微脾胃衰敗氣盡而亡矣益陽消陰治痼冷沉寒能發汗疏通血脈宣導百藥辛則善散熱則通行去營衛風寒表虛自汗陽虛腹中冷痛咳逆結氣咳逆亦由氣不歸元桂能引火歸宿丹田木得桂而枯削桂釘木根其木即死又能抑肝風而扶脾土肝木盛則剋土辛散肝風甘益脾土從治目赤腫痛以熱攻熱名曰從治及脾虛惡食命火不足濕盛泄瀉土為木克不能防水古行水方中亦多用桂如五苓散滋腎丸之類補勞明目通經墮胎辛熱能動血故也出嶺南桂州者良州因桂名色紫肉厚味辛甘者為肉桂入肝腎命門去粗皮用其毒在皮去裡外皮當中心者為桂心入心枝上嫩皮為桂枝入肺膀胱及手足得人參甘草麥冬良忌生蔥石脂本草有菌桂筒桂牡桂版桂之殊今用者亦罕分別惟以肉厚氣香者良桂心燥補陽活血苦入心辛走血能引血化汗化膿內托癰疽痘瘡同丁香治痘瘡灰塌益精明目消瘀生肌補勞傷暖腰膝續筋骨治風痹癥瘕噎膈腹滿腹內冷痛九種心痛一蟲二疰三風四悸五食六飲七冷八熱九去來痛皆邪乘於手少陰之絡邪正相激故令心痛桂枝輕解肌調營衛辛甘而溫氣薄升浮入太陰肺太陽膀胱經溫經通脈發汗解肌能利肺氣經曰辛甘發散為陽治傷風頭痛無汗能發中風自汗有汗能止中猶傷也古文通用自汗屬陽虛桂枝為君芍藥甘草為佐加薑棗名桂枝湯能和營實表調和營衛使邪從汗出而汗自止亦治手足痛風脅風痛風有風痰風濕濕痰瘀血氣虛血虛之異桂枝用作引經脅風屬肝桂能平肝東垣曰桂枝橫行手臂以其為枝也又曰氣薄則發泄桂枝上行而解表氣厚則發熱肉桂下行而補腎王好古曰或問桂枝止煩出汗仲景治傷寒發汗數處皆用桂枝湯又曰無汗不得用桂枝汗多者桂枝甘草湯此又能閉汗也二義相通否乎曰仲景云太陽病發熱汗出者此為營弱衛強陰虛陽必湊之故以桂枝發其汗此乃調其營氣則衛氣自和風邪無所容遂自汗而解非若麻黃能開腠理發出其汗也汗多用桂枝者以之調和營衛則邪從汗出而汗自止非桂枝能閉汗孔也亦惟有汗者宜之若傷寒無汗則當以發汗為主而不獨調其營衛矣故曰無汗不得服桂枝有汗不得服麻黃也傷寒例曰桂枝下咽陽盛則斃承氣入胃陰盛則亡枸杞子平補而潤甘平本草苦寒潤肺清肝滋腎益氣生精助陽補虛勞強筋骨肝主筋腎主骨去風明目目為肝竅瞳子屬腎利大小腸治嗌乾消渴昂按古諺有云出家千里勿食枸杞其色赤屬火能補精壯陽然氣味甘寒而性潤仍是補水之藥所以能滋腎益肝明目而治消渴也南方樹高數尺北方並是大樹以甘州所産紅潤少核者良酒浸搗用根名地骨皮見下葉名天精草苦甘而涼清上焦心肺客熱代茶止消渴時珍曰皆三焦氣分之藥地骨皮瀉熱涼血補正氣甘淡而寒降肺中伏火瀉肝腎虛熱能涼血而補正氣內治五內邪熱熱淫於內治以甘寒地骨一斤生地五斤酒煮服治帶下吐血尿血搗鮮汁服咳嗽消渴清肺外治肌熱虛汗上除頭風痛能除風者肝腎同治也肝有熱則自生風與外感之風不同熱退則風自息中平胸脅痛清肝下利大小腸療在表無定之風邪傳尸有汗之骨蒸李東垣曰地為陰骨為里皮為表地骨皮瀉腎火牡丹皮瀉包絡火總治熱在外無汗而骨蒸知母瀉腎火治熱在內有汗而骨蒸四物湯加二皮治婦人骨蒸朱二允曰能退內潮人所知也能退外潮人實不知病或風寒散而未盡作潮往來非柴葛所能治用地骨皮走表又走里之藥消其浮游之邪服之未有不愈者特表明之時珍曰枸杞地骨甘寒平補使精氣充足則邪火自退世人多用苦寒以芩連降上焦知柏降下焦致傷元氣惜哉豫嘗青蒿佐地骨退熱纍有殊功甘草水浸一宿用腸滑者忌枸杞子中寒者忌地骨皮掘鮮者同鮮小薊煎濃汁浸下疳甚效山茱萸補肝腎澀精氣辛溫酸澀補腎溫肝入二經氣分固精祕氣強陰助陽安五臟通九竅聖濟云如何澀劑以通九竅經疏云精氣充則九竅通利昂按山茱萸通九竅古今疑之得經疏一言而意旨豁然始嘆前人識見深遠不易測識多有如此類者即經疏一語而擴充之實可發醫人之慧悟也暖腰膝縮小便治風寒濕痹溫肝故能逐風鼻塞目黃肝虛邪客則目黃耳鳴耳聾腎虛則耳鳴耳聾皆固精通竅之功王好古曰滑則氣脫澀劑所以收之仲景八味丸用之為君其性味可知矣昂按別録甄權皆云能發汗恐屬誤文酸劑斂澀何以反發仲景亦安取發汗之藥為君乎李士材曰酸屬東方而功多在北方者乙癸同源也肝為乙木腎為癸水去核核能滑精用惡桔梗防風防己酸棗仁補而潤斂汗寧心甘酸而潤凡仁皆潤專補肝膽炒熟酸溫而香亦能醒脾故歸脾湯用之助陰氣堅筋骨除煩止渴斂陰生津斂汗經疏曰凡服固表藥而汗不止者用棗仁炒研同生地白芍五味麥冬竹葉龍眼肉煎服多效汗為心液故也寧心心君易動皆由膽怯所致經曰凡十一官皆取決於膽也療膽虛不眠溫膽湯中或用之肝虛則膽也虛肝不藏魂故不寐血不歸脾臥亦不安金匱治虛勞煩不眠用酸棗仁湯棗仁二升甘草一兩炙知母茯苓芎藭各二兩深師加生薑二兩此補肝之劑經曰臥則血歸於肝蘇頌曰一方加桂一兩二方棗仁並生用治不得眠豈得以煮過便為熟乎酸痹久瀉酸收澀香舒脾生用酸平療膽熱好眠時珍曰今人專以為心家藥殊昧此理昂按膽熱必有心煩口苦之證何以反能好眠乎溫膽湯治不眠用二陳加竹茹枳實二味皆涼藥乃以涼肺胃之熱非以溫膽經之寒也其以溫膽名湯者以膽欲不寒不燥當溫為候耳膽熱好眠四字不能無疑也炒研用惡防己杜仲補腰膝甘溫能補微辛能潤色紫入肝經氣分潤肝燥補肝虛子能令母實故兼補腎肝充則筋健腎充則骨強能使筋骨相著皮中有絲有筋骨相著之象治腰膝痠痛經曰腰者腎之府轉移不能腎將憊矣膝者筋之府屈伸不能筋將憊矣一少年新娶得腳軟病且痛甚作腳氣治不效孫林曰此腎虛也用杜仲一兩半酒半水煎服六日全愈按腰痛不已者屬腎虛痛有定處屬死血往來走痛屬痰腰冷身重遇寒即發屬寒濕或痛或止屬濕熱而其原多本於腎虛以腰者腎之府也陰下濕癢小便餘瀝胎漏懷孕瀝血胎墜慣墜胎者受孕一兩月用杜仲八兩糯米煎湯浸透炒斷絲續斷二兩酒浸山藥六兩為糊丸或棗肉為丸米飲下二藥大補腎氣托住胎元則胎不墜出漢中厚潤者良去粗皮銼或酥炙酒炙蜜炙鹽酒炒薑汁炒斷絲用惡黑參女貞子平補肝腎甘苦而平少陰之精隆冬不雕益肝腎安五臟強腰膝明耳目烏髭發補風虛除百病女貞酒蒸曬乾二十兩桑椹干十兩旱蓮草十兩蜜丸治虛損百病如四月即搗桑椹汁七月即搗旱蓮汁和藥不必用蜜時珍曰女貞子上品妙藥古方罕用何哉女貞冬青本草作二種實一物也冬至採佳酒蒸用近人放蠟蟲於此樹楮實平補助陽甘寒助陽氣起陰痿補虛勞壯筋骨明目充肌時珍曰別録大明皆云楮實大補益而修真祕書又云久服令人骨痿濟生祕覽治骨哽用楮實煎湯豈非軟骨之徵乎本草發明甚言其功而云今補藥中罕用惜未之察耳取子浸去浮者酒蒸用楮皮善行水治水腫氣滿皮可為紙楮汁和白芨飛面調糊接紙永不解脫桑白皮瀉肺行水十劑作燥以其行水也甘辛而寒瀉肺火羅謙甫曰是瀉肺中火邪非瀉肺氣也火與元氣不兩立火去則氣得安矣故本經又云益氣東垣曰甘固元氣之不足而補虛辛瀉肺氣之有餘而止嗽然性不純良不宜多用錢乙瀉白散桑皮地骨各一兩甘草五錢每服二錢入粳米百粒煎時珍曰桑皮地骨皆能瀉火從小便出甘草瀉火緩中粳米清肺養血乃瀉肺諸方之準繩也一婦鼻久不聞香臭後因他疾繆仲醇為處方每服桑皮至七八錢服久而鼻塞忽通利二便散瘀血下氣行水止嗽清痰發明曰肺中有水則生痰而作嗽除水氣正所以瀉火邪實則瀉其子也火退氣寧則補益在其中矣十劑曰燥可去濕桑白皮赤小豆之類是也治肺熱喘滿唾血熱渴水腫臚脹肺氣虛及風寒作嗽者慎用為線可縫金瘡刮去外皮取白用如恐其瀉氣用蜜炙之續斷桂心為使忌鐵桑乃箕星之精其木利關節養津液行水録驗方枝皮細銼釀酒服良祛風桑枝一升細銼炒香水三升熬至二升一日服盡名桑枝煎治風氣腳氣口渴其火拔引毒氣祛風寒濕痹凡癰疽不起瘀肉不腐瘰癧流注臁頑惡瘡不愈用桑木片扎成小把燃火吹息灸患處內服補托藥良煎補藥熬諸膏宜用桑柴內亦宜桑枝攪桑椹甘涼色黑入腎而補水利五臟關節安魂鎮神聰耳明目生津止渴煉膏治服金石藥熱渴利水消腫解酒烏髭曬乾為末蜜丸良取極熟者滬汁熬膏入蜜煉稠點湯和酒並妙入燒酒經年愈佳每日湯點服亦治瘰癧名文武膏以椹名文武實也桑葉甘寒手足陽明大腸胃之藥涼血刀斧傷者為末干貼之妙燥濕去風明目採經霜者煎湯洗眼去風淚洗手足去風痹桑葉黑芝麻等分蜜丸名扶桑丸除濕去風烏須明目以五月五日六月六日立冬日採者佳一老人年八十四夜能細書詢之云得一奇方每年九月二十三日桑葉洗目一次永絶昏暗末服止盜汗嚴州有僧每就枕汗出遍身比旦衣被皆透二十年不能療監寺教採帶露桑葉焙乾為末空心米飲下二錢數日而愈代茶止消渴桑寄生補筋骨散風濕苦堅腎助筋骨而固齒長髮齒者骨之餘發者血之餘甘益血止崩漏而下乳安胎三症皆由血虛外科散瘡瘍追風濕他樹多寄生以桑上採者為真雜樹恐反有害莖葉並用忌火梔子瀉心肺三焦之火苦寒輕飄象肺色赤入心瀉心肺之邪熱使之屈曲下行從小便出海藏曰或用為利小便藥非利小便乃肺清則化行而膀胱津液之府得此氣化而出也而三焦之鬱火以解熱厥厥有寒熱二證心痛以平丹溪曰治心痛當分新久若初起因寒因食宜當溫散久則鬱而成熱若用溫劑不助痛添病乎古方多用梔子為君熱藥為之響導則邪易伏此病雖日久不食不死若痛止恣食病必再作也吐衄血淋血痢之病以息最清胃脘之血炒黑末服吹鼻治衄本草匯曰治實火之血順氣為先氣行則血自歸經治虛火之血養正為先氣壯則自能攝血丹溪曰治血不可單行單止亦不可純用寒藥氣逆為火順氣即是降火治心煩懊憹不眠仲景用梔子豉湯王好古曰煩者氣也燥者血也故用梔子治肺煩香豉治腎燥亦用作吐藥以邪在上焦吐之邪散經所謂其高者因而越之也按梔豉湯吐虛煩客熱瓜蒂散吐痰食宿寒五黃古方多用梔子茵陳五淋亡血津枯口渴目赤紫癜白癩皰皶瘡瘍皮腠肺所主故也生用瀉火炒黑止血薑汁炒止煩嘔內熱用仁表熱用皮豬苓通行水苦泄滯淡利竅甘助陽入膀胱腎經升而能降開腠發汗利便行水與茯苓同而不補治傷寒溫疫大熱經疏曰大熱利小便亦分消之意懊憹消渴腫脹淋濁瀉痢痎瘧瘧多由暑暑必兼濕經曰夏傷於暑秋必痎瘧然耗津液多服損腎昏目腎水不足則目昏仲景五苓散豬苓茯苓澤瀉白朮桂為治水之總劑昂按經曰膀胱者州都之官津液藏焉氣化則能出矣用肉桂辛熱引入膀胱所以化其氣也除桂名四苓散資生經曰五苓散能生津液亦通大便曾世榮治驚風亦用五苓散白茯苓安心神澤瀉導小便小腸利而心氣平木得桂而枯能抑肝而風自止可謂善用五苓者矣多生楓樹下塊如豬屎故名馬屎曰通豬屎曰苓苓即屎也古字通用肉白而實者良去皮用黃柏瀉相火補腎水苦寒微辛沉陰下降瀉膀胱相火足太陽引經藥補腎水不足堅腎潤燥發明曰非真能補也腎苦燥急食辛以潤之腎欲堅急食苦以堅之也相火退而腎固則無狂蕩之患矣按腎本屬水虛則熱矣心本屬火虛則寒矣除濕清熱療下焦虛骨蒸勞熱陰虛生內熱諸痿癱瘓熱勝則傷血血不榮筋則軟短而為拘濕勝則傷筋筋不束骨則弛長而為痿合蒼朮名二妙散清熱利濕為治痿要藥或兼氣虛血虛脾虛腎虛濕痰死血者當隨證加治目赤耳鳴腎火消渴便閉黃疸水腫王善夫病便閉腹堅如石腿裂出水飲食不下治以利小便藥遍服不效東垣曰此奉養太過膏梁積熱損傷腎水致膀胱乾涸小便不化火又逆上而為嘔噦難經所謂關則不得小便格則吐逆者內經所謂無陰則陽無以化也遂處以北方大苦寒之劑黃柏知母各一兩酒洗焙研桂一錢為引名滋腎丸每服二百丸未幾前陰如刀刺火燒溺出床下成流腫脹遂消水瀉熱痢痔血腸風漏下赤白皆濕熱為病諸瘡痛癢頭瘡研末敷之口瘡蜜炒研含凡口瘡用涼藥不效者乃中氣不足虛火上炎宜用反治之法參朮甘草補上之虛乾薑散火之際甚者加附子或噙官桂引火歸元殺蟲安蛔久服傷胃尺脈弱者禁用若虛火上炎服此苦寒之劑有寒中之變時珍曰知母佐黃柏滋陰降火有金水相生之義古云黃柏無知母猶水母之無蝦也蓋黃柏能制命門膀胱陰中之火知母能清肺金滋腎水之化源丹溪曰君火者人火也心火也可以水滅可以直折黃連之屬可以制之相火者天火也龍雷之火也陰火也不可以水濕制之當從其性而伏之惟黃柏之屬可以降之按火有虛火實火燥火濕火鬱火相火之異虛火宜補實火宜瀉燥火宜滋潤鬱火宜升發濕火由濕鬱為熱多病胕腫經所謂諸腹脹大皆屬於熱諸病胕腫皆屬於火是也宜利濕清熱而兼補脾相火寄於肝腎乃龍雷之火非苦寒所能勝宜滋陰養血壯水之主以制陽光又按諸病之中火證為多有本經自病者如忿怒生肝火焦思生心火之類是也有子母相剋者如金火克肺金肝木克脾火之類是也有臟腑相移者如肺火咳嗽久則移熱於大腸而泄瀉心火煩焦久則移熱於小腸而為淋閉之類是也又有別經相移者有數經合病者當從其重者而治之川産肉厚色深者良生用降實火蜜炙則不傷胃炒黑能止崩帶酒製治上蜜制治中鹽制治下又末乳調能塗凍瘡枳實枳殼瀉破氣行痰枳實小枳殼大苦酸微寒其功皆能破氣氣行則痰行喘止痞脹消脾無積血心下不痞濁氣在上則生腹脹東垣曰枳實治下而主血枳殼治上而主氣痛刺息後重除治胸痹結胸食積五膈痰癖癥結嘔逆咳嗽水腫脅脹肝鬱瀉痢淋閉痔腫腸風除風去痹辛散風開胃健脾所主略同但枳實利胸膈枳殼寬腸胃枳實力猛大小承氣湯皆用之丹溪曰枳實瀉痰能沖牆倒壁枳殼力緩為少異孕婦及氣虛人忌用按本草殼實皆云明目思之不得其解然目疾方中多用之豈以其破濁氣即能升清氣乎本經又言枳實益氣想亦同此理也故厚朴調中亦有益氣明目之文王好古曰枳實佐以參朮乾薑則益氣佐以硝黃牽牛則破氣此本經所以言益氣而復言消痞也張元素曰枳殼泄肺走大腸多用損胸中至高之氣昔湖陽公主難産方士進瘦胎飲用枳殼四兩甘草三兩五月後日服一錢張潔古改以枳朮名束胎丸寇宗奭明其不然蓋孕婦全賴血氣以養胎血氣充實胎乃易生彼公主奉養太過氣實有餘故可服之若概施則誤矣時珍曰八九月胎氣盛壅滯用枳殼蘇梗以順氣胎前無滯則産後無虛也氣弱者大非所宜矣皮厚而小為枳實殼薄虛大為枳殼陳者良麩炒用時珍曰殼實上世未分魏晉始分用潔古東垣始分殼治上實治下海藏始分殼主氣實主血然仲景治上焦胸痹痞滿用枳實諸方治下血痢痔腸祕後重用枳殼則實不獨治下而殼不獨治高也蓋自飛門至魄門皆肺主之三焦相通一氣而已飛門口也魄門即肛門厚朴瀉下氣散滿苦降能瀉實滿辛溫能散濕滿王好古曰別録言厚朴溫中益氣消痰下氣果泄氣乎益氣乎益與枳實大黃同用則瀉實滿所謂消痰下氣是也與橘皮蒼朮同用則除濕滿所謂溫中益氣是也與解利藥同用則治傷寒頭痛與瀉利藥同用則厚腸胃大抵味苦性溫用苦則瀉用溫則補也同大黃枳實即承氣湯同橘皮蒼朮即平胃散按脹滿症多不同清補貴得其宜氣虛宜補氣血虛宜補血食積宜消導瘀滯宜行痰挾熱宜清熱濕盛宜利濕寒鬱者散寒怒郁者行氣蓄血者消瘀不宜專用行散藥亦有服參耆而脹反甚者以挾食挾血挾熱挾寒不可概作脾虛氣弱治也入足太陰陽明脾胃平胃調中佐蒼朮為平胃散平濕土之太過以致於中和消痰化食厚腸胃行結水破宿血殺臟蟲治反胃嘔逆喘咳瀉痢冷痛霍亂誤服脫人元氣孕婦忌之榛樹皮也肉厚紫潤者良去粗皮薑汁炙或醋炒用乾薑為使惡澤瀉硝石忌豆犯之動氣檳榔瀉氣行水破脹攻堅苦溫破滯辛溫散邪瀉胸中至高之氣使之下行性如鐵石能墜諸藥至於極下攻堅去脹消食行痰下水除風殺蟲醒酒治痰癖癥結瘴癘瘧痢水腫腳氣腳氣衝心尤須用之童便薑汁溫酒調服治大小便氣祕裡急後重同木香用木香能利氣過服則損真氣嶺南多瘴以檳榔代茶其功有四醒能使醉醉能使醒飢能使飽飽能使飢然泄臟氣無瘴之地忌用雞心尖長破之作錦紋者良程星海曰陰毛生蝨也鮮良方以檳榔煎水洗即除又方以心紅擦之亦好大腹皮瀉下氣通行水辛泄肺溫和脾下氣行水通大小腸治水腫腳氣痞脹痰膈瘴瘧霍亂氣虛者忌用子似檳榔腹大形扁故與檳榔同功取皮酒洗黑豆湯再洗煨用鳩鳥多棲其樹故宜洗淨槐實即槐角瀉風熱涼大腸苦寒純陰入肝經氣分疏風熱潤肝燥涼大腸治煩悶風眩痔血腸風糞前有血名外痔糞後有血名內痔穀道胬肉名舉痔頭上有孔名痔瘻瘡內有蟲名蟲痔大法用槐角地榆生地以涼血芩連梔柏以清熱防風秦艽以祛風濕芎歸人參以和血生血枳殼以寬腸升麻以升提治腸風略同不宜專用寒涼須兼補劑收功陰瘡濕癢明目止淚清肝淚為肝熱固齒烏髭十月上已採漬牛膽中陰乾百日食後吞一枚明目補腦發白還黑腸風痔血尤宜服之殺蟲根皮皆能洗痔墮胎去單子及五子者銅槌槌碎牛乳拌蒸槐乃虛星之精槐花苦涼入肝大腸血分而涼血血涼則陰自足治風熱目赤赤白泄痢五痔腸風吐崩諸血舌上無故出血如線者名血衄炒研摻之陳者良苦楝子一名金鈴子瀉濕熱治疝殺蟲苦寒有小毒能入肝舒筋能導小腸膀胱之熱因引心包相火下行通利小便為疝氣要藥亦治傷寒熱狂熱厥腹痛心痛殺三蟲療瘍疥夷堅志消渴症有蟲耗其津液者取根皮濃煎加少麝服下其蟲而渴自止脾胃虛寒忌之川産良酒蒸寒因熱用去皮取肉去核用用核則槌碎漿水煮一伏時去肉用茴香為使蔓荊子輕宣散上部風熱辛苦微寒輕浮升散入足太陽陽明厥陰膀胱胃肝經搜風涼血通利九竅治濕痹拘攣頭痛腦鳴太陽脈絡於腦目赤齒痛齒雖屬腎為骨之餘而上齦屬足陽明下齦屬手陽明陽明風熱上攻則動搖腫痛頭面風虛之證明目固齒長髮澤肌去膜打碎用亦有酒蒸炒用者惡石膏烏頭石南葉宣去風補腎辛散風苦堅腎補內傷陰衰利筋骨皮毛為治腎虛腳弱風痹要藥婦人不可久服令思男時珍曰今人絶不知用蓋為藥性論有令人陰痿之說也不知此藥能令腎強人或藉此縱欲以致痿弱歸咎於藥良可慨也昂按石南補陰祛風則有之然味辛不熱不助相火亦未聞淫邪方中用石南者別録思男之說殆不可信關中者佳炙用辛夷即木筆花宣散上焦風熱辛溫輕浮入肺胃氣分能助胃中清陽上行通於頭腦溫中解肌通九竅利關節主治鼻淵鼻塞肺主鼻膽移熱於腦則鼻多濁涕而淵風寒客於腦則鼻塞經曰腦滲為涕王冰曰膽液不澄則為濁涕如泉不已故曰鼻淵及頭痛面䵟音旱黑斑可作面脂目眩齒痛九竅風熱之病然性走竄氣虛火盛者忌服時珍曰肺開竅於鼻陽明胃脈環鼻上行腦為元神之府鼻為命門之竅人之中氣不足清陽不升則頭為之傾九竅為之不利吾鄉金正希先生嘗語余曰人之記性皆在腦中小兒善忘者腦未滿也老人健忘者腦漸空也凡人外見一物必有一形影留於腦中昂按今人每記憶往事必閉目上瞪而思索之此即凝神於腦之意也不經先生道破人皆習焉而不察矣李時珍曰腦為元氣之府其於此義殆暗符歟去外皮毛毛射肺令人咳微炒用芎藭為使惡石脂畏黃耆菖蒲石膏郁李仁潤燥瀉氣破血辛苦而甘入脾經氣分性降下氣行水破血潤燥治水腫癃急大腸氣滯關格不通用酒能入膽治悸目張不眠一婦因大恐而病愈後目張不瞑錢乙曰目系內連肝膽恐則氣結膽橫不下郁李潤能散結隨酒入膽結去膽下而目瞑矣然治標之劑多服滲人津液去皮尖蜜浸研金櫻子澀精固腸酸澀入脾肺腎三經固精祕氣治夢泄遺精和芡實為丸名水陸丹泄痢便數丹溪曰經絡隧道以通暢為平和而昧者以澀性為快熬膏食之自作不靖咎將誰執李時珍曰無故而食以恣欲則不可若精氣不固者服之何害似榴而小黃赤有刺取半黃熟則純甘去刺核用熬膏亦良筆談云熬膏則甘全失澀味訶子澀腸斂肺瀉氣苦以泄氣消痰酸以斂肺降火東垣曰肺苦氣上逆急食苦以泄之以酸補之訶子苦重泄氣酸輕不能補肺故嗽藥中不用澀以收脫止瀉溫以開胃調中治冷氣腹脹膈氣嘔逆痰嗽喘急肺挾痰水或被火傷故宜苦酸以斂之瀉痢脫肛腸風崩帶皆取其酸澀開音止渴肺斂則音開火降則渴止古方有訶子清音湯然苦多酸少雖澀腸而泄氣氣虛及嗽痢初起者忌服同烏梅倍子則收斂同陳皮厚朴則下氣得人參治肺虛寒嗽得陳皮砂仁治冷氣腹脹佐白朮蓮子治虛寒久瀉佐樗皮治腸癖便血同蛇床五味山茱續斷杜仲治虛寒帶下從番舶來番名訶黎勒嶺南亦有六稜黑色肉厚者良酒蒸一伏時去核取肉用用肉則去核生用清金行氣煨熟溫胃固腸海魚放涎凝滑船不能行投訶子湯尋化為水其化痰可知烏藥宣順氣辛溫香竄上入脾肺下通腎經能疏胸腹邪逆之氣一切病之屬氣者皆可治氣順則風散故用以治中氣中風厥逆痰壅口噤脈伏身溫為中風身冷為中氣又有痰為中風無痰為中氣局方治此亦用烏藥順氣散許學士云暴怒傷陰暴喜傷陽憂愁不已氣多厥逆往往得中氣之證不可作中風治及膀胱冷氣小便頻數反胃吐食宿食不消瀉痢霍亂女人血凝氣滯小兒蛔蛔外如瘡癤疥癘皆成於血逆理氣亦可治之療貓犬百病氣虛氣熱者忌用時珍曰四磨湯治七情鬱結上氣喘急者降中兼收瀉中兼補也方用人參烏藥沉香檳榔各濃磨汁七分合煎縮泉丸用同益智等分為丸治虛寒便數者取其通陽明少陰也根有車轂紋形如連珠者良酒浸一宿用亦有煅研用者五加皮宣去風濕補壯筋骨辛順氣而化痰苦堅骨而益精溫祛風而勝濕逐肌膚之瘀血療筋骨之拘攣腎得其養則妄水去而骨壯肝得其養則邪風去而筋強治五緩虛羸五臟筋脈緩縱千金方補云五月五日採莖七月七日採葉九月九日採根合為末治五勞陰痿囊濕女子陰癢濕生蟲小兒腳弱明目愈瘡釀酒尤良王綸曰風病飲酒能生痰火惟五加浸酒益人莖青節白花赤皮黃根黑上應五車之精芬香五葉者佳遠志為使惡玄參椿樗白皮澀腸燥濕苦燥濕寒勝熱澀收斂入血分而澀血去肺胃之陳痰治濕熱為病泄瀉久痢崩帶腸風夢遺便數有斷下之功痢疾滯氣未盡者勿遽用勉強固澀必變他證去疳䘌樗皮尤良時珍曰椿皮入血氣而性澀樗皮入氣分而勝利凡血分受病不足者宜椿皮氣分受病有郁者宜樗皮乾坤生意治瘡腫下藥用樗皮水研服汁取利是其驗矣昂按樗皮止瀉痢終是澀劑寇氏曰一婦年四十餘耽飲無度多食魚蟹積毒在臟日夜二三十瀉便與膿血雜下大腸連肛門甚痛用止血痢藥不效用腸風藥益甚蓋腸風有血無膿也服熱藥腹愈痛血愈下服冷藥注瀉食減服溫平藥則若不知年餘待斃或教服人參散樗皮人參各一兩為末空心溫酒或米飲下二錢遂愈昂按此方仍是作痢疾治香者為椿肌實而赤嫩其苗可茹臭者為樗肌虛而白主治略同根東引者良去粗皮或醋炙蜜炙用忌肉面榆白皮滑利竅甘滑下降入大小腸膀胱經行經脈利諸竅通二便滲濕熱滑胎産或胎死腹中服汁可下下有形留著之物治五淋腫滿備急方搗屑作粥食小便利差喘咳不眠嵇康養生論榆令人瞑療疥癬禿瘡消赤腫妒乳乳癰汁不出內結成腫名妒乳和陳醋滓調日六七易效十劑曰滑可去著冬葵子榆白皮之屬是也有赤白二種去粗皮取白用採皮為面荒年當糧可食香劑以之調和黏滑勝於膠漆秦皮澀而補明目苦寒色青性澀補肝膽而益腎以能平木能除肝熱故治目疾洗目赤退翳膜驚癇以其收澀而寒故治崩帶下痢仲景白頭翁湯用之以其澀而補下焦故能益精有子時珍曰天道貴嗇惟收澀故能補今人只知治目一節幾於廢棄良為可婉出西土皮有白點漬水碧色書紙不脫者真大戟為使惡吳茱萸海桐皮宣祛風濕苦溫經疏云應兼辛入血分祛風去濕殺蟲能行經絡達病所治風蹶頑痹腰膝疼痛傳信方海桐薏苡各二兩芎藭羌活地骨皮五加皮各二兩甘草五錢生地七兩酒二斗浸此方不得增減早中晚飲常令醺醺疳䘌疥癬目赤煎洗牙蟲煎服或含漱出廣南皮白堅韌作索不爛蕤仁亦名白桵補明目甘溫別録微寒入心肝脾三經消風散熱益水生光三經皆血臟也血得其養則目疾平凡目病在表當疏風清熱在裡屬腎虛血少神勞宜補腎養血安神遠視為腎水虧近視為火不足治目赤腫痛眥爛淚出亦治心腹邪熱結氣痰痞今人惟用療眼陳藏器曰生治足睡熟治不眠叢生有刺實如五味圓扁有紋紫赤可食取仁浸去皮尖研用密蒙花潤肝明目甘而微寒入肝經氣血分潤肝燥治目中赤脈青盲膚翳赤腫眵音鴟眼脂淚小兒疳氣攻眼産蜀中葉冬不雕其花繁密蒙茸故名揀淨酒浸一縮候乾蜜拌蒸曬三次芙蓉花瀉涼血解毒辛平性滑涎黏清肺涼血散熱止痛消腫排膿治一切癰疽腫毒有殊功用芙蓉花或葉或皮或根生搗或乾研末蜜調塗四圍中間留頭干則頻換初起者即覺清涼痛止腫消已成者即膿出已潰者則易斂瘍科祕其名為清涼膏清露散鐵箍散皆此物也或加赤小豆末或蒼耳燒存性為末加入亦妙山茶花瀉涼血甘微辛寒色赤入血分治吐衄腸風麻油調末塗湯火傷用紅者為末入童便薑汁酒調服可代鬱金木槿瀉熱苦涼活血潤燥治腸風瀉血痢後熱渴作飲服令人得睡川産者治癬瘡癬瘡有蟲用川槿皮肥皂水浸時時搽之或浸汁磨雄黃尤妙用根皮杉木宣散腫脹辛溫去惡氣散風毒治腳氣腫痛心腹脹滿洗毒瘡柳子厚纂救死方云得腳氣夜半痞絶脅塊如石昏困且死鄭洵美傳杉木湯食頃大下塊散氣通用杉木節一升橘葉一升無葉以皮代大腹檳榔七枚連子槌碎童便三升煮分二服若一服得快利即停後服有赤白二種赤油斑如野雞者作棺尤貴性直燒炭最發火藥烏臼木瀉熱毒苦涼性沉而降利水通腸功勝大戟療疔腫解砒毒極能瀉下凡患腫毒中砒毒者不拘根皮枝葉搗汁多飲得大利即愈虛人忌用子可作燭水楊柳宣行氣血苦平痘瘡頂陷漿滯不起者用枝煎湯浴之此因氣凝血滯或風寒外束而熱得此暖氣透達漿隨暖而行再用助氣血藥更效枝煎汁治黃疸皂角通關竅搜風辛鹹性燥氣浮而散入肺大腸經金勝木燥勝風故兼入肝搜風泄熱吹之導之則通上下關竅而湧吐痰涎搐鼻立作噴嚏治中風口噤胸痹喉痹凡中風不省人事口噤不能進藥急提頭髮手掐人中用皂角末或半夏末吹入鼻中有嚏者生無嚏者肺氣已絶死或用稀涎散吐之皂角末一兩白礬五錢每用一錢溫水調灌或加藜蘆少麝鵝翎探喉令微吐稀涎再用藥治年老氣虛人忌用服之則除濕去垢最去油膩刮人腸胃消痰破堅取中段湯泡服治老人風祕殺蟲下胎治風濕風癩痰喘腫滿堅症囊結厥陰肝脈絡陰器寒客肝經則為囊結塗之則散腫消毒煎膏貼一切痹痛合蒼朮焚之闢瘟疫濕氣一種小如豬牙一種長而枯燥一種肥厚多脂多脂者良去粗皮子弦或蜜炙酥炙絞汁燒灰用柏實為使惡麥冬畏人參苦參性能消鐵不結莢者鑿樹一孔八鐵封之則結莢矣錘碾見之久則成孔故此木不能燒爨皂角刺辛溫搜風殺蟲功同皂莢但其鋒鋭能直達患處潰散癰疽治癰毒妒乳風厲惡瘡癰同癩癘乃營氣熱附風寒客於脈而不去經曰脈風成為癘脈與營皆血也蒸曬為末大黃湯調下胎衣不下癰疽已潰者禁用孕婦忌之皂角子通大便燥結煅存性用汪機曰其性得濕則滑李時珍曰亦辛以潤之之義非得濕則滑也肥皂莢瀉熱毒辛溫除風濕去垢膩故澡身盥面用之療無名腫毒有奇功不拘奇瘍惡毒用生肥皂去子弦及筋搗爛釅醋和敷立愈不愈再敷奇驗此方方書未載若貧人僻地倉卒無藥者用之甚便故特著之集成曰生肥皂火煅存性生油膩粉調敷諸惡瘡棕櫚澀止血苦能泄熱澀可收脫燒黑能止血紅見黑則止不可燒過棕櫚側柏卷柏燒存性飯丸止遠年下血亦可煎服治吐衄下痢崩帶腸風失血過多者初起未可遽用年久敗棕尤良與發灰同用更良茶瀉熱清神消食苦甘微寒下氣消食去痰熱除煩渴清頭目得春初生髮之氣故多肅清上膈之功湯液云茶苦寒下行如何是清頭目蒙鑑曰熱下降則上自清矣醒昏睡清神解酒食油膩燒炙之毒利大小便多飲消脂最能去油寒胃故濃茶能引吐千金療卒頭痛如破非中冷中風由痰厥氣上衝所致名厥頭痛單煮茶恣飲取吐直吐出膽汁乃已渴而即瘥酒後飲茶引入膀胱腎經患瘕疝水腫空心亦忌之與姜等分濃煎名薑茶飲治赤白痢茶助陰姜助陽使寒熱平調並能消暑解酒食毒陳細者良粗者損人吳茱萸燥去風寒濕宣下氣開鬱辛苦大熱有小毒入足太陰脾血分少陰厥陰腎肝氣分其氣燥故專入肝而旁及脾腎潤肝燥脾溫中下氣除濕解鬱去痰殺蟲開腠理逐風寒治厥陰頭痛仲景用吳茱萸湯陰毒腹痛痛在小腹嘔逆吞酸俗名醋心亦有吐酸者宜降火清痰用吳萸作響導蔡中丞苦痰飲率十日一發頭痛背寒嘔酸不食得一方茯苓吳萸湯泡七次等分蜜丸名吳仙丹前後痰方無此者痞滿噎膈胃冷食積瀉痢血痹陰疝痔疾腸風腳氣水腫口舌生瘡為末醋調貼足心過夜便愈能引熱下行衝脈為病氣逆裡急宜此主之性雖熱而能引熱下行段成式言椒性善下吳萸性上似不盡然寇宗奭曰此物下氣甚速東垣曰濁陰不降厥氣上逆膈塞脹滿非吳萸不可治也昂按吳萸辛熱故性上氣味俱厚故善降利大腸壅氣故治腸風痔痢下産後余血故産後必用之然走氣動火昏目發瘡血虛有火者禁用陳者良泡去苦烈汁用須泡數次止嘔黃連水炒治疝鹽水炒治血醋炒惡丹參硝石川椒宣散寒濕燥補火辛熱純陽入肺發汗散寒治風寒咳嗽入脾暖胃燥濕消食除脹治心腹冷痛吐瀉澼痢痰飲水腫千金方有人冷氣入陰囊腫滿生椒擇淨帛裹著丸囊厚半寸須臾熱氣大通日再易取消瘥梅師用桂末塗亦良入右腎命門補火治腎氣上逆能下行導火歸元每日吞三十粒大能溫補下焦陽衰溲數陰汗泄精下焦虛寒堅齒明目破血通經除症安蛔蟲見椒則伏仲景蛔厥烏梅丸用之凡蟲嚼腹痛者面白唇紅時發時止殺鬼疰蟲魚毒最殺勞蟲危氏神授丸川椒炒出汗為末米飲下三錢有人病傳尸勞遇異人傳此方服至二斤吐出蟲如蛇而安肺胃素熱者忌服丹溪曰食椒既久則火自水中生多被其毒也秦産名秦椒俗名花椒實稍大蜀産肉厚皮皺為川椒閉口者殺人微炒去汗搗去裡面黃殼取紅用名椒紅得鹽良入腎使杏仁畏款冬防風附子雄黃麻仁涼水椒乃玉衡星之精闢疫伏邪故歲旦飲椒柏酒子名椒目苦辛專行水道不行穀道能治水臌除脹定喘及腎虛耳鳴胡椒燥快膈消痰辛熱純陽暖胃快膈下氣消痰治寒痰食積腸滑冷痢陰毒腹痛胃寒吐水牙齒浮熱作痛合蓽茇散之殺一切魚肉鱉菌音尋上聲毒食料宜之嗜之者衆多食損肺走氣動火發瘡痔臟毒齒痛目昏畢澄茄一類二種主治略同蘇木瀉行血解表甘鹹辛涼入三陰血分行血去瘀發散表裡風氣宜與防風同用治産後血暈肘後方煮汁服海藏方加乳香酒服脹滿欲死血痛血瘕經閉氣壅癰腫朴傷排膿止痛多破血少和血出蘇方國交愛亦有忌鐵沉香重宣調氣補陽辛苦性溫諸木皆浮而沉香獨沉故能下氣而墜痰涎怒則氣上能平則下氣能降亦能升氣香入脾故能理諸氣而調中東垣曰上至天下至泉用為使最相宜其色黑體陽故入右腎命門暖精助陽行氣不傷氣溫中不助火治心腹疼痛噤口毒痢症癖邪惡冷風麻痹氣痢氣淋色黑沉水者良香甜者性平辛辣者熱入湯劑磨汁用入丸散紙裹置懷中待燥碾之忌火鷓鴣斑者名黃沉如牛角黑者名黑沉咀之軟削之卷者名黃臘沉甚難得浮者名棧香半沉者名煎香雞骨香雖沉而心空並不堪用檀香宣理氣辛溫調脾肺利胸膈去邪惡能引胃氣上升進飲食為理氣要藥內典云旃檀塗身能除熱惱昂按內興欲念亦稱熱惱蓋諸香多助淫火惟檀香不然故釋氏焚之道書又以檀為俗香不可以供上真紫檀重和血鹹寒血分之藥和榮氣消腫毒敷金瘡止血定痛降真香焚之能降諸真故名宣辟惡止血生肌辛溫辟惡氣怪異療傷折金瘡止血定痛消腫生肌周崇逐寇被傷血出不止敷花芯石散不效軍士李高用紫金藤散敷之血止痛定明日結痂無瘢曾救萬人紫金藤即降真香之最佳者也丁香燥暖胃補腎辛溫純陽泄肺溫胃大能療腎壯陽事暖陰戶治胃冷壅脹嘔噦厄逆丹溪曰人之陰氣以胃為養土傷則木挾相火直衝清道而上作咳逆古人以為胃寒用丁香柿蒂不能清痰利氣惟助火而已按厄逆有痰阻氣滯食塞不得升降者有火鬱下焦者有傷寒汗吐下後中氣大虛者有陽明內熱失下者有痢疾大下胃虛而陰火上衝者時珍曰當視虛實陰陽或泄熱或降氣或溫或補或吐或下可也古方單用柿蒂取其苦溫降氣濟生加丁香生薑取其開鬱散痰蓋從治之法亦嘗有收效者矣朱氏但執以寒治熱矯枉之過矣痃癖奔豚腹痛口臭丹溪曰脾有鬱火溢入肺中濁氣上行發為口氣治以丁香是揚湯止沸耳唯香薷甚捷腦疳齒䘌痘瘡胃虛灰白不發熱證忌用有雌雄二種雌即雞舌香力大若用雄去丁蓋乳子畏鬱金火乳香一名熏陸香宣活血伸筋香竄入心苦溫補腎辛溫通十二經能去風伸筋筋不伸者敷藥加用活血調氣托裡護心香徹瘡孔能使毒氣外出不致內攻生肌止痛治心腹諸痛口噤耳聾癰疽瘡腫産難折傷皆取其活血止痛亦治癲狂以能去風散瘀靈苑辰砂散辰砂一兩乳香棗仁各五錢酒下恣飲沉醉聽睡一二日勿動驚醒則不可治本事加人參一兩名寧志膏出諸番如乳頭明透者良市人多以楓香僞之性黏難研水飛過用鉢坐熱水中研之或用燈心同研則易細沒藥宣散瘀定痛苦平經疏云應兼辛入十二經散結氣通滯血消腫定痛生肌寇宗奭曰血滯則氣壅氣壅則經絡滿急故腫且痛補心膽虛肝血不足推陳致新能生好血治金瘡杖瘡血肉受傷故瘀而發熱作痛惡瘡痔漏翳暈目赤肝經血熱産後血氣痛破症墮胎乳香活血沒藥散血皆能消腫止痛生肌故每兼用瘡疽已潰者忌用膿多者勿敷出諸南番赤色類於琥珀者良主治與乳香同楓脂香即白膠香宣調氣血苦平活血解毒止痛生肌治血衄咯血齒痛風疹癰疽金瘡外科要藥色白微黃能亂乳香功頗相近冰片一名龍腦香宣通竊散火辛溫香竄善走能散先入肺傳於心脾而透骨通諸竅散鬱火治驚癇痰迷東垣曰風病在骨髓者宜之若在血脈肌肉反能引風入骨如油入面目赤膚翳乳調日點數次王節齊曰冰片大辛熱用之點眼取其拔出火邪蓋火鬱發之從治法也世人誤以為寒而常用之遂致積熱害目故云眼不點不瞎者此也耳聾鼻息鼻中息肉點之自入皆通竅之功喉痹舌出散火骨痛齒痛治骨痘陷豬心血作引酒服或紫草湯服引入心經能發之産難三蟲五痔王綸曰世人誤以為寒不知辛散性甚似乎涼耳諸香皆屬陽豈有香之至者而反寒乎昂幼時曾問家叔建侯公云姜性何如叔曰體熱而用涼蓋味辛者多熱然辛熱必借辛以散之風熱散則涼矣此即本草所云冰片性寒之義向未有發明之者附記於此出南番云是老杉脂以白如冰作梅花片者良以杉木炭養之則不耗今人多以樟腦升打亂之樟腦宣通竅除濕辛熱香竄能於水中發火置水中焰益熾通關利滯除濕殺蟲置鞋中去腳氣集要曰和烏頭為末醋丸彈子大置足心微火烘之汗出為效薰衣篋闢疰蟲以樟木切片浸水煎成升打得法能亂冰片蘇合香宣通竅辟惡甘溫走竄通竅開鬱闢一切不正之氣殺精鬼出諸番合衆香之汁煎成以筋挑起懸絲不斷者真血竭補和血斂瘡甘鹹色赤入血分補心包肝血不足專除血痛散瘀生新為和血之聖藥治內傷血聚金瘡折跌瘡口不合止痛生肌性急不可多使引膿血竭單入血分乳香沒藥兼入氣分皆木脂也出南番色赤以染透指甲者為真假者是海母血味大咸有腥氣單碾用同衆藥搗則作塵飛阿魏瀉消積殺蟲辛平一日溫入脾胃消肉積殺細蟲去臭氣諺曰黃芩無假阿魏無真劉純曰阿魏無真卻有真臭而止臭是為珍解菌菜自死牛馬肉毒治心腹冷痛瘧痢瘧痢多由積滯而起傳尸疳勞疰蟲出西番木脂熬成極臭試取少許安銅器一宿沾處白如銀汞者真人多以胡蒜白贋之用鉢研細熱酒器上熏過入藥蘆薈瀉熱殺蟲大苦大寒功專清熱殺蟲涼肝明目鎮心除煩治小兒驚癇五疳敷䘌齒濕癬甘草末和敷吹鼻殺腦疳除鼻癢小兒脾胃虛寒作瀉者勿服出波斯國木脂也味苦色緑者真胡桐淚瀉熱殺蟲苦能殺蟲咸能入胃軟堅大寒能除熱治咽喉熱痛磨掃取涎齒䘌風疳瘰癧結核蘇頌曰古方稀用今口齒家多用為要藥出涼肅乃胡桐脂入土得斥鹵之氣結成如小石片木淚狀如膏油蕪夷宣散風濕瀉消積殺蟲辛散滿苦殺蟲溫燥濕化食諸蟲皆因濕而生氣食皆因寒而滯祛五臟皮膚肢節風濕心腹積冷症痛鱉瘕直指方云嗜酒人血入於酒為酒鱉多氣人血入於氣為氣鱉虛勞人敗血雜痰為血鱉如蟲之行上侵人咽下蝕人肛或附脅背或隱胸腹惟用蕪夷炒兼暖胃理氣益血之藥乃可殺之痔瘻瘡癬小兒驚疳冷痢得訶子豆蔻良胃中有蟲食即作痛和麵炒黃為末米飲下形類榆莢陳久氣膻者良沒石子澀精外用染須苦溫入腎須精固氣收陰汗烏鬚髮出大食諸番顆小紋細者佳炒研用蟲食成孔者揀去忌銅鐵器衛矛一名鬼箭羽瀉破血苦寒時珍曰酸澀破陳血通經落胎殺蟲祛祟干有三羽葉似野茶酥炙用漆瀉破血消積殺蟲辛溫有毒功專行血殺蟲削年深堅結之積滯丹溪曰漆性急而飛補用之中節積滯去後補性內行人不知也破日久凝結之瘀血能化瘀血為水續筋骨絶傷損傷必有瘀血停滯治傳尸勞瘵瘕疝蛔蟲炒令煙盡入藥或燒存性用半夏為使畏川椒紫蘇雞子蟹漆得蟹而成水巴豆大燥大瀉辛熱有大毒生猛而熟少緩可升可降能止能行開竅宣滯去臟腑沉寒最為斬關奪門之將破痰癖血瘕氣痞食積生冷硬物所傷大腹水腫瀉痢驚癇口喎耳聾牙痛喉痹纏喉急痹緩治則死用解毒丸雄黃一兩鬱金一錢巴豆十四粒去皮油為丸每服五分津咽下雄黃破結氣鬱金散惡血巴豆下稠涎然系厲劑不可輕用或用紙拈蘸巴豆油燃火刺喉或搗巴豆綿裹隨左右納鼻中吐出惡涎紫血即寬鼻雖小生瘡無礙其毒性又能解毒殺蟲療瘡瘍蛇蠍諸毒峻用大可劫病微用亦可和中通經爛胎巴豆稟火烈之氣爛人肌肉試以少許擦皮膚即發一泡況腸胃耶不可輕用王好古曰去心皮膜油生用為急治水穀道路之劑炒去煙令紫黑用為緩治消堅磨積之劑可以通暢可以止瀉世所不知也時珍曰一婦年六十餘溏瀉五載犯生冷油膩肉食即作痛服升澀藥瀉反甚脈沉而滑此乃脾胃久傷積冷凝滯法當以熱下之用臘匱巴豆丸五十粒服二日不利而愈自是每用治瀉痢愈者近百人一名剛子雷斆曰緊小色黃者為巴三稜色黑者為豆小而兩頭尖者為剛子剛子殺人時珍曰此說殊乖蓋緊小者為雌有稜及兩頭尖者是雄雄者更峻耳用之得宜皆有功力不去膜則傷胃不去心則作嘔藏器法連白膜服或用谷用仁用油生用炒用醋煮燒存性用研去油名巴豆霜芫花為使畏大黃黃連涼水中其毒者以此解之或黑豆緑豆汁亦佳得火良巴豆油作紙拈燃火吹息或熏鼻或刺喉能行惡涎惡血治中風中惡痰厥氣厥喉痹不通一切急病大黃巴豆同為峻下之劑但大黃性寒腑病多熱者宜之巴豆性熱臟病多寒者宜之故仲景治傷寒傳裡多熱者多用大黃東垣治五積屬臟者多用巴豆與大黃同服反不瀉人大風子燥痰外用治瘡辛熱有毒取油治瘡癬疥癩有殺蟲劫毒之功丹溪曰粗工治大風病佐以大風油殊不知此物性熱有燥痰之功而傷血至有病將愈而先失明者出南番子中有仁白色久則油黃不可用入丸藥壓去油荊瀝宣通經絡滑痰瀉熱甘平除風熱化痰涎開經絡行血氣治中風失音驚癇痰迷眩暈煩悶消渴熱痢為去風化痰妙藥氣虛食少者忌之延年祕録云熱多用竹瀝寒多用荊瀝丹溪曰虛痰用竹瀝實痰用荊瀝並宜薑汁助送則不凝滯牡荊俗名黃荊截取尺余架磚上中間火炙兩頭承取汁用竹瀝瀉火滑痰潤燥甘寒而滑消風降火潤燥行痰養血益陰竹之有瀝猶人之有血也故能補陰清火利竅明目治中風口噤痰迷大熱風痙癲狂煩悶産乳方妊娠苦煩名子煩竹瀝不限多少細服梅師加茯苓煎消渴血虛自汗然寒胃滑腸有寒濕者勿服經疏曰中風要藥凡中風未有不因陰虛火旺痰熱壅結所致如果外來風邪安得復用此寒滑之藥治之哉丹溪曰痰在經絡四肢皮里膜外者非此不能達行又曰味甘性緩能除陰虛之有大熱者寒而能補胎後不礙虛胎前不損子世人因本草大寒二字棄而不用然人食筍至老未有因寒而病者瀝即筍之液也又假火而成何寒如此之甚耶治法云竹瀝和米煮粥能治反胃竹類甚多淡行肉薄節間有粉多汁而甘最良䈽竹堅而節促皮白如霜苦竹本粗葉大筍味苦入藥惟此三種功用略同竹茹即刮取青皮竹瀝如取荊瀝法薑汁為使姜能除痰且濟其寒筍尖發痘瘡本草未載昂按筍蕨多食皆能燥血故筍有刮腸篦之名惟同肉煮食則無害也竹茹瀉上焦煩熱涼血甘而微寒開胃土之郁清肺金之燥涼血除熱治上焦煩熱皮入肺主上焦溫膽湯用之溫氣寒熱噎膈嘔逆胃熱吐血衄血清肺涼胃齒血不止浸醋含之肺痿驚癇散肝火崩中胎動涼胎氣淡竹葉瀉上焦煩熱辛淡甘寒涼心暖脾消痰止渴除上焦風邪煩熱葉生竹上故治上焦仲景治傷寒發熱大渴有竹葉石膏湯乃假其辛寒以散陽明之邪熱也咳逆喘促嘔噦吐血中風失音小兒驚癇竹生一年以上者嫩而有力天竹黃瀉熱豁痰涼心甘而微寒涼心經去風熱利竅豁痰鎮肝明目功同竹瀝而性和緩無寒滑之患治大人中風不語小兒客忤驚癇為尤宜出南海大竹之津氣結成即竹內黃粉片片如竹節者真雷丸瀉消積殺蟲苦寒有小毒入胃大腸經功專消積殺蟲楊勔得異疾每發語腹中有小聲應之久漸聲大有道士曰此應聲蟲也但讀本草取不應者治之讀至雷丸不應服之而愈竹之餘氣得霹靂而生故名大小如栗竹刀刮去黑皮甘草水浸一宿酒拌蒸或炮用厚朴芫花為使惡葛根赤柳柳一名西河柳宣解毒能使疹毒外出末服四錢治痧疹不出喘嗽悶亂沙糖調服治疹後痢果部大棗補脾胃潤心肺和百藥甘油脾經血分藥補中益氣滋脾土潤心肺調營衛緩陰血生津液悅顏色通九竅助十二經和百藥傷寒及補劑加用之以發脾胃升騰之氣多食損齒齒屬腎土剋水中滿證忌之甘令人滿大建中湯心下痞者減餳棗與甘草同例成無己曰仲景治奔豚用大棗者滋脾土以平腎氣也治水飲脅痛有十棗湯益脾土以勝妄水也北産肥潤者良昂按金華南棗更勝於北徽寧所産亦有佳者殺烏附毒忌蔥魚同食桃仁瀉破血潤燥苦平微甘孫思邈辛孟詵溫孫思邈著千金方孟詵著食療本草厥陰心包肝血分藥苦以泄血滯甘以緩肝氣新血成無己曰肝者血之源血聚則肝氣燥肝苦急宜急食甘以緩之通大腸血祕治熱入血室衝脈血燥血痞損傷積血血痢經閉咳逆上氣血和則氣降皮膚血熱燥癢蓄血發熱如狂仲景治膀胱蓄血有桃仁承氣湯即調胃承氣湯加桃仁桂枝抵當湯用桃仁大黃虻蟲水蛭水蛭即馬蟥蛭食血之蟲能通肝經聚血性最難死雖炙為末得水即活若入腹中生子為患田泥和水飲下之虻蟲即蚊蟲因其食血故用以治血血不足者禁用行血連皮尖生用潤燥去皮尖炒用俱研碎或燒存性用雙仁者有毒不可食香附為使桃花苦平下宿水除痰飲消積聚利二便療風狂範純佑女喪夫發狂夜斷窗檽登桃樹食花幾盡自是遂愈以能瀉痰飲滯血也桃葉能發汗凡傷寒風痹發汗不出以火煅地用水灑之鋪干桃葉厚二三寸席臥溫復取大汗敷粉極燥即瘥麥麩蠶沙皆可如此法用桃為五木之精其枝葉花仁並能辟邪食醫心鏡桃仁煮粥治鬼證咳嗽生桃食多生癰癤杏仁瀉肺解肌潤燥下氣辛苦甘溫而利瀉肺解肌能發汗除風散寒降氣行痰潤燥消積索麵豆粉近之則爛通大腸氣祕治時行頭痛上焦風燥咳逆上氣杏仁炒研蜜和為丸含咽煩熱喘促有小毒能殺蟲治瘡制狗毒可毒狗消狗肉積鍚毒肺虛而咳者禁用東垣曰杏仁下喘治氣桃仁療狂治血俱治大便祕當分氣血晝便難屬陽氣夜便難屬陰血婦人便祕不可過泄脈浮屬氣用杏仁陳皮脈沉屬血用桃仁陳皮肺與大腸相表裡賁門上主往來魄門下主收閉為氣之通道故並用陳皮佐之賁門胃之上口魄門即肛門杏仁紫菀並能解肺郁利小便去皮尖炒研發散連皮尖研雙仁者殺人得火良惡黃耆黃芩葛根烏梅澀腸斂肺酸澀而溫脾肺血分之果斂肺肺欲收急食酸以收之澀腸湧痰消腫清熱解毒生津止渴醒酒殺蟲治久咳瀉痢梁莊肅公血痢陳應之用烏梅胡黃連灶下土等分為末茶調服而愈曾魯公血痢百餘日國醫不能療應之用鹽梅肉研爛合臘茶入醋服一啜而安瘴瘧諸症初起者皆禁用霍亂吐逆反胃勞熱骨蒸皆取其酸收安蛔厥蛔蟲上攻而眩僕蟲得酸則伏仲景有蛔厥烏梅丸去黑痣蝕惡肉癰瘡後生惡肉燒梅存性研末敷之多食損齒傷筋經曰酸走筋筋病無多食酸白梅功用略同治痰厥僵仆牙關緊閉取肉揩擦牙齦涎出即開蓋酸先入筋齒軟則易開若用鐵器撬開恐傷其齒驚癇喉痹敷乳癰腫毒刺入肉中嚼爛罨之即出瘡中胬肉搗餅貼之即收青梅薰黑為烏梅稻灰汁淋蒸則不蠹孟詵云烏梅十顆湯煮去核納肛中通大便鹽漬為白梅時珍曰梅花於冬而實於夏得木之全氣故最酸膽為甲木肝為乙木人舌下有四竅兩通膽液故食酸則津生食梅齒齼者嚼胡桃即解衣生黴點者梅葉煎湯洗之搗洗葛衣亦佳栗補腎鹹溫厚腸胃補腎氣寇宗奭曰小兒不可多食生則難化熟則滯氣能解羊膻陳皮能燥能宣有補有瀉可升可降辛能散苦能燥能瀉溫能補能和同補藥則補瀉藥則瀉升藥則升降藥則降為脾肺氣分之藥脾為氣母肺為氣籥凡補藥澀藥必佐陳皮以利氣調中快膈導滯消痰大法治痰以健脾順氣為主潔古曰陳皮枳殼利其氣而痰自下利水破症宣通五臟統治百病皆取其理氣燥濕之功人身以氣為主氣順濕除則百病散金匱云能解魚毒食毒多服久服損人元氣入補養藥則留白入下氣消痰藥則去白聖濟云不去白反生痰去白名橘紅兼能除寒發表皮能發散皮膚核治疝痛葉散乳癰皆能入厥陰行肝氣消腫散毒腰腎冷痛橘核炒酒服良十劑曰宣可去壅生薑橘皮之屬是也泊宅編曰莫強中食已輒胸滿不下百治不效偶家人合橘皮湯嘗之似有味連日飲之一日坐廳事覺胸中有物墜下目瞪汗濡大驚扶歸腹疼痛下數塊如鐵彈臭不可聞自此胸次廓然蓋脾之冷積也半年服藥不知功乃在橘皮方用橘皮一斤甘草鹽各四兩煮乾點服名二賢散蒸餅丸名潤下丸治痰特有驗世醫惟知半夏南星枳殼茯苓之屬何足語此哉丹溪曰治痰利藥過多則脾虛痰易生而反多又曰胃氣亦賴痰以養不可攻盡攻盡則虛而愈劇廣中陳久者良故名陳皮陳則烈氣消無燥散之患半夏亦然故同用名二陳湯治痰咳童便浸曬治痰積薑汁炒治下焦鹽水炒去核皮炒用青皮瀉肝破氣散積辛苦而溫色青氣烈入肝膽氣分疏肝瀉肺柴胡疏上焦肝氣青皮平下焦肝氣凡瀉氣藥皆云瀉肺破滯削堅除痰消痞治肝氣鬱積脅痛多怒久瘧結癖入肝散邪入脾除痰瘧家必用之品故清脾飲以之為君瘧痛乳腫丹溪曰乳房屬陽陰乳頭屬厥陰乳母或因忿怒鬱悶厚味釀積致厥陰之氣不行故竅不得出陽明之血騰沸故熱甚而化膿亦因其子有滯痰膈熱含乳而睡噓氣致生結核者初起便須忍痛揉軟吮令汁透自可消散治法以青皮疏肝滯石膏清胃熱甘草節行濁血瓜蔞消腫導毒或加沒藥橘葉金銀花蒲公英皂角刺當歸佐以少酒若於腫處灸三五壯尤捷久則凹陷名乳癌不可治矣最能發汗皮能達皮辛善發散有汗及氣虛人禁用陳皮升浮入脾肺治高青皮沉降入肝膽治低炒之以醋所謂肝欲散急食辛以散之以酸泄之以苦降之也橘之青而未黃者醋炒用古方無用者宋以後始與陳皮分用柿干潤肺澀腸寧嗽甘平性澀生柿性寒脾肺血分之藥健脾澀湯潤肺寧嗽而消宿血治肺痿熱咳咯血反胃有人三世病反胃得一方柿干同乾飯日日食不飲水遂愈腸風痔漏肺與大腸相表裡臟清則腑熱亦除泊宅編柿乾燒灰飲服二錢治下血忌蟹柿霜乃其精液生津化痰清上焦心肺之熱為尤佳治咽喉口舌瘡癰柿蒂止厄逆古方單用取其苦溫降氣濟生加丁香生薑取其開鬱散痰亦從治之法産寶云産後厄逆煩亂柿餅一個煮汁熱飲木瓜補和脾舒筋澀斂肺酸澀而溫入脾肺血分斂肺和胃理脾伐肝化食酸能斂斂則化與山查同止渴酸能生津氣脫能收氣滯能和調營衛利筋骨去濕熱消水脹治霍亂轉筋夏月暑濕邪傷脾胃陽不升陰不降則揮霍撩亂上吐下瀉甚則肝木乘脾而筋為之轉也食療云煮汁飲良時珍曰肝雖主筋而轉筋則因風寒濕熱襲傷脾胃所致轉筋必起於足腓腓音肥足肚也腓及宗筋皆屬陽明木瓜治轉筋取其理筋以伐肝也土病則金衰而木盛故用酸溫以收脾肺之耗散而借其走筋以平肝邪乃土中瀉木以助金也陶宏景曰凡轉筋呼木瓜名寫木瓜字皆愈瀉痢腳氣脾主四肢或寒濕傷於足絡或胃受濕熱之物上輸於脾下流至足則成腳氣惡寒發熱狀類傷寒第脛腫掣痛為異耳宜利濕清熱忌用補劑及淋洗昔有患足痹者趁舟見舟中一袋以足倚之比及登岸足已善步矣詢袋中何物乃木瓜也腰足無力多食損齒骨病癃閉酸收太甚鄭奠一曰木瓜乃酸澀之品世用治水腫腹脹誤矣有大僚舟過金陵愛其芬馥購數百顆置之舟中舉舟人皆病溺不得出醫以通利藥罔效迎豫視之聞四面皆木瓜香笑謂諸人曰徹去此物溺即出矣不必用藥也於是盡投江中頃之溺皆如舊陳者良香薷飲用之取其和脾去濕補肺生金忌鐵山查查古字作楂瀉滯氣消積散瘀化痰酸甘鹹溫健脾行氣散瘀化痰消食磨積消油膩腥膻之積與麥芽消殼積者不同凡煮老雞硬肉投數枚則易爛其消肉積可知發小兒痘疹止兒枕作痛惡露積於太陰少腹作痛名幾枕痛沙糖調服多食令人嘈煩易飢反伐脾胃生髮之氣破泄太過中氣受傷凡服人參不相宜者服山楂即解一補氣一破氣也有大小二種小者入藥一名棠球子去皮核用一云核亦有力化食磨積梨潤腸瀉火清熱甘微酸寒潤肺涼心消痰降火止渴解酒利大小腸治傷寒發熱熱嗽痰喘中風失音搗汁頻服聖惠方梨汁煮粥治小兒心臟風熱昏躁切片貼湯火傷多食冷利脾虛泄瀉及乳婦血虛人忌之生者清六腑之熱熟者滋五臟之陰實火宜生虛火宜熟泊宅編有仕宦病消渴醫謂不過三十日死亟棄官歸途遇一醫令致北梨二擔食盡則瘥宦如其言食及五六十枚而病愈楊吉老介醫木甚著一士有疾厭厭不聊往謁之楊曰汝證熱已極氣血全消三年當以疽死不可為也士不樂而退聞茅山一道士醫術通神但不肯以技自名乃衣僮僕之服詣山拜之願執役席下道士喜留只事左右歷兩月久覺其與常隸別扣所從來再拜謝過始以實告道士笑曰世間那有醫不得的病試診脈又笑曰吾亦無藥與汝便可下山買好梨日食一顆梨盡取乾者泡湯和滓食之疾自當平士人如戒經一歲復見吉老顏貌腴澤脈息和平驚曰君必遇異人士人以告楊衣冠焚香望茅山設拜蓋自咎其學之未至也搗汁用熬膏亦良加薑汁蜂蜜佳清痰止嗽與萊蔔相間收藏則不爛或削梨蒂扦萊蔔上枇杷葉瀉肺降火苦平清肺和胃而降氣氣下則火降痰消氣有餘便是火火則生痰治熱咳嘔逆口渴時珍曰火降痰順則逆者不逆嘔者不嘔咳者不咳渴者不渴矣一婦肺熱久嗽身如火炙肌瘦將成勞以枇杷葉款冬花紫菀杏仁桑皮木通等分大黃減半蜜丸櫻桃大食後夜臥各含化一丸未終劑而愈葉濕重一兩乾重三錢為氣足拭淨毛毛射肺令人咳治胃病薑汁炙治肺病蜜炙橄欖宣清肺甘澀而溫肺胃之果清咽生津除煩醒酒解河豚毒投入煮佳及魚骨鯁如無橄欖以核磨水服橄欖木作舟楫魚撥即浮出物之相畏有如此者核燒灰敷疰疳良白果一名銀杏澀斂肺去痰甘苦而溫性澀而收熟食溫肺益氣色白屬金故入肺定痰哮斂喘嗽縮小便止帶濁生食降痰解酒消毒殺蟲花夜開人不得見性陰有小毒故能消毒殺蟲多食則收澀太過令人壅氣臚脹小兒發驚動疳食千枚者死漿澤手面浣油膩時珍曰去痰濁之功可以類推石榴皮澀腸外用染須酸澀而溫能澀腸止瀉痢下血煅末服崩帶脫肛瀉痢至於脫肛者以石榴皮陳壁土加明礬少許濃煎熏洗再用五倍子炒研敷托而止之浸水汁黑如墨烏須方緑雲油中用之勿犯鐵器客座新聞云一人患腹脹夏成診曰飲食如常非水腫蠱脹乃濕熱生蟲之象也以石榴椿樹東引根皮檳榔各五錢空心服腹大痛瀉蟲長丈餘遂愈枳椇子一名木蜜潤解酒甘平止渴除煩潤五臟解酒毒葛根解酒毒而發散不如枳椇屋外有枳椇樹屋內釀酒多不佳趙以得治酒毒房勞病熱者加葛根於補氣血藥中一貼微汗反解怠熱如故知氣血虛不禁葛根之散也必得枳椇方可偶得乾者加入即愈東坡集曰楊穎臣病消渴日飲水數斗飯亦倍進小便頻數服消渴藥日甚延張肱診之笑曰君幾誤死取麝香當門子以酒濡作十許丸枳椇子煎湯吞之遂愈問其故肱曰消渴消中皆脾弱腎敗土不制水而成今穎臣脾脈極熱腎脈不衰當由酒果過度積熱在脾所以多食多飲飲多溲不得不多非消非渴也麝香壞酒果枳椇能勝酒故假二物以去其酒果之毒也雷斆曰凡使麝香用當門子尤妙俗名雞距以實拳曲如雞距蜀呼為棘枸經霜黃赤甚甘其葉入酒酒化為水胡桃補命門肉潤皮澀味甘氣熱皮澀皮斂肺定喘固腎澀精今藥中罕用昂謂若用之當勝金櫻蓮鬚也肉潤皮汁青黑屬水入腎通命門利三焦溫肺潤腸補氣養血佐補骨脂一木一火大補下焦胡桃屬木破故紙屬火有木火相生之妙古云黃柏無知母破故紙無胡桃猶水母之無蝦也時珍曰三焦者無氣之別使命門者三焦之本原命門指所居之府而言為藏精系胞之物三焦指所治之部而名為出納腐熟之司一為體一為用也其體非脂非肉白膜裹之在脊骨第七節兩腎中央系著於脊下通二腎上通心肺貫腦為生命之源相火之生精氣之府人物皆有之生人生物皆由此出內經所謂七節之旁中有小心是也難經誤以右腎為命門高陽生承謬脈訣至朱肱陳言戴起宗始闢之夫腎命相通藏精而惡燥胡桃頗類其狀汁青黑故入北方佐破故紙潤燥而調血使精氣內充血脈通利諸疾自除矣男女交媾皆稟此命火而結胎人之窮通壽夭皆根於此三焦通利故上而虛寒喘嗽能溫肺化痰洪邁有痰疾晚對上諭以胡桃三枚姜三片臥時嚼服即飲湯復嚼薑桃如前數靜臥必愈邁如旨服旦而痰消嗽止洪輯幼子病痰喘夢觀音令服人參胡桃湯服之而愈明日剝去皮喘復作仍連皮用信宿而瘳蓋皮能斂肺也胡桃蔥白薑茶等分搗煎能發汗散寒下而腰腳虛痛能補腎內而心腹諸痛外而瘡腫諸毒能調中和營皆可除也然動風痰助腎火連皮同燒細嚼三枚能久戰有痰火積熱者少服油者有毒故殺蟲治瘡殼外青皮壓油烏髭發潤燥養血去皮用斂澀連皮用龍眼肉補心脾甘溫歸脾益脾長智一名益智養心補血心為脾母故歸脾湯用之治思慮勞心脾及湯風下血心生血脾統血思慮過多則心脾傷而血耗致有健忘怔忡驚悸諸病歸脾湯能引血歸脾而生補之腸風亦由血不歸脾而妄行荔枝核宣散寒濕甘澀而溫入肝腎散滯氣闢寒邪治胃脘痛婦人血氣痛煅存性五錢香附一兩為末每服二錢鹽湯或米飲下名蠲痛散單服醋湯下亦效其實雙結核似睪丸睪音皋腎子也故治㿗疝卵腫有述類象形之義煅存性酒調服加茴香青皮各炒為末酒服亦良殼發痘瘡燒存性用荔枝連殼煅研止厄逆生荔枝多食則醉以殼浸水解之此即食物不消還以本物解之之義棐實潤肺甘澀潤肺本草未嘗言潤然潤劑也故寇氏云多食潤腸殺蟲有蟲積者宜上旬日日食之食一斤蟲乃絶海松子潤燥甘溫潤肺溫胃散水除風治咳嗽松子一兩胡桃二兩煉蜜和服治肺燥咳嗽虛祕同柏子仁麻仁溶蠟為丸名三仁丸出遼東雲南松須五鬣落花生補脾潤肺辛能潤肺香能舒脾果中佳品出閩廣藤生花落地而結實故名按落花生本草未收本無當醫藥之用然能益脾潤肺實佳果也因世人謗之者多附見於此明其有利無害也炒食蓮子補脾澀腸固精甘溫而澀脾之果也脾者黃宮故能交水火而媾心腎安靖上下君相火邪古方治心腎不交勞傷白濁有蓮子清心飲補心腎有瑞蓮丸益十二經脈血氣澀精氣厚腸胃除寒熱治脾泄久痢白濁夢遺女人崩帶及諸血病大便燥者勿服去心皮蒸熟焙乾用得茯苓山藥白朮枸杞良黑而沉水者為石蓮清心除煩開胃進食專治噤口痢淋濁諸證石蓮入水則沉入滷則浮煎鹽人以之試滷蓮浮至頂滷乃可煎落田野中者百年不壞人得食之發黑不老肆中石蓮産廣中樹上其味大苦不宜入藥蓮心為末米飲下療産後血竭蓮蕊須澀精甘溫而澀精心通腎益血固精烏須黑髮止夢泄遺精吐崩諸血略與蓮子同功藕涼血散瘀澀平解熱毒消瘀血止吐衄淋痢一切血證和生地汁童便服良藕生甘寒涼血散瘀宋大官作血䘓誤落藕皮血遂渙散不凝一人病血淋痛脹欲死李時珍以發灰二錢藕汁調服三日而愈梅師方産後余血上衝煮汁服止渴除煩聖惠方藕汁蜜和服治時氣煩渴解酒毒蟹毒搗爛熱酒調服煮熟甘溫益胃補心多孔象心止瀉能實大腸止怒久服令人歡益心之效生搗罨金瘡傷折熟搗塗坼裂凍瘡肘後方卒中毒箭者藕汁飲多多益善孟詵曰産後忌生冷獨藕不忌為能散瘀血也澄粉亦佳安神益胃荷葉輕宣升陽散瘀苦平其色青其形仰其中空其象震震仰盂感少陽甲膽之氣燒飯合藥裨助脾胃而升發陽氣潔古枳朮丸用荷葉燒飯為丸痘瘡倒黶者用此發之殭蠶等分為末胡荽湯下聞人規曰勝於人牙龍腦能散瘀血留好血治吐衄崩淋損傷産瘀熬香末服一切血證洗腎囊風東垣曰雷頭風症頭面疙瘩腫痛憎寒惡熱狀如傷寒病在三陽不可過用寒藥重劑誅罰無過處清震湯治之荷葉一枚升麻蒼朮各五錢煎服鄭奠一曰荷葉研末酒服三錢治遺精極驗芡實一名雞頭子補脾澀精甘澀固腎益精補脾去濕治泄瀉帶濁小便不禁夢遺滑精同金櫻膏為丸名水陸二仙丹腰漆瘀痛吳子野曰人之食芡必枚齧而細嚼之使華液流通轉相灌溉其功勝於乳石也經驗後方煮熟研膏合粳米煮粥食益精氣蒸熟搗粉用澀精藥或連殼用李惟熙曰菱寒而芡暖菱花背日芡花向日甘蔗補脾潤燥甘寒和中助脾除熱潤燥止渴治消渴消痰解酒毒利二便外臺方嚼咽或搗汁治發熱口乾便澀治嘔噦反胃梅師方蔗汁薑汁和服大便燥結蔗汁熬之名石蜜即白霜糖唐大曆間有鄒和尚始傳造法性味甘溫補脾緩肝潤肺和中消痰治嗽多食助熱損齒生蟲紫沙糖功用略同荸薺一名鳧茈一名烏芋一名地栗補中瀉熱消食甘微寒滑益氣安中開胃消食飯後宜食之除胸中實熱治五種噎膈五膈憂膈恚膈氣膈熱膈寒膈噎亦五種氣噎食噎勞噎憂噎思噎消渴黃疸血證蠱毒末服闢蠱能毀銅汪機曰食銅錢食之則錢化可見為消堅削積之物故能開五膈消宿食治誤吞銅也菱俗名菱角一名芰瀉解暑止渴甘寒安中消暑止渴解酒有兩角三角四角老嫩之殊武陵記以三角四角者為芰兩角者為菱菱花隨月而轉猶葵花之向日西瓜瀉暑甘寒解暑除煩利便醒酒名天生白虎湯西瓜甜瓜皆屬生冷多食傷脾助濕衛生歌云瓜桃生冷宜少食免致成瘧痢瓜性寒曝之尤寒稽食賦云瓜曝則寒油煎則冷物性之異也谷菜部粳米粳硬也補脾清肺甘涼得天地中和之氣和胃補中色白入肺除煩清熱煮汁止渴仲景白虎湯桃花湯竹葉石膏湯並用之以清熱補不足張文潛粥記粥能暢胃氣生津液每晨空腹食之所補不細昂按今人終日食粥不知其妙逮病中食之覺與臟腑相宜迥非他物之所能及也粳乃稻之總名有早中晚三收晚者得金氣多性涼尤能清熱北粳涼南粳溫白粳涼紅粳溫新米食之動氣陳廩米沖淡可以養胃煮汁煎藥亦取其調腸胃利小便去濕熱除煩渴之功集成云陳米飯扎作團火煅存性麻油膩粉調敷一切惡瘡百藥不效者糯米糯懦也本草名稻米按詩黍稷稻粱禾麻菽麥名八此稻與禾所以有異乎補溫脾肺甘溫補脾肺虛寒堅大便縮小便收自汗同龍骨牡蠣為粉能撲汗發痘瘡解毒化膿然性黏滯病人及小兒忌之糯米釀酒則熱熬餳尤甚餳即飴糖潤肺和脾化痰止嗽仲景建中湯用之取其甘以補脾緩中多食發濕熱動痰火損齒穀芽健脾消食甘溫開胃快脾下氣和中消食化積炒用大麥芽開胃健脾行氣消積鹹溫能助胃氣上行而資健運補脾寬腸和中下氣消食除脹散結祛痰咸能軟堅化一切米面果食積通乳下胎外臺方麥芽一升蜜一升服下胎神驗薛立齊治一婦人喪子乳脹幾欲成癰單用麥芽一二兩炒煎服立消其破血散氣如此良方云神麯亦下胎皆不可輕用久服消腎氣王好古曰麥芽神麯胃虛人宜服之以伐戊己腐熟水穀李時珍曰無積而服之消人元氣與白朮諸藥消補兼施則無害也胃為戊土脾為己土炒用豆蔻砂仁烏梅木瓜芍藥五味為使小麥補味甘微寒養心除煩利溲止血李時珍曰素問麥屬火心之谷也鄭玄謂屬木許慎謂屬金別録云養肝與鄭說合孫思邈云養心與素問合當以素問為準按麥秋種夏熟備受四時之氣南方地暖下濕不如北産者良張仲景治婦人臟躁證悲傷欲絶狀若神靈用甘麥大棗湯大棗十枚小麥一升甘草一兩每服一兩亦補脾氣聖惠方小麥飯治煩熱少睡多渴麵粉甘溫補虛養氣助五臟厚腸胃然能壅氣作渴助濕發熱陳者良寒食日紙袋盛懸風處名寒食麵年久不熱入藥尤良浮小麥即水淘浮起者咸涼止虛汗盜汗勞熱骨蒸汗為心液麥為心谷浮者無肉故能涼心麥麩同功麥麩醋拌蒸能散血止痛尉腰腳折傷風濕痹痛寒濕腳氣互易至汗出良麥之涼全在皮故面去皮即熱凡瘡瘍痘瘡潰爛不能著席者用麥麩裝褥臥性涼而軟誠妙法也稷補和中甘平益氣和中宣脾利胃陶宏景曰稷米人亦不識書記多雲黍與稷相似又注黍米云穄米與黍米相似而粒殊大食之不宜人發舊病詩云黍稷稻粱禾麻菽麥此八谷也俗猶不能辨證況芝英乎按黍稷辨者頗多皆無確義李時珍曰稷黍一類二種黏者為黍不黏者為稷昂謂詩人既云八谷何必取一類者強分二種是仍為七谷矣蓋穄稷同音故世妄謂穄為稷不知穄乃黍類似粟而粒大疏散乃北方下谷南土全無北人亦不之重安能度越粳糯而高踞八谷之上乎陶氏所說因是穄黍所以疑也若稷當屬高大如蘆世之所謂蘆稷者實既香美性復中和干又高大所以能為五穀之長而先王以之名官也況穄黍所生不遍而蘆稷薄海蕃滋本草乃指蘆稷為蜀黍其名義亦不倫矣此實從來之誤敢為正之以質明者又蘆稷最能和中煎湯溫服治霍亂吐瀉如神昂嘗病中啾唧經兩月有友人見招飲以蘆稷燒酒一醉而積病暢然性之中和又可見矣粟補腎甘鹹微寒養腎益氣治胃熱消渴止霍亂利二便千金方粟米粉水丸梧子大煮七枚納醋中細吞之治反胃吐食即粱米有青黃赤白黑諸色陳者良蕎麥瀉利腸下氣甘寒降氣寬腸胃沉積孟詵曰能煉五臟垢穢昂按亦解酒積泄痢帶濁敷痘瘡潰爛湯火灼傷脾胃虛寒人勿服黑大豆補腎解毒甘寒色黑屬水似腎腎之谷也豆有五色各入五臟故能補腎鎮心腎水足則心火寧明目腎水足則目明利水下氣古方治水腫每單用或加他藥散熱祛風炒熱酒沃飲其汁治産後中風危篤及妊娠腰痛兼能發表千金云一以去風一以消血結活血産書云熬令煙絶酒淋服下産後余血解毒蘇頌曰古稱大豆解百藥毒試之不然又加甘草其驗乃奇消腫止痛搗塗一切腫毒煮食稀痘瘡緊小者良小者名馬料豆每晨鹽水吞或鹽水煮食補腎畏五參龍膽豬肉忌厚朴犯之動氣得前胡杏仁牡蠣石蜜諸膽汁良赤小豆通行水散血十劑作燥甘酸思邈鹹冷色赤心之谷也性下行通小腸利小便心與小腸相表裡行水散血消腫排膿清熱解毒治瀉痢腳氣昔有患腳氣者用袋盛赤小豆朝夕踐踏之遂愈同鯉魚煮汁食能消水腫煮粥亦佳敷一切瘡疽雞子白調末箍之性極黏干則難揭入苧根末則不黏宋仁宗患痄腮道士贊能取赤小豆四十九粒咒之雜他藥敷之而愈中貴任承亮親見後任自患惡瘡付永投以藥立愈問之赤小豆也承亮始悟道士之咒僞也後過豫章見醫治脅疽甚捷任曰莫非赤小豆耶醫驚拜曰用此活三十餘口願勿復宣止渴解酒通乳下胎然滲津液久服令人枯瘦十劑曰燥可去濕桑白皮赤小豆之屬是也按二藥未可言燥蓋取其行水之功然以木通防己為通劑通燥二義似重故本集改熱藥為燥劑而以行水為通劑緑豆瀉熱解毒甘寒行十二經清熱解毒一切草木金石砒霜毒皆治之利小便止消渴治瀉痢連皮用其涼在皮粉撲痘瘡潰爛良一市民誦觀音經甚誠出行折一足哀叫菩薩夢僧授一方緑豆粉新銚炒紫色井水調厚敷紙貼杉木扎定其效如神白扁豆補脾除濕消暑甘溫腥香色白微黃脾之谷也調脾暖胃通利三焦降濁升清消暑除濕能消脾胃之暑止渴止瀉專治中宮之病土強濕去正氣自旺解酒毒河豚毒備急方新汲水調末服能解砒毒多食壅氣子粗圓色白者入藥連皮炒研用亦有浸去皮及生用者淡豆豉宣解表除煩苦泄肺寒勝熱陳藏器曰豆性生平炒熟熱煮食寒作豉冷發汗解肌調中下氣治傷寒頭痛煩躁滿悶懊憹不眠發斑嘔逆凡傷寒嘔逆煩悶宜引吐不宜用下藥以逆之淡豉合梔子名梔子豉湯能吐虛煩血痢溫瘧時珍曰黑豆性平作豉則溫既經蒸罯故能升能散得蔥則發汗得鹽則能吐得酒能治風得薤則治痢得蒜則止血炒熟又能止汗孟詵治盜汗炒香漬酒服肘後合蔥白煎名蔥豉湯用代麻黃湯通治傷寒發表亦治酒病造淡豉法用黑大豆水浸一宿淘淨蒸熟攤勻蒿復候上黃衣取曬簸淨水拌乾溼得所安甕中築實桑葉厚蓋泥封曬七日取出曝一時又水拌入甕如此七次再蒸去火氣甕收用刀豆宣下氣甘平溫中止厄煅存性服勝於柿蒂胡麻即芝麻一名巨勝子種出大宛故曰胡麻補肝腎潤五臟清腸甘平補肺氣益肝腎潤五臟填精髓堅筋骨明耳目耐飢渴可以辟穀但滑腸與白朮並用為勝烏髭發利大小腸逐風濕氣劉河間曰麻木谷而治風又云治風先治血血活則風散胡麻入肝益血故風藥中不可闕也鄭奠一用鱉蝨胡麻佐苦參蒺藜治大瘋疥癩屢有愈者涼血解毒生嚼敷小兒頭瘡麻油滑胎療瘡熬膏多用之涼血解毒止痛生肌皮肉俱黑者良入腎栗色者名鱉蝨胡麻更佳九蒸九曬可以服食陶宏景曰八谷之中惟此為良昂按若云自大宛來則非八谷之麻明矣又按月令仲秋之月天子以犬嘗麻則其為八谷之麻又可見矣種出大宛之說何以稱焉豈白者産中原黑者産大宛乎大麻仁大麻即作布之麻俗作火麻潤燥滑腸甘平滑利脾胃大腸之藥緩脾潤燥治陽明病胃熱汗多而便難三者皆燥也汗出愈多則津枯而大便愈燥張仲景治脾約有麻仁丸成無己曰脾欲緩急食甘以緩之麻仁之甘以緩脾潤燥張子和曰諸燥皆三陽病破積血利小便通乳催生又木谷也亦能治風極難去殼帛裹置沸湯待冷懸井中一夜曬乾就新瓦上挼去殼搗用畏茯芩白薇牡蠣薏苡仁補脾胃通行水甘淡微寒而屬土陽明胃藥也甘益胃土勝水淡滲濕瀉水所以益土故健脾治水腫濕痹腳氣疝氣泄痢熱淋益土所以生金故補肺清熱色白入肺微寒清熱治肺痿肺痛咳吐膿血以豬肺沾苡仁米服扶土所以抑木故治風熱筋急拘攣厥陰風木主筋然治筋骨之病以陽明為末陽明主潤宗筋宗筋主束骨而利機關者也陽明虛則宗筋縱馳故經曰治痿獨取陽明又曰肺熱葉焦發為痿躄蓋肺者相傳之官治節出焉陽明濕熱上蒸於肺則肺熱葉焦氣無所主而失其治節故痿躄薏苡理脾而兼清熱補肺筋寒則急熱則縮濕則縱然寒濕久留亦變為熱又有熱氣熏蒸水液不行久而成濕者薏苡去濕要藥因寒因熱皆可用也衍義云因寒筋急者不可用恐不然但其力和緩用之須倍於他藥殺蛔墮胎炒熟微研御米殼即罌粟殼澀腸斂肺固腎酸澀微寒斂肺澀腸而固腎治久嗽瀉痢遺精脫肛心腹筋骨諸痛東垣曰收澀固氣能入腎故治骨病尤宜嗽痢初起者忌用丹溪曰此是收後藥要先除病根一名麗春花紅黃紫白豔麗可愛凡使殼洗去蒂及筋膜取薄皮醋炒或蜜炒用性緊澀不制多令人吐逆得醋烏梅陳皮良罌中有米極細甘寒潤燥煮粥食治反胃加參尤佳神麯宣行氣化痰消食辛散氣甘調中溫開胃化水穀消積滯醫余云有傷粽子成積用曲末少加木香鹽湯下數日口中聞酒香積遂散治痰逆癥結瀉痢脹滿回乳炒研酒服二錢日二下胎産後血暈末服亦良亦治目病啓微集云生用能發其生氣熟用能斂其暴氣造麴法以五月五日六月六日用白麵百斤赤豆末杏仁泥青蒿蒼耳紅蓼汁各三升以配青龍白虎朱雀玄武螣蛇勾陳六神通和作餅罯生黃衣曬收陳者良炒用紅曲宣破血燥消食甘溫色赤入營而破血燥胃消食活血和血治赤白下痢跌打損傷産後惡露不盡李時珍曰人之水穀入胃中焦濕熱熏蒸遊溢精氣化為營血此造化自然之妙也紅曲以白米飯雜曲面母濕熱蒸罯即變為真紅此人窺造化之巧者也故治脾胃營血得同氣相求之理紅入米心陳久者良昂按紅曲溫燥能腐生物使熟故魚肉鮓用之不特取其色也醋一名苦酒散瘀斂氣消癰腫酸溫散瘀解毒下氣消食食斂縮則消矣開胃氣令人嗜食本草未載散水氣治心腹血氣痛磨木香服産後血暈以火淬醋使聞其氣癥結痰癖疸黃癰腫外科敷藥多用之取其斂壅熱散瘀解毒昂按貝母性散而斂瘡口蓋能散所以能斂醋性酸收而散癰腫蓋消則內散潰則外散收處即是散處兩者一義也口舌生瘡含漱損傷積血面和塗能散之谷魚肉菜菌諸蟲毒多食傷筋收縮太過酒醋無所不入故製藥多用之米造陳久者良寇宗奭曰食酸則齒軟者齒屬腎酸屬肝木氣強水氣弱故也酒宣行藥勢辛者能散苦者能降甘者居中而緩厚者熱而毒淡者利小便用為響導可以通行一身之表引藥至極高之分熱飲傷肺溫飲和中少飲則和血行氣壯神禦寒遣興消愁辟邪逐穢暖水藏行藥勢過飲則傷神耗血亦能亂血故飲之身面俱赤損胃灼精動火生痰發怒助欲酒是色媒人致生濕熱諸病過飲則相火昌炎肺金受灼致生痰嗽脾因火而困怠胃因火而嘔吐心因火而昏狂肝因火而善怒膽因火而忘懼腎因火而精枯以致吐血消渴勞傷蠱膈癰疽失明為害無窮汪穎曰人知戒早飲而不知夜飲更甚醉飽就床熱壅三焦傷心損目夜氣收斂酒以發之亂其清明勞其脾胃停濕動火因而致病者多矣朱子云以醉為節可也醇而無灰陳久者良畏枳椇葛花赤豆花緑豆粉鹹鹵得咸則解水制火也韭補陽散瘀辛溫微酸肝之菜也入血分而行氣歸心益胃助腎補陽一名土鍾乳言溫補也除胃熱充肺氣散瘀血逐停痰治吐衄損傷一切血病搗汁童便和服噎膈反胃能消瘀血停痰在胃口治反胃及胃脘痛丹溪曰有食熱物及鬱怒致死血留胃口作痛者宜加韭汁桔梗入藥開提氣血有腎氣上攻致心痛者宜韭汁和五苓散為丸空心茴香湯下治反胃宜用牛乳加韭汁薑汁細細溫服蓋韭汁散瘀薑汁下氣消痰和胃牛乳解熱潤燥補虛也單方總録曰食不得入是有火也食久反出是無火也治法雖有寒熱虛實之別要以安其胃氣為本使陰陽升降平均嘔逆自順而愈矣解藥毒食毒狂犬蛇蟲毒多食昏神忌蜜牛肉昂按今人多以韭炒牛肉其味甚佳未見作害經曰毒藥攻邪五穀為養五畜為益五菜為充五果為助氣味合而服之以補精益氣五菜韭薤蔥葵藿也五果桃李棗杏栗也韭子辛甘而溫補肝腎助命門暖腰膝治筋痿遺尿泄精溺血白帶白淫經曰足厥陰病則遺尿思想無窮入房太甚發為筋痿及白淫韭子同龍骨桑螵蛸能治諸病以其入厥陰補肝腎命門命門者藏精之府也蒸曝炒研用燒煙燻牙蟲蔥輕發表和里宣通陽活血生辛散熟甘溫陶宏景曰白冷青熱傷寒湯中不得用青外實中空肺之菜也肺主皮毛其合陽明大腸故發汗解肌以通上下陽氣仲景白通湯通脈四逆湯並加之以通脈回陽益目睛白睛屬肺利耳鳴通二便時珍曰蔥管吹鹽入玉莖中治小便不通及轉脬危急者極效治傷寒頭痛時疾熱狂陰毒腹痛陰證厥逆用蔥白安臍上尉之氣通則血活氣為血帥故治吐血衄血便血痢血食醫心鏡蔥煮粥食治赤白痢薤粥亦良折傷血出火煨研封止痛無瘢乳癰風痹通乳安胎婦人妊娠傷寒蔥白一物湯發汗而安胎加生薑亦佳刪繁方合香豉阿膠治胎動通氣故能解毒殺藥毒魚肉毒蚯蚓毒蟲制犬毒諸物皆宜故曰菜伯又曰和事草取白連須用亦有用青者同蜜食殺人同棗食令人病百一方患外痔者先用木鱉煎湯熏洗以青蔥涎對蜜調敷其涼如冰獨行方水病足腫煮湯漬之日三五度佳大蒜張騫使西域始得種入中國故一名葫宣通竅辟惡辛溫開胃健脾通五臟達諸竅凡極臭極香之物皆能通竅去寒濕解暑氣闢瘟疫消癰腫搗爛麻油調敷破症積化肉食殺蛇蟲蠱毒治中暑不醒搗和地漿溫服鼻衄不止搗貼足心能引熱下行關格不通搗納肛中能通幽門敷臍能達下焦消水利大小便切片灼艾灸音九一切癰疽惡瘡腫核獨頭者尤良李迅曰癰疽著灸勝於諸藥緣熱毒中膈上下不通必得毒氣發泄然後解散初起便用獨頭大蒜切片灸之三壯一易百壯為率但頭項以上切不可灸恐引氣上更生大禍也史源曰有灸至八百壯者約艾一篩初壞肉不痛直灸到好肉方痛至夜火焮滿背高阜頭孔百數則毒外出否則內逼五臟而危矣綱目曰精要謂頭上毒不得灸此言過矣頭為諸陽所聚艾宜小如椒粒炷宜三五壯而已又按李東垣灸元好問腦疽艾大如兩核許灸至百壯始覺痛而痊由是推之頭毒若不痛者艾大壯多亦無妨也然其氣熏臭多食生痰動火散氣耗血損目昏神五葷皆然而蒜尤甚楞嚴經云五葷熟食發淫生啖增恚故釋氏戒之釋家以大蒜小蒜興渠慈蔥草父口蔥為五葷慈蔥冬蔥也草父口蔥山蔥也興渠西域菜云即中國之荽道家以韭薤蒜胡荽蕓薹為五葷蕓薹油菜也忌蜜薤一名蕌子蕌音叫滑利竅助陽辛苦滑溫調中助陽散血生肌泄下焦大腸氣滯治泄痢下重王好古曰下重者氣滯也四逆散加此以泄滯按下重亦有氣虛血虛火熱風燥之不同胸痹刺痛仲景用栝蔞薤白白酒湯肺氣喘急安胎利産塗湯火傷和蜜搗用肘後方中惡卒死者用薤汁灌鼻中韭汁亦可葉似韭而中空根如蒜取白用忌牛肉其葉光滑露亦難貯故云薤露胡荽宣發痘疹辟惡氣辛溫香竄內通心脾外達四肢闢一切不正之氣痧疹痘瘡不出煎酒噴之心脾之氣得芳香而運行含噴遍身勿噀頭面痘疹家懸掛辟邪惡胡荽久食令人多忘病人不宜食胡荽黃花菜生薑宣散寒發表止嘔開痰辛溫行陽分而祛寒發表宣肺氣而解鬱調中暢胃口而開痰下食治傷寒頭痛傷風鼻塞辛能入肺通氣散寒咳逆嘔噦有聲有物為嘔有聲無物為噦有物無聲為吐其證或因寒因熱因食因痰氣逆上衝而然生薑能散逆氣嘔家聖藥東垣曰辛熱生薑之類治嘔吐但治上焦氣壅表實之病若胃虛穀氣不行胸閉塞而嘔者惟宜益胃推揚穀氣而已勿作表實用辛藥瀉之丹溪曰陰分咳嗽者多屬陰虛宜用貝母勿用生薑以其辛散也昂按人特知陳皮生薑能止嘔不知亦有發嘔之時以其性上升如胃熱者非所宜也藿香亦然胸壅痰膈寒痛濕瀉消水氣行血痹産後血上衝心及汙穢不盡煎服亦良通神明去穢惡救暴卒凡中風中氣中暑中惡暴卒等症薑汁和童便飲效薑汁開痰童便降火也療狐臭薑汁頻塗搽凍耳熬膏塗殺半夏南星菌菌野禽毒野禽多食半夏故有毒生薑能解之闢霧露山嵐瘴氣早行含之搗汁和黃明膠熬貼風濕痹痛久食兼酒則患目發痔積熱使然瘡癰人忌食姜皮辛涼和脾行水治浮腫脹滿以皮行皮五皮散用之成無己曰薑棗辛甘能行脾胃之津液而和營衛不專於發散也東垣曰夜不食姜者夜主閣而姜主闢也秋不食姜者秋主收而姜主散也妊婦多食令兒歧指象形也秦椒為使惡黃連黃芩夜明砂槽姜納入蟬蛻雖老無筋乾薑黑姜燥回陽宣通脈生用辛溫逐寒邪而發表炮則辛苦大熱除胃冷而守中辛則散炮則稍苦故止而不移非若附子走而不守溫經止血炮黑止吐衄諸血紅見黑則止也定嘔消痰去臟腑沉寒痼冷能去惡生新使陽生陰長故吐衄下血有陰無陽者宜之亦能引血藥入氣分而生血故血虛發熱産後大熱者宜之此非有餘之熱乃陰虛生內熱也忌用表藥寒藥乾薑能入肺利氣能入肝引血藥生血故與補陰藥同用乃熱因熱用從治之法故亦治目睛久赤引以黑附能入腎而祛寒濕能回脈絶無陽仲景四逆白通姜附湯皆用之同五味利肺氣而治寒嗽肺惡寒燥脾濕而補脾脾惡濕通心助陽而補心氣苦入心開五臟六腑通四肢關節宣諸脈絡治冷痹寒痞反胃下利多用損陰耗氣孕婦忌之辛熱能動血王好古曰服乾薑以治中者必僭上宜大棗輔之東垣曰宜甘草以緩之母姜曬乾者為乾薑炮黑為黑姜山藥古名薯蕷補脾肺澀精氣色白入肺味甘歸脾入脾肺二經補其不足清其虛熱陰不足則內熱補陰故能清熱固腸胃潤皮毛化痰涎止瀉痢滲濕故化痰止瀉百一方山藥半生半炒米飲下治噤口痢肺為腎母故又益腎強陰治虛損勞傷王履云八味丸用之以強陰脾為心子故又益心氣子能令母實治健忘遺精昂按山藥性澀故治遺精泄瀉而諸傢俱未言澀生搗敷癰瘡消腫硬山藥能消熱腫益補其氣則邪滯自行丹溪云補陽氣生者能消腫硬是也色白而堅者入藥百合潤肺止嗽甘平潤肺寧心清熱止嗽益氣調中止涕淚涕淚肺肝熱也經曰肺為涕肝為淚心為汗脾為涎腎為唾利二便治浮腫臚脹痞滿寒熱瘡腫乳癰傷寒百合病行住坐臥不安如有鬼神狀蘇頌曰病名百合而用百合治之不識其義李士材曰亦清心安神之效耳朱二允曰久嗽之人肺氣必虛虛則宜斂百合之甘斂勝於五味之酸收花白者入藥萊蔔俗作蘿蔔宣行氣化痰消食辛甘屬土生食升氣熟食降氣寬中化痰散瘀消食丹溪曰氣升則食自降治吐血衄血咳嗽吞酸利二便解酒毒制面毒豆腐積昔有人病夢紅裳女子引入宮殿小姑歌云五靈樓閣曉玲瓏天府由來是此中惆悵悶懷言不盡一丸萊蔔火吾宮一道士云此犯大麥毒也女子心神小姑脾神醫經萊蔔制面毒遂以藥並萊蔔治之果愈腐漿見萊蔔則難收生搗治噤口痢止消渴塗跌打湯火傷多食滲血故白人髭發服何首烏地黃者忌之生薑能制其毒夏月食其菜數斤秋不患痢冬月以菜葉攤屋瓦上任霜雪打壓至春收之煎湯飲治痢得效有人避難入石洞中賊燒煙燻之口含萊蔔一塊煙不能毒嚼汁濡水飲之亦可王荊公患偏頭痛搗萊蔔汁仰臥左痛注右鼻右痛注左鼻或兩鼻齊注數十年之患二注而愈萊蔔子辛入肺甘走脾長於利氣生能升熟能降升則吐風痰散風寒寬胸膈發瘡疹降則定痰喘咳嗽調下痢後重止內痛皆利氣之功丹溪曰萊蔔子治痰有沖牆倒壁之功食醫心境研湯煎服治氣嗽痰喘吐膿血炒用白芥子宣利氣豁痰辛溫入肺通行經絡溫中開胃發汗散寒利氣豁痰消腫止痛痰行則腫消氣行則痛止為末醋調敷消癰腫治咳嗽反胃痹木腳氣筋骨諸病痰阻氣滯久嗽肺虛人禁用丹溪曰痰在脅下及皮裡膜外非此不能達行古方控涎丹用之正此義韓𢘅三子養親湯白芥子主痰下氣寬中紫蘇子主氣定喘止嗽萊蔔子主食開痞降氣各微炒研看病所主為君治老人痰嗽喘滿懶食北産者良煎湯不可過熟熟則力減芥菜子豁痰利氣主治略同蔓菁子即蕪菁瀉熱利水明目苦辛瀉熱解毒利水明目古方治目用之最多治黃疸搗服腹脹搗研濾汁飲或吐或利腹中自寬得汗愈癥瘕積聚小兒血痢蜜和汁服一切瘡疽凡癰疽搗敷皆良醋調敷禿瘡鹽搗敷乳癰冬取根用敷蜘蛛咬毒陳藏器曰蔓菁園中無蜘蛛李時珍曰蔓菁子可升可降能汗能吐能下能利小便明目解毒其功甚偉世罕知用何哉根搗敷陰囊腫大如斗末服解酒毒和蕓薹油菜也根搗汁雞子清調塗諸熱毒單鹽搗不用蕓薹亦可蕓薹宣散血消腫辛溫散血消腫搗貼乳癰丹毒孫思邈曰搗貼丹毒隨手即消其效如神動疾發瘡即油菜道家五葷之一子與葉同功治産難馬齒莧一名九頭獅子草瀉熱散血酸寒散血解毒祛風殺蟲治諸淋疳痢海上方搗汁和雞子白服治赤白痢血癖惡瘡多年惡瘡敷兩三遍即瘥燒灰煎膏塗禿瘡濕癬小兒丹毒搗汁飲以滓塗之利腸滑産葉如馬齒有大小二種小者入藥性至難燥去莖用亦忌魚鱉同食甜瓜蒂宣湧吐與淡豆豉赤小豆併為吐藥苦寒陽明胃吐藥能吐風熱痰涎上隔宿食吐去上焦之邪經所謂其高者因而越之在上者湧之木鬱達之是也越以瓜蒂淡豉之苦湧以赤小豆之酸吐去上焦有形之物則木得舒暢天地交而萬物通矣當吐而胃弱者代以參蘆朱丹溪曰吐中就有發散之義張子和曰諸汗法古方多有之惟以吐發汗世罕知之故豫嘗曰吐法兼汗以此夫昂按汗吐下和乃治療之四法仲景瓜蒂散梔豉湯並是吐藥子和治病用吐尤多丹溪治許白雲大吐二十餘日治小便不通亦用吐法甚至用四物四君以引吐成法具在今人惟知汗下和而吐法絶置不用遇邪在上焦及當吐者不行湧越致結塞而成壞證輕病致重重病致死者多矣時醫皆棄古法枉人性命可痛也夫治風眩頭痛懊憹不眠癲癇喉痹頭目濕氣水腫黃疸或合赤小豆煎或吹鼻中取出黃水濕熱諸病上部無實邪者禁用能損胃耗氣語曰大吐亡陽大下亡陰凡取吐者須天氣清明巳午以前令病人隔夜勿食卒病者不拘類編云一女子病齁喘不止遇道人教取瓜蒂七枚為末調服其汁即吐痰如膠黏三進而病如掃冬瓜又名白瓜瀉熱補脾寒瀉熱甘益脾利二便消水腫冬瓜任吃效止消渴苗葉皆治消渴散熱毒癰腫切片敷之丹溪曰冬瓜性急而走久病陰虛者忌之昂按冬瓜日食常物於諸瓜中尤覺宜人且味甘而不辛何以見其性急而走乎子補肝明目凡藥中所用瓜子皆冬瓜子也絲瓜瀉熱涼血宣通經絡甘平蘇頌曰冷涼血解毒除風化痰通經絡行血脈老者筋絡貫穿象人經絡故可借其氣以引之消浮腫稀痘瘡出不快者燒存性入硃砂蜜水調服治腸風崩漏疝痔癰疽滑腸下乳茄根瀉散血消腫散血消腫煮汁漬凍瘡史國公藥酒用白茄根為君茄根以馬尿浸三日曬炒為末點牙即落茄子甘寒散血寬腸動風發病金石水土部金重鎮心肝定郁悸辛平有毒生金屑服之殺人昂按金性至剛重墜與血肉之體不相宜故服之致死非其性有毒也人被金銀灼者並不潰爛無毒可知矣精金粹玉世之寶器豈有毒氣哉金制木重鎮怯故鎮心肝安魂魄雖云重墜亦借其寶氣也古方有紅雪紫雪皆並金銀煮汁亦假其氣耳治驚癇風熱肝膽之病肝經風熱則為驚癇失志魂魄飛揚肝屬木而畏金與心為子母之臟故其病同源一治丸散用箔為衣煎劑加入藥煮畏鉛水銀遇鉛則碎五金皆畏水銀銀功用略同銅緑即銅青宣去風痰酸平微毒治風爛淚眼惡瘡疳瘡婦人血氣心痛吐風痰合金瘡止血殺蟲治皆肝膽之病亦金勝木之義用醋製銅刮用自然銅重續筋骨辛平主折傷續筋骨散瘀止痛折傷必有死血瘀滯經絡然須審虛實佐以養血補氣溫經之藥銅非煅不可用火毒金毒相煽復挾香藥熱毒內攻雖有接骨之功必多燥散之禍用者慎之産銅坑中火煅醋淬七次細研甘草水飛用昔有飼折翅雁者雁飛去故治折傷鉛重墜痰解毒甘寒屬腎稟壬癸之氣水中之金金丹之母八石之祖丹灶家必用之安神解毒墜痰殺蟲烏須製為梳以梳須明目鉛丹即黃丹用黑鉛加硝黃鹽礬煉成鹹寒沉重味兼鹽礬內用墜痰去怯消積殺蟲治驚疳瘧痢外用解熱拔毒去瘀長肉熬膏必用之藥用水漂去鹽硝砂石微火炒紫色攤地上去火毒用鉛粉主治略同亦名胡粉錫粉李時珍曰鉛粉亦可代鉛丹熬膏然未經鹽礬火煅又有豆粉蛤粉雜之只入氣分不能入血分也鐵重墜痰鎮驚辛平重墜鎮心平肝定驚療狂消癰解毒諸藥多忌之李時珍曰補腎藥尤忌之畏磁石皂莢皂莢木作薪則斧裂煅時砧上打落者名鐵落素問用治怒狂如塵飛起者名鐵精器物生衣者名鐵鏽鹽醋浸出者名鐵華李時珍曰大抵借金氣以平木墜下解毒無他義也針砂消水腫黃疸散癭瘤烏髭發烏須方多用之密陀僧重鎮驚劫痰消積辛鹹小毒感銀鉛之氣而結墜痰鎮驚止血散腫消積殺蟲療腫毒愈凍瘡用桐油調敷解狐臭油調搽腋以饅頭蒸熱劈開摻末夾腋下亦佳染髭鬚出銀坑難得今用者乃傾銀爐底入藥煮一伏時丹砂重鎮心定驚瀉熱體陽性陰內含陰汞味甘而涼色赤屬火性反驚者離中虛有陰也味不苦而甘者火中有土也瀉心經邪熱心經血分主藥鎮心清肝明目發汗汗為心液定驚祛風辟邪胡玉少卿多惡夢遇推官胡用之胡曰昔常患此有道士教戴靈砂而驗逐解髻中絳囊授之即夕無夢解毒胎毒痘毒宜之止渴安胎博救方水煮一兩研酒服能下死胎李時珍曰同遠志龍骨之類養心氣同丹參當歸之類養心血同地黃枸杞之類養腎同厚朴川椒之類養脾同南星川烏之類祛風多服反令人癡呆辰産明如箭鏃者良名箭鏃砂細研水飛三次用生用無毒火煉則有毒服餌常殺人惡磁石畏鹽水忌一切血鄭康成注周禮以丹砂雄黃石膽礬石磁石為五毒古人用以攻瘍水銀重外用殺蟲辛寒陰毒功專殺蟲治瘡疥蟣蝨性滑重且入肉頭瘡切不可用恐入經絡令人筋骨拘攣解金銀銅錫毒能殺五金墮胎絶孕從丹砂燒煅而出畏磁石砒霜得鉛則凝得硫則結並棗肉入唾研則碎散失在地者以花椒茶末收之輕粉燥劫痰涎外用殺蟲辛冷時珍曰燥有毒殺蟲治瘡劫痰消積能消涎積十棗湯加大黃牽牛輕粉名三化神祐散善入經絡瘛瘲藥多用之不可過服常用時珍曰水銀陰毒用火煅丹砂而出再加鹽礬煉為輕粉輕揚燥烈走而不守今人用治楊梅毒瘡雖能劫風痰濕熱從牙齦出邪郁暫解然毒氣竄入經絡筋骨血液耗亡筋失所養變為筋攣骨痛癰腫疳漏遂成廢痼貽害無窮上下齒齦屬手足陽明腸胃經毒氣循經上行至齒齦薄嫩之處而出土茯苓黃連黑鉛鐵漿陳醬能制其毒空青重明目甘酸而寒益肝明目通竅利水産銅坑中大塊中空有水者良雲母補中甘平屬金色白入肺下氣補中堅肌續絶治勞傷瘧痢瘡腫癰疽同黃丹熬膏貼之千金翼用敷金瘡青城山人康道豐有云母粉方能治百病有五色以色白光瑩者為上古人亦有煉服者雲母入火經時不焦入土不腐故云服之長生使澤瀉惡羊肉石膏體重瀉火氣輕解肌甘辛而淡體重而降足陽明經胃大寒之藥色白入肺兼入三焦諸經氣分之藥寒能清熱降火辛能發汗解肌甘能緩脾益氣生津止渴治傷寒鬱結無汗陽明頭痛發熱惡寒日晡潮熱肌肉壯熱經云陽盛生外熱小便赤濁大渴引飲中暑自汗能發汗又能止自汗舌焦胎厚無津牙痛陽明經熱為末擦牙固齒又胃主肌肉肺主皮毛為發斑發疹之要品色赤如錦紋者為斑隱隱見紅點者為疹斑重而疹輕率由胃熱然亦有陰陽二證陽證宜用石膏又有內傷陰證見斑疹者微紅而稀少此胃氣極虛逼其無根之火遊行於外當補益氣血使中有主則氣不外遊血不外散若作熱治死生反掌醫者宜審但用之甚少則難見功白虎湯以之為君或自一兩加至四兩竹葉麥冬知母粳米亦加四倍甚者加芩連柏名三黃石膏湯虛者加人參名人參白虎湯然能寒胃胃弱血虛及病邪未入陽明者禁用成無己解大青龍湯曰風陽邪傷衛寒陰邪傷營營衛陰陽俱傷則非輕劑所能獨散必須重輕之劑同散之乃得陰陽之邪俱去營衛俱和石膏乃重劑而又專達肌表也質重氣輕又成氏以桂麻為輕劑石膏為重劑也東垣曰石膏足陽明藥仲景用治傷寒陽明證身熱目痛鼻開不得臥邪在陽明肺受火制故用辛寒以清肺氣所以有白虎之名肺主西方也按陽明主肌肉故身熱脈交額中故目痛脈起於鼻循鼻外金燥故鼻乾胃不和則臥不安故不得臥然亦有陰虛發熱及脾胃虛勞傷寒陰盛格陽內寒外熱類白虎湯證誤投之不可救也按陰盛格陽陽盛格陰二證至為難辨蓋陰盛極而格陽於外外熱而內寒陽盛極而格陰於外外冷而內熱經所謂重陰必陽重陽必陰重寒則熱重熱則寒是也當於小便分之便清者外雖燥熱而中實寒便赤者外雖厥冷而內實熱也再看口中之燥潤及舌苔之淺深胎黃黑者為熱宜白虎湯然亦有舌黑屬寒者舌無芒刺口有津液也急宜溫之誤投寒劑即死矣亦名寒水石時珍曰古方所用寒水石是凝水石唐宋諸方用寒水石即石膏凝水石乃鹽精滲入土中年久結成清瑩有稜入水即化辛鹹大寒治時氣熱盛口渴水腫瑩白者良研細甘草水飛用近人因其寒或用火煅則不傷胃味淡難出若入煎劑須先煮數十沸雞子為使忌巴豆鐵滑石滑利竅通行水體重瀉火氣輕解肌滑利竅淡滲濕甘益氣補脾胃寒瀉熱降心火色白入肺上開腠理而發表肺主皮毛下走膀胱而行水通六腑九竅津液為足太陽經膀胱本藥治中暑積熱嘔吐煩渴黃疸水腫腳氣淋閉偏主石淋水瀉熱痢六一散加紅曲治赤痢加乾薑治白痢吐血衄血諸瘡腫毒為蕩熱除濕之要劑消暑散結通乳滑胎時珍曰滑石利竅不獨小便也上開腠理而發表是除上中之濕熱下利便溺而行水是除中下之濕熱熱去則三焦寧而表裡和濕去則闌門通而陰陽利矣闌門分別清濁乃小腸之下口河間益元散通治上下表里諸病蓋是此意益元散一名天水散一名六一散取天一生水地六成之之義滑石六錢甘草一錢或加辰砂滑石治渴非實止渴資其利竅滲去濕熱則脾胃中和而渴自止耳若無濕小便利而渴者內有燥熱宜滋潤或誤服此則愈亡其津液而渴轉甚矣故王好古以為至燥之劑白而潤者良石葦為使宜甘草走泄之性宜甘草以和之朴硝芒硝朴硝即皮硝大瀉潤燥軟堅辛能潤燥咸能軟堅苦能下泄大寒能除熱朴硝酷澀性急芒硝經煉稍緩能蕩滌三焦腸胃實熱推陳致新按致新則瀉亦有補與大黃同蓋邪氣不除則正氣不能復也治陽強之病傷寒經曰人之傷於寒也必病熱蓋寒鬱而為熱也疫痢積聚結癖留血停痰黃疸淋閉瘰癧瘡腫目赤障翳通經墮胎豐城尉家有貓子死腹中啼叫欲絶醫以硝灌之死子即下後有一牛亦用此法得活本用治人治畜亦驗經疏曰硝者消也五金八石皆能消之況臟腑之積聚乎其直往無前之性所謂無堅不破無熱不蕩者也病非熱邪深固閉結不通不可輕投恐誤伐下焦真陰故也成無己曰熱淫於內治以鹹寒氣堅者以咸軟之熱盛者以寒消之故仲景大陷胸湯大承氣湯調胃承氣湯皆用芒硝以軟堅去實熱結不至堅者不可用也佐之以苦故用大黃相須為使許譽卿曰芒硝消散破結軟堅大黃推蕩走而不守故二藥相須同為峻下之劑王好古曰本草言芒硝墮胎然妊娠傷寒可下者兼用大黃以潤燥軟堅瀉熱而母子相安經曰有故無殞亦無殞也此之謂歟謂藥自病當之故母與胎俱無患也硝能柔五金化七十二種石為水生於鹵地刮取煎煉在底者為朴硝在上有芒者為芒硝有牙者為馬牙硝置風日中消盡水氣輕白如粉為風化硝大黃為使本經別録朴硝硝石雖分二種而氣味主治略同後人辨論紛然究無定指李時珍曰朴硝下降屬水性寒硝石為造炮焰硝上升屬火性溫昂按世人用硝從未有取其上升而溫者李氏之說恐非確論元明粉瀉熱潤燥軟堅辛甘而冷去胃中之實熱蕩腸中之宿垢潤燥破結消腫明目血熱去則腫消而目明昂按瀉痢不止用大黃元明粉以推蕩之而瀉痢反止蓋宿垢不淨疾終不除經所謂通因通用也朴硝煎化用萊蔔煮再用甘草煎入罐火煅以去其鹹寒之性陰中有陽性稍和緩大抵用代朴硝若胃虛無實熱者禁用俱忌苦參太陰玄精石瀉熱補陰太陰之精鹹寒而降治上盛下虛救陰助陽有扶危拯逆之功正陽丹用治傷寒壯熱來復丹用治伏暑熱瀉出解池通泰積鹽處鹹鹵所結青白瑩徹片皆六稜者良今世用者多是絳石赤石脂重澀固大小腸甘而溫故益氣生肌而調中酸而澀故收濕獨行方煅末治小兒臍中汁出赤腫止血而固下經疏云大小腸下後虛脫非澀劑無以固之其他澀藥輕浮不能達下惟赤石脂體重而澀直入下焦陰分故為久痢泄癖要藥仲景桃花湯用之加乾薑粳米療腸癖泄痢崩帶遺精癰痔潰瘍收口長肉催生下胞經疏云能去惡血惡血化則胞胎無阻東垣云胞胎不出澀劑可以下之又云固腸胃有收斂之能下胎衣無推蕩之峻細膩黏舌者良赤入血分白入氣分五色石脂入五臟研粉水飛用惡芫花畏大黃禹餘糧重澀固下甘平性澀手足陽明大腸胃血分重劑治咳逆下痢血閉癥瘕血崩能固下李先知云下焦有病人難會須用餘糧赤石脂又能催生石中黃粉生於池澤無砂者良牡丹為使浮石一名海石瀉火軟堅咸潤下寒降火色白體輕入肺清其上源肺為水之上源止渴止嗽通淋軟堅除上焦痰熱消癭瘤結核頑痰所結咸能軟堅俞琰席上腐談云肝屬木當浮而反沉肺屬金當沉而反浮何也以肝實而肺虛也故石入水則沉而南海有沉水之香虛實之反如此水沫日久結成海中者味鹹更良硼砂潤生津去痰熱甘微咸涼色白質輕故除上焦胸膈之痰熱生津止嗽治喉痹口齒諸病初覺喉中腫痛含化咽津則不成痹能金而去垢膩故治噎膈積塊結核胬肉目翳骨哽鹼能軟堅含之咽汁出西番者白如明礬出南番者黃如桃膠能制汞啞銅硼砂硇砂並可作金銀焊硇砂瀉消肉積鹹苦辛熱有毒消食破瘀治噎膈癥瘕去目翳胬肉暖子宮助陽道性大熱能爛五金本草稱其能化人心為血亦甚言不可多服耳凡煮硬肉投少許即易爛故治噎膈癥瘕肉積有殊功雞峰方云人之臟腑多因觸冒成病而脾胃最易受觸飲食過多則停滯難化冷熱不調則嘔吐瀉痢而膏梁者為尤甚口腹不節須用消化藥或言飲食既傷於前難以毒藥反攻其後不使硇砂巴豆等只用曲柏之類不知古今立方用藥各有主對曲柏只能消化米穀如傷肉食則非硇砂阿魏不能治也如傷魚蟹須用橘葉紫蘇生薑傷菜果須用丁香桂心傷水飲須用牽牛芫花必審所傷之因對用其藥則無不愈其間多少則隨患人氣血以增損之而已又有虛人沉積不可直取當以蠟匱其藥蓋蠟能久留腸胃又不傷氣能消磨至盡也又有脾虛飲食遲化者正宜助養脾胃自能消磨更不須用消導藥耳病久積而成癥瘕者須用三稜鱉甲之類寒冷成積者輕則附子厚朴重則礬石硫黃瘀血結塊者則用大黃桃仁之類用者詳之出西戎乃滷液結成狀如鹽塊置冷濕處即化白淨者良水飛過醋煮干如霜用畏醋忌羊血磁石重補腎辛鹹色黑屬水能引肺金之氣入腎補腎益精除煩祛熱通耳明目耳為腎竅腎水足則目明治羸弱周痹骨節痠痛腎主骨驚癇重鎮怯腫核咸軟堅誤吞針鐵末服止金瘡血十劑曰重可去怯磁石鐵粉之屬是也經疏云石藥皆有毒獨磁石沖和無悍猛之氣又能補腎益精然體重漬酒優於丸散時珍曰一士病目漸生翳珍以羌活勝濕湯加減而以磁朱丸佐之兩月而愈蓋磁石入腎鎮養真陰使神水不外移硃砂入心鎮養心血使邪火不上侵佐以神麯消化滯氣溫養脾胃生髮之氣乃道家黃婆媒合嬰奼之理方見孫真人千金方但云明目而未發出用藥微義也黃婆脾也奼女心也嬰兒腎也色黑能吸鐵者真火煅醋淬碾末水飛或醋煮三日夜用柴胡為使殺鐵消金惡牡丹礞石重瀉痰甘威有毒體重沉墜色青入肝制以硝石能平肝下氣為治驚利痰之聖藥吐痰在水上以石末摻之痰即隨下王隱君有礞石滾痰丸能治百病礞石焰硝各二兩煅研水飛淨一兩大黃酒蒸八兩黃芩酒洗八兩沉香五錢為末水丸量虛實服時珍曰風木太過來制脾土氣不運化積滯生痰壅寒上中二焦變生諸證礞石重墜硝性疏快使痰積通利諸證自除氣弱脾虛者禁用堅細青黑中有白星點硝石礞石等分打碎拌勻入坩鍋煅至硝盡石色如金為度如無金星者不入藥研末水飛去硝毒用代赭石重鎮虛逆養陰血苦寒養血氣平血熱入肝與心包專治二經血分之病吐衄崩帶胎動産難小兒慢驚赭石半錢冬瓜仁湯調服金瘡長肉仲景治傷寒汗吐下後心下痞硬噫氣用代赭旋覆湯取其重以鎮虛逆赤以養陰血也今人用治膈噎甚效煅紅醋淬水飛用乾薑為使畏雄附花蕊石澀止血酸澀氣平專入肝經血分能化瘀血為水止金瘡出血刮末敷之即合仍不作膿局方治損傷諸血胎産惡血血暈有花蕊石散下死胎胞衣惡血化則胞胎無阻出陝華代地體堅色黃煅研水飛用爐甘石燥溫治目疾甘溫陽明胃經藥受金銀之氣金勝木燥勝濕故止血消腫收濕除爛退赤去翳為目疾要藥産金銀坑中金銀之苗也狀如羊脂松似石脂能點赤銅為黃今之黃銅皆其所點也煅紅童便淬七次研粉水飛用陽起石重補腎命鹹溫補右腎命門治陰痿精乏子宮虛冷腰膝冷痹水腫癥瘕寇宗奭曰凡石藥冷熱皆有毒宜酌用按經曰石藥發癲芳草發狂芳草之氣美石藥之氣悍二者相遇恐內傷脾出齊州陽起山雲母根也雖大雪遍境此山獨無以雲頭雨腳鷺鷥毛色白滋潤者良真者難得火煅醋淬七次研粉水飛用亦有用燒酒樟腦升煉取粉者桑螵蛸為使惡澤瀉菌桂畏菟絲子忌羊血鍾乳補陽甘溫陽明胃氣分藥木石之精強陰益陽通百節利九竅補虛勞下乳汁服之令人陽氣暴充飲食倍進形體壯盛然其性慓悍須命門真火衰者可偶用之若藉以恣欲多服久服不免淋濁癰疽之患出洞穴中石液凝成下垂如冰柱通中輕薄如鵝翎管碎之如爪甲光明者真煉合各如本方蛇床為使惡牡丹紫石英忌參朮羊肉蔥蒜胡荽白石英重潤肺甘辛微溫肺大腸經氣分之藥潤以去燥利小便實大腸治肺痿吐膿咳逆上氣但系石類祗可暫用十劑曰濕可去枯白石英紫石英之屬是也濕即潤也按潤藥頗多石藥終燥而徐之才取二石英為潤劑存其意可取白如水晶者良紫石英重鎮心潤補肝甘平性溫而補重以去怯濕以去枯入心肝血分故心神不安肝血不足女子血海虛寒不孕者宜之沖為血海任主胞胎經疏云女子系胞於腎及心包絡虛則風寒乘之故不孕紫石英辛溫走二經散風寒鎮下焦為暖子宮之要藥色深紫瑩徹五稜火煅醋淬七次研末水飛用二英俱畏附子惡黃連石英五色各入五臟雄黃重解毒殺蟲辛溫有毒得正陽之氣入肝經氣分搜肝強脾散百節大風殺百毒闢鬼魅治驚癇痰涎頭痛眩暈暑瘧澼痢泄瀉積聚虞雍公道中冒暑泄痢連月夢至仙居延之坐壁中有詞云暑毒在脾濕氣連腳不泄則痢不痢則瘧獨煉雄黃蒸餅和藥甘草作湯食之安樂別作治療醫家大錯如方服之遂愈又能化血為水燥濕殺蟲治勞疳瘡疥蛇傷赤似雞冠明徹不臭重三五兩者良醋浸入萊蔔汁煮乾用生山陰者名雌黃功用略同劣者名熏黃燒之則臭只堪熏瘡疥殺蟲蝨石硫黃燥補陽殺蟲味酸有毒大熱純陽硫黃陽精極熱與大黃極寒並號將軍補命門真火不足性雖熱而疏利大腸與燥澀者不同熱藥多祕惟硫黃暖而能通寒藥多泄惟黃連肥湯而止瀉若陽氣暴絶陽毒傷寒久患寒瀉脾胃虛寒命欲垂盡者用之亦救危妙藥也治寒痹冷癖足寒無力老人虛祕局方用半硫丸婦人陰蝕小兒慢驚暖精壯陽殺蟲療瘡闢鬼魅化五金能幹汞王好古曰太白丹來復丹皆用硫黃佐以硝石至陽佐以至陽與仲景白通湯佐以人尿豬膽汁意同所以治內傷生冷外冒暑濕霍亂諸病能除扦格之寒兼有伏陽不得不爾如無伏陽只是陰虛更不必以陰藥佐之夷堅志云唐與正亦知醫能以意治病吳巡檢病不得溲臥則微通立則不能涓滴遍用通藥不效唐問其平日自制黑錫丹常服因悟曰此必結砂時硫飛去鉛不死鉛砂入膀胱臥則偏重猶可溲立則正塞水道故不通取金液丹三百粒分十服瞿麥湯下鉛得硫則化水道遂通家母舅童時亦病溺澀服通淋藥罔效老醫黃五聚視之曰此乃外皮竅小故溺時艱難非淋症也以牛骨作楔塞於皮端竅漸展開勿藥而愈使重服通利藥得不更變他證乎乃知醫理非一端也硫能化鉛為水修煉家尊之為金液丹番舶者良難得取色黃堅如石者以萊蔔剜空入硫合定糠火煨熟去其臭氣以紫背浮萍煮過消其火毒以皂莢湯淘其黑漿一法絹袋盛酒煮三日夜一法入豬大腸爛煮三時用畏細辛諸血醋土硫黃辛熱腥臭只可入瘡藥不可服餌石蟹重瀉明目鹹寒治青盲目翳天行熱疾解一切金石藥毒醋磨敷癰腫出南海身全是蟹而質石也細研水飛用無名異重和血行傷鹹入血甘補血治金瘡折傷癰疽腫毒醋磨塗止痛生肌人受杖時須服三五錢不甚痛傷生川廣小黑石子也一包數百枚礜石重燥祛寒積辛熱有大毒治堅癖痼冷寒濕風痹蘇恭曰攻寒冷之病最良別録曰不煉服殺人此石生於山無雪入水不冰時珍曰性氣與砒石相近博物志言鸛伏卵時取此石暖足謬也有瘡白數種火燒但解散不能脫其堅置水不凍者真惡羊血砒石大燥劫痰辛苦而咸大熱大毒砒霜尤烈專能燥痰可作吐藥療風痰在胸膈截瘧除哮外用蝕敗肉殺蟲枯痔出信州故名信石衡州次之錫之苗也故錫壺亦云有毒生者名砒黃煉者名砒霜畏緑豆冷水羊血石灰重燥濕止血生肌辛溫性烈能堅物散血定痛生肌止金瘡血臘月用黃牛膽汁和納膽中陰乾用殺瘡蟲有人腳肚生一瘡久遂成漏百藥不效自度必死一村人見之曰此鱔漏也以石灰溫泡熏洗覺癢即是也洗不數次遂愈蝕惡肉無瘢疵和藥點痣解酒酸酒家多用之然有灰之酒傷人內用止瀉痢崩帶收陰挺陰肉挺出亦名陰菌或産後玉門不閉熬黃水泡澄清暖洗脫肛消積聚結核風化者良壙灰火毒已出主頑瘡膿水淋漓斂口尤妙白礬澀燥濕墜痰酸鹹而寒性澀而收燥濕追涎化痰墜濁解毒生津除風殺蟲止血定痛通大小便蝕惡肉生好肉除痼熱在骨髓髓為熱所劫則空故骨痿而齒浮治驚癇黃疸血痛喉痹齒痛風眼鼻中息肉崩帶脫肛陰蝕陰挺陰肉挺出肝經之火疔腫癰疽瘰癧疥癬虎犬蛇蟲咬傷時珍曰能吐風熱痰涎取其酸苦湧泄也治諸血痛陰挺脫肛瘡瘍取其酸澀而收也治風眼痰飲泄痢崩滯取其收而燥濕也治喉痹癰蠱蛇傷取其解毒也多服損心肺傷骨寇宗奭曰劫水故也書紙上水不能濡故知其性劫水也李迅曰凡發背當服蠟礬丸以護膜防毒氣內攻礬一兩黃蠟七錢溶化和丸每服十丸漸加至二十丸日服百丸則有力此藥護膜托裡解毒化膿功甚大以白礬芽茶搗末冷水服解一切毒取潔白光瑩者煅用又法以火煅地酒水於上取礬布地以盤復之四面灰擁一日夜礬飛盤上掃收之為礬精未盡者更如前法再以陳苦酒醋也化之名礬華七日可用百日彌佳甘草為使畏麻黃惡牡蠣生用解毒煅用生肌膽礬一名石膽宣吐風痰澀斂咳逆酸澀辛寒入少陽膽經性斂而能上行湧吐風熱痰誕發散風木相火治喉痹醋調咽吐痰誕立效咳逆痙癇崩淋能殺蟲治牙蟲瘡毒陰蝕産銅坑中乃銅之精液故能入肝膽治風木磨鐵作銅色者真形似空青鴨嘴色為上市人多以醋揉青礬僞之畏桂芫花辛夷白薇皂礬一名緑礬澀燥濕化痰酸湧澀收燥濕化痰解毒殺蟲之功與石礬同而力差緩主治略同白礬利小便消食積同健脾消食藥為丸散喉痹醋調咽汁時珍曰脹滿黃腫瘧痢疳疾方往往用之其源則自仲景用礬石硝石治女勞黃疸方中變化而來深青瑩淨者良煅赤用煅赤名絳礬能入血分伐肝木燥脾濕張三丰治腫滿有伐木丸蒼朮二斤米泔浸黃酒面曲四兩炒絳礬一斤醋拌曬乾入瓶火煅為末醋糊丸酒下或去皂礬乃銅之精液用醋製以平肝勝於針鐵不必忌鹽後亦不發多服令人瀉青鹽即戎鹽補腎瀉血熱甘鹹而寒入腎經助水臟平血熱治目痛赤澀吐血溺血齒舌出血堅骨固齒擦牙良明目烏須余同食鹽出西羌不假煎煉方稜明瑩色青者良食鹽瀉熱潤燥補心通二便宣引吐鹹甘辛寒咸潤下故通大小便咸走血而寒勝熱故治目赤癰腫血熱熱疾咸補心故治心虛以水制火取既濟之義故補心藥用鹽炒一人病笑不休用鹽煅赤煎沸飲之而瘳經曰神有餘則笑不休神心火也用鹽水制火也一婦病此半年張子和亦用此法而愈鹹入腎而主骨故補腎藥用鹽湯下故堅肌骨治骨病齒痛擦牙亦佳清火固齒齒縫出血夜以鹽厚敷齦上瀝涎盡乃臥或問咸能軟堅何以堅肌骨不知骨消筋緩皆因濕熱熱淫於內治以鹹寒譬如生肉易潰得鹽性鹹寒則能堅久不壞也咸潤燥而辛泄肺煎鹽用皂角收故味微辛故治痰飲喘逆本經治喘逆惟哮症忌之咸軟堅故治結核積聚又能湧吐醒酒水勝火解毒火熱即毒也能散火涼血殺蟲浙西將軍蚓毒每夕蚓鳴於體一僧教以鹽湯浸身數次而愈定痛止癢體如蟲行風熱也鹽湯浴三四次佳亦治一切風氣凡湯火傷急以鹽生摻之護肉不壞再用藥敷多食傷肺走血滲津發渴經曰咸走血血病毋多食鹹食鹹則口乾者為能滲胃中津液也凡血病哮喘水腫消渴人為大忌鹽品頗多江淮南北鹽生於海山西解州鹽生於池四川雲南鹽生於井戎鹽生於土光明鹽或生於階州山崖或産於五原鹽池狀若水晶不假煎煉一名水晶鹽石鹽生於石木鹽生於樹蓬鹽生於草造化之妙誠難窮矣急流水通性速而趨下通二便風痹藥宜之昔有病小便閉者衆不能瘥張子和易以急流之水煎前藥一飲而溲時珍曰天下之水滅火濡枯則同至於性從地變質與物遷者未嘗同也逆流回瀾水宣性逆而倒上中風卒厥宣痰飲之藥宜之甘瀾水補用流水以瓢揚萬遍亦曰勞水水性咸而重勞之則甘而輕仲景用煎傷寒勞傷等藥取其不助腎氣而益脾胃也井泉水補將旦首汲曰井華水出甕未放曰無根水無時初出曰新汲水解熱悶煩渴凡熱病不可解者新汲水浸青色衣服互尉之炒心悶汗出新汲水蜜和飲炒煎補陰之藥宜之井以有地脈山泉者為上從江湖滲來者次之其城市近溝渠汙穢者咸而有鹼煮粥煎茶味各有異以之入藥其可無擇乎百沸湯宣助陽氣助陽氣行經絡汪穎曰湯須百沸者佳寇宗奭曰患風冷氣痹人以湯淋腳至膝厚復取汗然別有藥特假陽氣而行耳四時暴瀉痢四肢臍腹冷坐深湯中浸至腹上生陽之藥無速於此張從正曰凡傷風寒酒食初起無病便飲太和湯或酸薺水揉肚探吐汗出即已昂按感冒風寒而以熱湯澡浴亦發散之一法故內經亦有可湯尉可浴及摩之浴之之文備急方治心腹卒脹痛欲死煮熱湯以漬手足冷即易之陰陽水一名生熟水宣和陰陽治霍亂吐瀉有神功陰陽不和而交爭故上吐下瀉而霍亂飲此輒定者分其陰陽使和平也按霍亂有寒熱二證藥中能治此者甚多然未嘗分別言之倉卒患此脈候未審慎勿輕投偏熱寒之劑曾見有霍亂服薑湯而立斃者唯飲陰陽水為最穩霍亂邪在上焦則吐邪在下焦則瀉邪在中焦則吐瀉兼作此濕霍亂症輕易治又有心腹絞痛不得吐瀉者名乾霍亂俗名絞腸痧其死甚速古方用鹽熬熱童便調飲極為得治勿與穀食即米湯下咽亦死以沸湯半鍾井水半鍾和服黃薺水宣湧吐酸鹹吐痰飲宿食酸苦湧泄為陰也露水潤肺甘平止消渴宜煎潤肺之藥秋露造酒最清冽百花上露令人好顏色霜殺物露滋物性隨時異也露能解暑故白露降則處暑矣瘧必由於暑故治瘧藥露一宿服臘雪水瀉熱甘寒治時行瘟疫宜煎傷寒火暍音謁傷暑之藥抹痱良冰瀉熱甘寒太陰之精水極似土傷寒陽毒熱甚昏迷者以一塊置膻中兩乳中間良解燒酒毒陳藏器曰盛夏食冰與氣候相反冷熱相激卻致諸疾宋徽宗食冰太過病脾疾國醫不效楊介進大理中丸上曰服之屢矣介曰病因食冰臣請以冰煎此藥治受病之源也果愈地漿瀉熱解毒甘寒治瀉痢冷熱赤白腹內熱毒絞痛解一切魚肉菜果藥物諸菌毒菌音郡生朽木濕地上亦名菌音尋上聲及蟲蜞入腹如誤食馬蟥蜞入腹生子為患用地漿下之中暍暑熱卒死者取道上熱土圍臍令人尿臍中以熱土大蒜等分搗水去渣灌之即活以新水沃黃土攪濁再澄清用凡跌打損傷取淨土蒸熱以布裹更互尉之勿大熱恐破肉雖瘀血凝積氣絶欲死者亦活宋神宗皇子病瘛瘲國醫不能治錢乙進黃土湯而愈帝問其故對曰以土伏水水得其平風自止矣孩兒茶瀉熱生津澀收濕苦澀清上膈熱化痰生津止血收濕定痛生肌塗金瘡口瘡硼砂等分陰疳痔腫出南番云是細茶末納竹筒埋土中日久取出搗汁熬成塊小潤澤者上大而枯者次之百草霜輕止血消積辛溫止血鼻衄者水調塗之紅見黑則止水剋火也消積治諸血病傷寒陽毒發斑疸膈瘧痢咽喉口舌白禿諸瘡時珍曰皆兼取火化從治之法灶突上煙煤墨辛溫止血生肌飛絲塵芒入目濃磨點之點鼻止衄豬膽汁磨塗諸癰腫醋磨亦可酒磨服治胞不下伏龍肝重調中止血燥濕消腫辛溫調中止血去濕消腫治咳逆反胃吐衄崩帶尿血遺精腸風癰腫醋調塗臍瘡研敷丹毒臘月豬脂或雞子白調敷催生下胎博救方子死腹中水調三錢服其土當兒頭上戴出斧心多年黃土一云灶額內火氣積久結成如石外赤中黃研細水飛用鹼一作鹼瀉磨積去垢辛苦澀溫消食磨積去垢除痰治反胃噎膈點痣黶疣贅與礦灰等分用小麥杆灰煎乾為末挑破痣三點即瘥發麵浣衣用之取蓼蒿之屬浸曬燒灰以原水淋汁每百斤入粉面二三斤則凝定如石禽獸部雞補屬巽屬木故動風其肉甘溫補虛溫中日華曰黑雌雞補産後虛勞馬益卿曰妊婦宜食牡雞取陽精之全於天也崔行功曰婦人産死多是富貴擾攘致産婦驚亂故耳屏人靜産更爛煮牡雞汁作粳米粥與食自然無恙雞汁性滑而濡不食其肉恐難化也俗家每産後即食雞啖卵壯者幸無事弱者因而致疾矣龔雲林曰四五年老母雞取湯煮粥食能固胎雞冠居清高之分其血乃精華所聚雄而丹者屬陽故治中惡驚忤以熱血濿口塗面吹鼻良本乎天者親上故塗口眼喎斜用老者取其陽氣充足也能食百蟲故治蜈蚣蚯蚓蜘蛛咬毒雞子甘平鎮心安五臟益氣補血清咽開音散熱定驚止嗽止痢醋煮食治赤白久痢利産安胎胞衣不下者吞卵黃二三枚解發刺喉令吐即下多食令人滯悶哺雛蛋殼細研麻油調搽痘毒神效雞肫皮一名雞內金一名䏶胵音皮鴟甘平性澀雞之脾也能消水穀除熱止煩通小腸膀胱治瀉痢便數遺溺溺血崩帶腸風膈消反胃小兒食瘧男用雌女用雄雞矢醴微寒下氣消積利大小便內經用治膨脹臘月取雄雞屎白收之醋和塗蚯蚓蜈蚣咬毒合米炒治米症烏骨雞補虛勞甘平雞屬木而骨黑者屬水得水木之精氣故能益肝腎退熱補虛治虛勞消渴下痢噤口煮汁益胃帶下崩中肝腎血分之病鬼擊卒死者用其血塗心下效睽車志夏侯弘捉得一小鬼問所持何物曰殺人以此矛戟中心腹者無不輒死弘曰治此有方否鬼曰以烏雞敷之即瘥骨肉俱黑者良舌黑者骨肉俱黑男用雌女用雄女科有烏雞丸治百病鴨補陰甘冷入肺腎血分滋陰補虛除蒸止嗽利水道治熱痢白毛烏骨者為虛勞聖藥取金肅水寒之象也葛可久有白鳳膏老者良酒或童便煮熱血解金銀丹石砒霜諸毒及中惡溺死者卵甘鹹微寒能滋陰除心腹膈熱鹽藏食良五靈脂宣行血止痛甘溫純陰氣味俱厚入肝經血分通利血脈散血和血血閉能通生用經多能止炒用治血痹血積血眼血痢腸風崩中一切血病圖經云血暈者半炒半生末服一錢心腹血氣一切諸痛又能除風化痰殺蟲消積諸痛皆屬於木諸蟲皆生於風治驚疳瘧疝蛇蠍蜈蚣傷血虛無瘀者忌用五靈脂一兩雄黃五錢酒調服滓敷患處治毒蛇咬傷李仲南曰五靈脂治崩中非正治之藥乃去風之劑沖任經虛被風襲傷營血以致崩中暴下與荊芥防風治崩義同方悟古人識見深遠如此時珍曰此亦一說但未及肝虛血滯亦自生風之意按沖為血海任主胞胎任脈通衝脈盛則月事以時下無崩漏之患且易有子北地鳥名寒號蟲矢也即曷旦鳥夜鳴求旦夏月毛採五色鳴曰鳳凰不如我冬月毛落忽寒而號曰得過且過高士奇曰月令仲冬之月鶡鴠不鳴似與寒號之名未協黑色氣甚臊惡糖心潤澤者真研末酒飛去砂石用行血宜生止血宜炒惡人參夜明砂一名天鼠矢瀉散血明目辛寒肝經血分藥活血消積治目盲障翳加石決明豬肝煎名決明夜靈散治雞盲眼瘧鬾音奇小兒鬼驚疳蝙蝠及矢並治驚疳瘧癇厥陰之病血氣腹痛經疏曰辛能散內外滯氣寒能除血熱氣壅明目之外余皆可略吳鶴皋曰古人每用虻蟲水蛭治血積以其善吮血耳若天鼠矢乃食蚊而化者也當亦可以攻血積本草稱其下死胎則其能攻血塊也何疑同鱉甲燒煙闢蚊蝙蝠矢也食蚊砂皆蚊眼故治目疾淘淨焙用惡白薇白蘞豬肉臟腑引經水畜鹹寒心血用作補心藥之嚮導蓋取以心歸心以血導血之意延壽丹書曰豬臨殺驚氣入心絶氣入肝皆不可多食尾血和龍腦冰片治痘瘡倒黶能發之時珍曰取其動而不息亦有用心血者肝主藏血補血藥用之入肝明目雄者良同夜明砂作丸治雀目雀目者夜不能睹濕痰及肝火盛也肺補肺治肺虛咳嗽咳血者蘸薏仁末食肚入胃健脾仲景治消渴有黃連豬肚丸用雄豬肚一枚入黃連末五兩栝蔞根白粱米各四兩知母三兩麥冬二兩縫定蒸熟丸如梧子大每服三十丸米飲下直指方治小兒疳熱黃連五兩入豬肝蒸爛飯丸米飲下仍服調血清心藥佐之且曰小兒之病非疳即熱常須識此腎鹹冷而通腎治腰痛耳聾日華曰補水臟暖腰膝又曰久食令人少子孟詵曰久食令人腎虛李時珍韙之謂其鹹冷能瀉腎氣也昂按枸杞玄參知母黃柏性皆寒而能補腎豬腎乃肉食何獨瀉腎若斯之酷也古今補腰腎藥用豬腎者頗多未見作害大抵諸家食忌不可盡信瑣碎録豬腎一對童便二分酒一分瓦罐煨五更食之治勞瘵一月愈經驗後方豬腎枸杞葉豉汁入蔥椒鹽作羹治陰痿羸瘦腸入大腸治腸風血痢奇效方治臟毒有臟連丸膽汁苦入心寒勝熱滑潤燥瀉肝膽之疳沐發光澤醋和灌穀道治大便不通仲景治陽明證內無熱者便雖祕勿攻故用膽汁外導之法不欲以苦寒傷胃腑也成無已曰仲景治厥逆無脈用白通湯加豬膽汁蓋陽氣大虛陰氣內勝純與陽藥恐陰氣格拒不得入故加豬膽汁苦入心而通脈寒補肝而和陰不致格拒也昂按此即熱因寒用之義浴初生小兒永無瘡疥豬脬亦作胞治遺溺疝氣用作引經豬脂甘寒涼血潤燥行水散風解毒千金方凡中惡及牛肉毒百獸肝毒服豬脂一斤佳殺蟲故瘡藥多用之利腸能通大便退諸黃滑産煎膏藥主諸瘡臘月者佳古方用之最多治咳嗽亦用之豬蹄煮湯通乳汁加通草二兩佳洗敗瘡懸蹄甲治寒熱痰喘痘瘡入目五痔腸癰古人有用左甲者有用後甲者豬肉反黃連烏梅桔梗犯之瀉痢時珍曰方有臟連丸黃連豬肚丸豈忌肉而不忌臟腑乎昂按別録云豬肉閉血脈弱筋骨虛人肌不可久食陶弘景曰豬為用最多唯肉不可食孫思邈曰久食令人少子發宿病筋骨碎痛之氣孟詵曰久食殺藥動風發疾韓𢘅曰凡肉皆補惟豬肉無補李時珍曰南豬味厚汁濃其毒尤甚若將為大禁者然然今人終日食肉內滋外腴子孫蕃衍未見為害若斯之甚也又云合黃豆蕎麥葵菜生薑胡荽吳茱牛肉羊肝龜鱉鯽魚雞子食之皆有忌然肴饌中合食者多未見絲毫作害也大抵肉能補肉其味雋永食之潤腸胃生精液豐肌體澤皮膚固其所也惟多食則助熱生痰動風作濕傷風寒及病初愈人為大忌耳先王教民畜牧養彘為先豈故為是以厲民歟明太祖釋家字之義亦曰無豕不成家諸家之說稽之於古則無徵試之於人則不驗徒令食忌不足取信於後世而已傷寒忌之者以其補肌固表油膩纏黏風邪不能解散也病初愈忌之者以腸胃久枯難受肥濃厚味也又按豬肉生痰惟風痰濕痰寒痰忌之如老人燥痰乾咳更須肥濃以滋潤之不可執泥於豬肉生痰之說也犬肉補虛寒酸而鹹溫暖脾益胃脾胃暖則腰腎受蔭矣補虛寒助陽事兩腎陰莖尤勝黃者補脾黑者補腎畏杏仁忌蒜道家以為地厭黃犬血酒服二碗治腸癰羊肉補虛勞甘熱屬火補虛勞益氣血壯陽道開胃健力通氣發瘡仲景治虛羸蓐勞有當歸羊血湯十劑曰補可去弱人參羊肉之屬是也東垣曰人參補氣羊肉補形凡味同羊肉者皆補血虛陽生則陰長也羊肝苦寒蘇頌曰溫色青補肝而明目肝以瀉為補羊肝丸治目疾加黃連膽苦寒點風淚眼赤障白翳臘月入蜜膽中紙套籠住懸檐下待霜出掃取點眼又入蜜膽中蒸之候乾研為膏每含少許或點之名二百味草花膏以羊食百草蜂採百花也時珍曰肝竅開於目膽汁減則目暗目者肝之外候膽之精華也故諸膽皆治目病脛骨入腎而補骨燒灰擦牙良時珍曰羊脛骨灰可以磨鏡羊頭骨可以消鐵誤吞銅錢者脛骨三錢米飲下羊血解金銀丹石砒硫一切諸毒乳甘溫補肺腎虛潤胃脘大腸之燥治反胃消渴口瘡舌腫含漱蜘蛛咬傷有渾身生絲者飲之瘥肉肝青羖羊良膽青羯羊良乳白羜羊良骨煅用反半夏菖蒲忌銅器牡羊曰羖曰羝去勢曰羯子曰羔羔五月曰羜牛肉補脾土甘溫屬土安中補脾益氣止渴倒倉法用牡黃牛肉二十斤洗淨煮為糜濾去渣熬成琥珀色前一晚不食至日空腹坐密室取汁每飲一鍾少時又飲積數十鍾身體覺痛如病在上則吐在下則利在中則吐而利利後必渴即飲已溺數碗以滌余垢飢倦先與米飲二日與淡粥次與厚粥軟飯將養一月沉疴悉安矣須斷房事半年牛肉五年丹溪曰牛坤土黃中色肉胃藥液無形之物也積聚既久回薄腸胃曲折之處豈銖兩丸散所能窺犯乎肉液充滿流行無處不到如洪水泛漲一切凝滯皆順流而去矣此方傳於西域異人中年後行一二次亦卻疾養壽之一助也王綸曰牛肉補中非吐下藥借補為瀉因瀉為補亦奇方也丹溪治林德方咳而咯血調肺壅非吐不可血耗非補不可惟倒倉二法兼備服之而愈又治蕭伯善便濁滑精亦用倒倉法而愈又治許文懿公病心痛用燥藥靈丹艾灸雜治數年不效自分為棄人丹溪先以防風通聖散下其積滯而病稍起思食然兩足難移次年行倒倉法節節應手復生子活十四年又臨海林兄久嗽吐紅發熱消瘦衆以為瘵百方不應丹溪脈之兩手弦數日輕夜重計無所出時冬月也以倒倉法而安仍次年生子牛乳味甘微寒潤腸胃解熱毒補虛勞治反胃噎膈胃槁胃冷脾不磨食故氣逆而成反胃氣血不足其本也曰痰飲曰食積其標也胃槁者滋血生津胃冷者溫中調氣東垣曰上焦吐者由乎氣治在和中而降氣中焦吐者由乎積治在行氣而消積下焦吐者由乎寒治在溫中而散寒丹溪曰反胃噎膈大便燥結宜牛羊乳時時咽之兼服四物湯為上策不可服人乳人乳有五味之毒七情之火也昂按噎膈不通服香燥藥取快一時破氣而燥血是速其死也不如少服藥飲牛乳加韭汁或薑汁或陳酒為佳江南臬司多患噤口痢粒米不進鄭奠一令服牛乳久之亦瘥白水牛喉治反胃吐食腸結不通除兩頭去脂膜醋浸炙末每服二錢陳米飲下酥酪醍醐皆牛羊乳所作滋潤滑澤宜於血熱枯燥之人牛膽納石灰於內懸掛風處百日治金瘡良牛黃瀉熱利痰涼驚甘涼牛有病在心肝膽之間凝結成黃故還以治心肝膽之病經疏云牛食百草其精華凝結成黃猶人之有內丹故能散火消痰解毒為世神物或云牛病乃生黃者非也清心解熱利痰涼驚通竅辟邪治中風入臟驚癇口噤心熱則火自生焰肝熱則木自生風風火相搏膠痰上壅遂致中風不語東垣曰中臟宜之若中腑及血脈者用之反能引風入骨如油入面按中風中臟者重多滯九竅中腑稍輕多著四肢若外無六經形證內無便溺阻隔為中經絡為又輕初宜順氣開痰次宜養血活血不宜專用風藥大抵五臟皆有風而犯肝者為多肝屬風木而主筋肝病不能營筋故有舌強口噤喎斜癱瘓不遂不仁等症若口開為心絶手散為脾絶眼合為肝絶遺尿為腎絶吐沫鼻衄為肺絶髮直頭搖面赤如妝汗綴如珠者皆不治若只見一二症猶有可治者小兒百病皆胎毒痰熱所生兒初生時未食乳用三五釐合黃連甘草末蜜調令咂之良發痘墮胎善通竅牛有黃必多吼喚以盆水承之伺其吐出迫喝即墮水名生黃如雞子黃大重疊可揭輕虛氣香者良觀此則非病乃生黃矣殺死角中得者名角黃心中者名心黃肝膽中者名肝膽黃成塊成粒總不及生者但磨指甲上黃透指甲者為真駱駝黃極易得能亂真得牡丹菖蒲良聰耳明目人參為使惡龍骨龍膽地黃常山白馬溺瀉殺蟲消症辛寒殺蟲破症積治反胃祖臺之志怪云昔有人與奴皆患心腹痛病奴死剖之得一鱉尚活以諸藥投口中不死有人乘白馬觀之馬溺墜鱉而鱉縮遂以灌之即化成水主乃服馬溺而愈驢溺瀉殺蟲辛寒殺蟲治反胃噎膈須熱飲之張文仲備急方曰昔患反胃奉敕調治竟不能療一衛士云服驢屎極驗遂服二合只吐一半再服二合食粥便定宮中患反胃者五六人同服之俱瘥阿膠平補而潤甘平清肺養肝滋腎益氣肺主氣腎納氣和血補陰肝主血血屬陰除風化痰潤燥定喘利大小腸治虛勞咳嗽肺痿吐膿吐血衄血血淋血痔腸風下痢傷暑伏熱成痢者必用之妊娠血痢尤宜腰痠骨痛血痛血枯經水不調崩帶胎動或妊娠下血酒煎服癰疽腫毒及一切風病瀉者忌用大抵補血與液為肺大腸要藥寇宗奭曰驢皮煎膠取其發散皮膚之外用烏者取其屬水以制熱則生風之義故又治風也陳自明曰補虛用牛皮膠去風用驢皮膠楊士瀛曰小兒驚風后瞳人不正者以阿膠倍人參服最良阿膠育神人參益氣也按阿井乃濟水伏流其性趨下用攪濁水則清故治瘀濁及逆上之痰也用黑驢皮阿井水煎成蘇頌曰本經阿膠亦用牛皮見二膠可通用牛皮膠製作不精故不堪用以黑光帶緑色夏月不軟者真銼炒成珠或麵炒蛤粉炒去痰蒲黃炒止血酒化水化童便和用得火良山藥為使畏大黃黃明膠即牛皮膠補虛甘平功與阿膠相近亦可代用同蔥白煮粥通大便李時珍曰真阿膠難得牛皮膠亦可權用其性味皆平補宜於虛熱之人張仲景治瀉痢阿膠與黃膠黃蠟並用陳藏器曰諸膠皆能療風補虛止泄驢皮主風為最經驗方云癰疽初起酒頓黃明膠四兩服盡毒不內攻唐氏方加穿山甲四片燒存性用昂謂此方若驗勝於服蠟礬丸也虎骨宣去風健骨味辛微熱虎屬金而制木故嘯則風生追風健骨定痛辟邪治風痹拘攣疼痛驚悸顛癇犬咬骨哽為末水服犬咬敷患處以頭骨脛骨良虎雖死猶立不僕其氣力皆在前脛時珍曰凡辟邪疰治驚癇瘟瘧頭風當用頭骨治手足風當用脛骨治腰脊風當用脊骨各從其類也虎肚治反胃取生者存滓穢勿洗新瓦固煅存性為末入平胃散一兩每服三錢效昂按虎肚丸宜於食膈若寒膈氣膈血膈痰膈恐難見功虎睛為散竹瀝下治小兒驚癇夜啼犀角瀉心胃大熱苦酸鹹寒涼心瀉肝清胃中大熱祛風利痰辟邪解毒治傷寒時疫發黃發斑傷寒下早熱乘虛入胃則發斑下遲熱留胃中亦發斑吐血下血蓄血譫狂痘瘡黑陷消癰化膿定驚明目妊婦忌之能消胎氣時珍曰五臟六腑皆稟氣於胃風邪熱毒必先干之飲食藥物必先入胃角犀之精華所聚足陽明胃藥也故能入陽明解一切毒療一切血及驚狂斑痘之證抱朴子云犀食百草之毒及棘故能解毒飲食有毒以角攪之則生白沫烏而光潤者勝角尖尤勝鹿取茸犀取尖其精氣盡在是也現成器物多被蒸煮不堪入藥入湯劑磨汁用人丸散銼細紙裹納懷中待熱搗之立碎歸田録云人氣粉犀升麻為使忌鹽羚羊角瀉心肝火苦鹹微寒羊屬火而羚羊屬木入足厥陰肝手太陰少陰肺心經目為肝竅此能清肝故明目去障肝主風其合在筋此能祛風舒筋故治驚癇搐搦骨痛筋攣肝藏魂心主神明此能瀉心肝邪熱故治狂越僻謬夢魘驚駭肝主血此能散血故治瘀滯惡血血痢腫毒相火寄於肝膽在志為怒經曰大怒則形氣絶而血菀於上此能下氣降火故治傷寒伏熱煩悶氣逆食噎不通羚之性靈而精在角故又辟邪而解諸毒昂按痘科多用以清肝火而本草不言治痘似羊而大角有節最堅徑能碎金剛石與貘骨貘音麥能食鐵夜宿防患以角掛樹而棲角有掛紋者真一邊有節而疏乃山驢山羊非羚也多兩角一角者勝銼研極細或磨用鹿茸大補陽虛甘溫一云咸熱純陽生精補髓養血助陽強筋健骨治腰腎虛冷百一方鹿角屑熬黃為末酒服主腰脊虛冷刺痛四肢痠痛頭眩眼黑崩帶遺精一切虛損勞傷惟脈沉細相火衰者宜之鹿角初生長二三寸分歧如鞍紅如瑪瑙破之如朽木者良太嫩者血氣未足無力酥塗微炙用不酥塗則傷茸或酒炙不可嗅之有蟲恐入鼻顙獵人得鹿縶之取茸然後斃鹿以血未散故也最難得不破未出血者沈存中筆談云凡含血之物血易長筋次之骨最難長故人二十歲骨髓方堅麋鹿角無兩月長至二十餘斤凡骨之長無速於此草木亦不及之頭為諸陽之會鍾於茸角豈與凡血比哉鹿陽獸喜居山麋陰獸喜居澤麋似鹿色青而大皆性淫一牡輒交十餘牝麋補陰鹿補陽故冬至麋角解夏至鹿角解也麋鹿茸角罕能分別雷斆曰鹿角勝麋角孟詵蘇恭蘇頌並云麋茸麋膠勝於鹿時珍曰鹿補右腎精氣麋補左腎血液鹿角鹹溫生用則散熱行血消腫醋磨塗腫毒為末酒服治折傷醫余曰有肷瘡赤腫而痛用黃連涼藥久不愈者卻當用溫藥如鹿角灰發灰乳香之類此陰陽寒暑往來之理也辟邪治夢與鬼交酒服一撮鬼精即出能逐陰中邪氣惡血煉霜熬膏則專於滋補時珍曰鹿仍仙獸純陽多壽能通督脈又食良草故其角肉食之有益無損鹿一名斑龍西蜀道士嘗貨斑龍丸歌曰尾閭不禁滄海竭九轉靈丹都漫說惟有斑龍頂上珠能補玉堂門下穴蓋用鹿茸與膠霜也造膠霜法取新角寸截河水浸七日刮淨桑火煮七日入醋少許取角搗成霜用其汁加無灰酒熬成膏用畏大黃鹿䘒鹿相交之精也設法取之大補虛勞麝香宣通竅辛溫香竄開經絡通諸竅透肌骨暖水臟治卒中諸風諸氣諸血諸痛痰厥驚癇嚴用和云中風不醒者以麝香清油灌之先通其關東垣曰風病在骨髓者宜之若在肌肉用之反引風入骨如油入面時珍曰嚴氏言風病必先用東垣謂必不可用皆非通論若經絡壅閉孔竅不利者安得不用為引導以開通之耶但不可過耳昂按據李氏之言似乃以嚴說為長廣利方中惡客忤垂死麝香一錢醋和灌之癥瘕瘴瘧鼻窒耳聾目翳陰冷辟邪解毒殺蟲墮胎壞果敗酒故治果積酒積東垣曰麝香入脾治肉牛黃入肝治筋冰片入腎治骨研用凡使麝香用當門子尤妙忌蒜不可近鼻防蟲入腦麝見人捕之則自剔出其香為生香尤難得其香聚處草木皆黃市人或攙荔枝核僞之熊膽瀉熱苦寒涼心平肝明目殺蟲治驚癇五痔塗之取瘥通明者佳性善闢塵撲塵水上投膽少許則豁然而開象皮外用斂金瘡象肉壅腫以刀刺之半日即合治金瘡不合者用其皮灰亦可以熬膏入散象膽亦能闢塵與熊膽同功獺肝補肝腎殺傳尸甘鹹而溫益陰補虛殺蟲止嗽治傳尸鬼疰有神功尸疰鬼疰乃五疰之一變動有三十三種乃至九十九種其症使人寒熱沉沉默默不知病之所苦而無處不惡死後傳入乃至滅門古方有獺肝丸獺肝烘乾炙為末水服二錢日三次以瘥為度諸肝皆有葉數惟獺肝一月一葉其間又有退葉須於獺身取下不爾多僞吳鶴皋曰獺陰物晝伏夜出故治鬼疰昂謂不然緣其肝獨異於他獸也蝟皮瀉涼血苦平治腸風瀉血五痔燒末油調敷水服亦佳陰腫脂滴耳中治聾膽點痘後風眼似鼠而圓大褐色攢毛外刺如栗房煅黑存性用兔矢一名明月砂宣明目殺蟲殺蟲明目治癆瘵五疳痘後生翳兔肝瀉肝熱故能明目兔肉治消渴海上方澄汁冷飲小兒食之稀痘瘡陶弘景曰孕婦食之令兒缺唇保壽堂兔血丸令小兒永不出痘雖出亦稀臘八日取生兔刺血和蕎麥麵加雄黃四五分和丸如緑豆大初生小兒乳汁送下二三丸遍身發出紅點此其驗也豭鼠矢宣調陰陽甘而微寒治傷寒勞復發熱男子陰易腹痛婦人傷寒初愈即與交接毒中男人名陰易若女人與傷寒男子交者名陽易活人有鼠矢湯兩頭尖者為雄鼠屎鼠膽明目汁滴耳中治二十年老聾陶弘景曰鼠膽隨死輒消不易得也鼠肉治兒疳鼠瘻河間曰鼠性善穿而治瘡瘻因其性為用也鱗介魚蟲部龍骨澀瀉固腸鎮驚甘澀微寒入手足少陰心腎手陽明大腸足厥陰肝經能收斂浮越之正氣澀腸益腎安魂鎮驚辟邪解毒治多夢紛紜驚癇瘧痢吐衄崩帶遺精脫肛利大小腸固精止汗定喘氣不歸元則喘斂瘡皆澀以止脫之義十劑曰澀可去脫牡蠣龍骨之屬是也白地錦紋舐之黏舌者良人或以古礦灰僞之酒浸一宿水飛三度用或酒煮酥炙火煅亦有生用者又云水飛曬乾黑豆蒸過用否則著人腸胃晚年作熱忌魚及鐵畏石膏川椒得人參牛黃良許洪云牛黃惡龍骨而龍骨得牛黃更良有以制伏也龍齒澀鎮驚澀涼鎮心安魂治大人痙癲狂熱小兒五驚十二癇衛生寶鑑曰龍齒安魂虎睛定魄龍屬木主肝肝藏魂虎屬金主肺肺藏魄也治同龍骨鯉魚通行水甘平下水氣利小便治咳逆上氣腳氣黃疸妊娠水腫古方治水腫有鯉魚湯鯉魚粥劉河間曰鯉之治水鴨之利水所謂因其氣相感也鯉魚骨燒灰療魚骨哽鯽魚補土和胃甘溫諸魚屬火獨鯽屬土土能制水故有和胃實腸行水之功作鱠食治腳氣及上氣忌麥冬芥菜沙糖豬肝石首魚補調胃甘平開胃消食治暴痢腹脹菽園雜記曰痢疾最忌油膩生冷惟白鯗相宜以其無脂不膩而能消宿食理腸胃也即乾白魚鯗首中有石故名石治石淋昂按今人多以石首魚鰾合破故紙等藥為丸名魚鰾丸云暖精種子而本草全未之及何也青魚膽瀉熱治目疾苦寒色青入肝膽治目疾點眼消赤腫障翳咽津吐喉痹痰涎塗火熱瘡療魚骨哽臘月收陰乾鱧魚膽瀉熱凡膽皆苦惟鱧魚膽甘昂按味終帶苦喉痹將死者點入即瘥病深者水調灌之俗名烏魚即七星魚首有七星夜朝北斗道家謂之水厭雁為天厭犬為地厭衛生歌云雁行有序犬有義黑魚拱北知臣禮人無禮義反食之天地鬼神皆不喜楊拱醫方摘要云除夕黃昏時取大黑鱧魚一尾小者二三尾煮湯浴兒遍身七竊俱到能免出痘不可嫌腥而以清水洗去也如不信留一手或一足不洗遇出痘時不洗處痘必多此乃異人所傳不可輕易食醫心鏡鱧魚一斤以上和冬瓜蔥白作羹治十種水氣鱔魚宣去風甘溫補五臟除風濕尾血療口眼喎斜少和麝香左喎塗右右喎塗左正即洗去千金云鱉血雞冠血和伏龍肝並治口喎滴耳治耳痛滴鼻治鼻衄點目治痘後生翳時珍曰鱔善穿穴與蛇同性故能走經絡療風邪及諸竅之病風中血脈用血主之從其類也鰻鱺補虛殺蟲甘平去風殺蟲按蟲由風生故風字從蟲治骨蒸勞瘵濕痹風瘙陰戶蝕癢皆有蟲張鼎云其骨燒煙蚊化為水熏竹木闢蛀蟲置衣箱闢諸蠹補虛損有病瘵者相染已死數人乃取病者釘之棺中棄於流水永絶傳染漁人異之開視見一女子尚活取置漁舍多食鰻鱺病愈遂以為妻聖惠方鰻鱺淡炙食治諸蟲心痛多吐冷氣上攻滿悶蚺蛇膽瀉熱明目護心蚺音髯稟己土之氣膽屬甲乙風木氣寒有小毒其味苦而帶甘涼血明目療疳殺蟲主厥陰太陰肝木脾土之病肉極腴美主治略同取膽粟許置水上旋行極速者真膽上旬近頭中旬近心下旬近尾能護心止痛受杖時噙之杖多不死白花蛇宣祛風濕甘鹹而溫蛇善行數蛻如風之善行數變花蛇又食石南食石南藤花葉石南辛苦治風故能內走臟腑外徹皮膚透骨搜風截驚定搐治風濕癱瘓大風疥癩開寶本草云治中風口眼喎斜半身不遂經疏云前症定緣陰虛血少內熱而發與得之風濕者殊料白花蛇非所宜也宜辨凡服蛇酒藥切忌見風出蘄州龍頭虎口黑質白花脅有二十四方勝紋腹有念珠斑尾有佛指甲雖死而眼光不枯他産則否頭尾有毒各去三寸亦有單用頭尾者酒浸三日去盡皮骨大蛇一條只得淨肉四兩烏梢蛇宣去風濕功用同白花蛇而性善無毒不吃物眼光至死不枯以尾細能穿百錢者佳重七錢至一兩者為上十兩至一鎰者中大者力減去頭與皮骨酒煮或酥炙用蛇蛻輕宣去風毒甘鹹無毒甄權有毒性靈而能辟惡故治鬼魅蠱毒性竄而善去風故治驚癇風瘧重舌聖惠方燒末敷喉風性毒而能殺蟲故治疥癬惡瘡疔腫痔漏屬皮而性善蛻故治皮膚瘡瘍産難目翳用白色如銀者皂莢水洗淨或酒或醋或蜜浸炙黃用或燒存性或鹽泥固煅各隨本方海狗腎一名膃肭臍補腎助陽甘鹹大熱補腎助陽治虛損勞傷陰痿精冷功近蓯蓉鎖陽出西番今東海亦有之似狗而魚尾置器中長年濕潤臘月浸水不凍置睡犬旁犬驚跳者為真或曰連臍取下故名臍或曰乃膃肭獸之臍也昂按兩名不類恐一是海魚之腎一是山獸之臍也綱目以此條入獸部穿山甲一名鮫鯉宣通經絡鹹寒善竄喜穿山專能行散通經絡達病所某處病用某處之甲更良入厥陰陽明肝胃治風濕冷痹通經下乳消腫潰癰止痛排膿和傷發痘元氣虛者慎用風瘧瘡科為要藥以其穴山寓水故能出入陰陽貫穿經絡達於營分以破邪結故用為使以其食蟻又治蟻瘻漏也音閭亦音漏有婦人項下忽腫一塊漸延至頸偶刺破出水一碗瘡久不合有道人曰此蟻漏也緣飯中偶食蟻得之用穿山甲燒存性為末敷之立愈劉伯溫多能鄙事云油籠滲漏刮甲里肉黶投入自至漏處補住永州記云不可於堤岸殺之恐血入土則岸堤滲漏觀此二說其性之善竄可知矣癰瘍已潰者忌服如鱉而短似鯉有足尾甲力更勝或生或燒酥炙醋炙童便油煎土炒隨方用海螵蛸一名烏賊骨宣通血脈咸走血溫和血入肝腎血分通血脈祛寒濕治血枯內經血枯治之以烏鰂骨血瘕血崩血閉腹痛環臍陰蝕腫痛燒末酒服瘧痢疳蟲目翳淚出聤耳出膿性能燥膿收水為末加麝少許摻入厥陰少陰肝腎經病出東海亦名墨魚腹中有墨書字逾年乃滅常吐黑水自罩其身人即於黑水處取之取魚骨滷浸炙黃用惡附子白芨白蘞能淡鹽龜板補陰益血甘平至陰屬金與水補心益腎滋陰資智性靈故資智通心益腎以滋陰治陰血不足勞熱骨蒸腰腳痠痛久瀉久痢能益大腸久嗽痎瘧老瘧也或經數年中有痞塊名瘧母癥瘕崩漏五痔産難為末酒服或加芎歸煅發陰虛血弱之症益陰清熱故治之時珍曰龜鹿皆靈而壽龜首常藏向腹能通任脈故取其甲以補精補腎補血以養陰也鹿首常還向尾能通督脈故取其角以補命補精補氣以養陽也昂按本草有鹿膠而不及龜膠然板不如膠誠良藥也合鹿膠一陰一陽名龜鹿二仙膏大者良上下甲皆可用酥炙或酒炙豬脂炙煅灰用洗淨槌碎水浸三日用桑柴熬膏良自死敗龜尤良得陰氣更全也惡人參龜尿走竅透骨染鬚髮治啞聾以鏡照之龜見其影則淫發而尿出或以豬鬃松毛刺其鼻尿亦出鱉甲補陰退熱鹹平屬陰色青入肝治勞瘦骨蒸往來寒熱溫瘧瘧母瘧必暑邪類多陰虛之人瘧久不愈元氣虛羸邪陷中焦則結為瘧母鱉甲能益陰除熱而散結故為治瘧要藥腰痛脅堅血瘕痔核咸能軟堅經阻産難腸癰瘡腫驚癇斑痘厥陰血分之病時珍曰介蟲陰類故皆補陰或曰木物屬金與土故入脾肺而治諸症色緑九肋重七兩者為上醋炙若治勞童便炙亦可熬膏鱉肉涼血補陰亦治瘧痢煮作羹食加生薑沙糖不用鹽醬名鱉糖湯惡礬石忌莧菜雞子鱉色青故走肝益腎而退熱龜色黑故通心入腎而滋陰陰性雖同所用略別鱉膽味辣可代椒解腥蟹瀉散血鹹寒除熱解結散血通經續筋骨筋絶傷者取蟹黃足髓熬納瘡中筋即續生骨節脫離者生搗熱酒調服渣塗半日骨內谷谷有聲即好塗漆瘡能敗漆然寒胃動風蟹爪墮胎産難及子死腹中者服蟹爪湯即出其螯燒煙能集鼠於庭中蟹毒者搗藕節熱酒調服醃蟹中入蒜則不沙蝦補陽甘溫托痘瘡下浮汁吐風痰中風症以蝦半斤入薑蔥醬料水煮先吃蝦次吃汁以鵝翎探引吐出痰涎隨證用藥壯陽道牡蠣澀腸補水軟堅咸以軟堅化痰消瘰癧結核老血瘕疝澀以收脫治遺精崩帶止嗽斂汗或同麻黃根糯米為粉撲身或加入煎劑固大小腸微寒以清熱補水治虛勞煩熱溫瘧赤痢利濕止渴為肝腎血分之藥王好古曰以柴胡引之去脅下硬茶引之消頸核大黃引之消股間腫以地黃為使益精收澀止大小便利以貝母為使消積結鹽水煮一伏時煅粉用亦有生用者貝母為使惡麻黃辛夷吳茱萸得甘草牛膝遠志蛇床子良海氣化成純雄無雌故名牡蛤粉澀蛤蜊殼煅為粉與牡蠣同功海藏曰腎經血分藥宋徽宗寵妃病痰嗽面腫不寐李防禦治之三日不效當誅李技窮憂泣忽聞市人賣嗽藥一文一帖吃了今夜得睡色淡碧李市之恐藥猛悍先自試覺無害共並三帖為一以進妃服之是夕寢安嗽止面腫亦消帝大悅賜直萬金李不知其方懼得罪伺得市人重價求之乃蚌殼研粉少加青黛也以淡薺水加麻油數滴調服聖惠方白蜆殼研粉米飲調治咳嗽不止肉鹹冷止渴解酒牡蠣蛤蜊海蛤文蛤並出海中大抵海物鹹寒功用略同江湖蛤蚌無鹹水浸漬但能清熱利濕不能軟堅文蛤背有花紋兼能除煩渴利小便瓦楞子即蚶殼瀉消症散痰甘鹹消血塊散痰積煅紅醋淬三次為末醋膏丸治一切氣血症瘕田螺瀉熱味甘大寒利濕清熱止渴消渴醒酒利大小便能引熱下行熊彥誠病前後不通腹脹如鼓衆醫莫措遇一異人曰此易耳奉施一藥即脫靴入水探得一大螺曰事濟矣以鹽和殼搗碎帛系臍下一寸三分曾未安席砉然暴下歸訪異人無所見矣董守約以腳氣攻注或教捶數螺系兩股便覺冷氣趨下至足即而亦安治腳氣黃疸噤口毒痢用螺少加麝搗餅烘熱貼臍下引熱下行自然思食目熱赤痛入鹽花取汁點之搽痔瘡狐臭石決明瀉風熱明目鹹平除肺肝風熱青盲內障水飛點目外障亦治骨蒸勞熱通五淋能清肺肝故也古方多用治瘍疽解酒酸為末投熱酒中即解如蚌而扁唯一片無對七孔九孔者良鹽水煮一伏時或麵裹煨熟研粉極細水飛用惡旋覆花真珠瀉熱定驚甘鹹性寒感月而胎語云上巳有風梨有蠹中秋無月蚌無胎水精所孕水能制火入心肝二經鎮心安魂肝藏魂昂按雖云瀉熱亦借其寶氣也大抵寶物多能鎮心安魂如金箔琥珀真珠之類龍齒安魂亦假其神氣也墜痰拔毒收口生肌治驚熱痘療下死胎胞衣珠末一兩苦酒服塗面好顏色點目去翳膜綿裹塞耳治聾取新潔未經鑽綴者乳浸三日研粉極細用不細傷人臟腑陸佃曰蛤蚌無陰陽牝牡須雀化成故能生珠專一於陰陽也蛤蚧補肺潤腎定喘止嗽鹹平補肺潤腎益精助陽治渴通淋定喘止嗽肺痿咯血氣虛血竭者宜之能補肺益水源李時珍曰補肺止渴功同人參益氣扶羸功同羊肉經疏曰咳嗽由風寒外邪者不宜用出廣南首如蟾蜍背緑色斑點如綿紋雄為蛤鳴聲亦然因聲而名皮粗口大身小尾粗雌為蚧皮細口尖身大尾小雌雄相呼屢日乃交兩兩相抱捕者擘之雖死不開房術用之甚效不論牝牡者只可入雜藥口含少許奔走不喘者真藥力在尾見人捕之輒自齧斷其尾尾不全者不效凡使去頭足雷斆曰其毒在眼用須去眼洗去鱗內不淨及肉毛酥炙或蜜炙或酒浸焙用蜂蜜亦名石蜜岩蜜補中潤燥滑腸草木精英合露氣以釀成生性涼能清熱熟性溫能補中甘而和故解毒柔而滑故潤燥甘緩可以去急故止心腹肌肉瘡瘍諸痛甘緩可以和中故能調營衛通三焦除衆病和百藥故丸藥多用之而與甘草同功止嗽治痢解毒潤腸最治痢疾薑汁和服甚佳明目悅顏同薤白搗塗湯火傷煎煉成膠通大便祕乘熱納穀道中名蜜煎導然能滑腸泄瀉與中滿者忌用之以白如膏者良汪穎曰蜜以花為主閩廣蜜熱川蜜溫西蜜涼安宣州有黃連蜜味小苦點目熱良西京有梨花蜜色白如脂用銀石器每蜜一斤入水四兩桑火慢熬掠出浮沫至滴水成珠用忌蔥鮮萵苣同食昂按生蔥同蜜食殺人而萵苣蜜漬點茶者頗多未見作害豈醃過則無患乎抑藥忌亦有不盡然者乎黃蠟甘溫止痛生肌療下痢蜜質柔性潤故滑腸胃蠟質堅性澀故止瀉痢續絶傷按蜜蠟皆蜂所釀成而蜜味至甘蠟味至淡故今人言無味者謂之嚼蠟露蜂房宣解毒殺蟲甘平有毒治驚癇瘛瘲附骨癰疽根在臟腑和蛇蛻亂髮燒灰酒服按附骨疽不破附骨成膿故名不知者誤作賊風治附骨疽痛處發熱四體乍熱乍寒小便赤大便祕而無汗瀉熱發散則消賊風痛處不熱亦不發寒熱覺身冷欲得熱尉則小寬時有汗宜風藥治之塗瘰癧成瘻音漏炙研豬脂和塗止風蟲牙痛煎水含嗽時珍曰陽明藥也取其以毒攻毒兼殺蟲之功耳敷小兒重舌燒灰酒和敷舌下日數次起陰痿燒灰敷陰上取懸於樹受風露者炙用治癰腫醋調塗洗瘡煎用殭蠶輕宣去風化痰辛鹹微溫僵而不腐得清化之氣故能治風化痰散結行經蠶病風作僵故因以治風能散相火逆結之痰其氣味俱薄輕浮而升入肺肝胃三經治中風失音頭風齒痛喉痹咽腫炒為末薑湯調下一錢當吐出頑痰丹毒瘙癢皆風熱為病瘰癧結核痰瘧血病崩中帶下風熱乘肝小兒驚疳膚如鱗甲由氣血不足亦名胎垢煎湯浴之下乳汁滅瘢痕苦諸症由於血虛而無風寒客邪者勿用以頭蠶色白條直者良糯米泔浸一日待桑涎浮出漉起焙乾拭淨肉毛口甲搗用惡桑螵蛸茯苓茯神桔梗萆薢蠶繭甘溫能瀉膀胱相火引清氣上朝於口止消渴蠶與馬並屬午為離主心作繭退藏之際故繅絲湯飲之能抑心火而治消渴癰疽無頭者燒灰酒服服一枚出一頭二枚出二頭雄蠶蛾氣熱性淫主固精強陽交接不倦蠶退紙燒存性入麝少許蜜和敷走馬牙疳加白礬尤妙百一方蠶紙燒灰酒水任下能治邪祟發狂悲泣原蠶砂燥濕去風蠶食而不飲屬火性燥燥能去風勝濕經曰燥勝風燥屬金風屬木也其沙辛甘而溫炒黃浸酒治風濕為病支節不隨皮膚頑痹腰腳冷痛冷血瘀血史國公藥酒中用之炒熱尉患處亦良寇宗奭曰醇酒三升拌蠶沙五升蒸熱鋪暖室席上令患冷風氣痹人以患處就臥厚復取汗不愈間日再作須防昏悶麻油調敷治爛弦風眼目上下胞屬脾脾有風濕則蟲生弦爛又新瓦炙為末少加雄黃麻油調敷治蛇串瘡有人食烏梢蛇渾身變黑漸生鱗甲見者驚縮鄭奠一令日服晚蠶沙五錢盡一二斗久之乃退晚蠶矢也淘淨曬乾桑螵蛸補腎甘鹹入肝腎命門益精氣而固腎治虛損陰痿夢遺白濁血崩腰痛傷中疝瘕肝腎不足通五淋縮小便能通故能縮腎與膀胱相表裡腎得所養氣化則能出故能通腎氣既固則水道安常故又能止也寇宗奭治便數有桑螵蛸散桑螵蛸茯神遠志菖蒲人參當歸龍骨鱉甲醋炙各一兩為末臥時人參湯下二錢能補心安神亦治健忘炙飼小兒止夜尿螳螂卵也桑樹産者為好房長寸許有子如蛆芒種後齊出故仲夏螳螂生也如用他樹者以桑皮佐之桑皮善行水能引達腎經炙黃或醋煮湯泡煨用畏旋覆花螳螂能出箭鏃螳螂一個巴豆半個研敷傷處微癢且忍極癢乃撼拔之以黃連貫衆湯洗石灰敷之楊氏方用蜣螂鏃出後敷生肌散螳螂蜣螂皆治驚風今人罕用蜣螂兼治腹痛便祕下痢脫肛瘡疽蟲痔蟬蛻輕散風熱蟬乃土木餘氣所化飲風露而不食其氣清虛而味甘寒故除風熱其體輕浮故發痘疹其性善蛻故退目翳催生下胞其蛻為殼故治皮膚瘡瘍癮疹與薄荷等分為末酒調服其聲清響故治中風失音又晝鳴夜息故止小兒夜啼蟬類甚多惟大而色黑者入藥洗去泥土翅足漿水煮曬乾用攻毒生用蚱蟬治小兒驚癇夜啼殺疳去熱出胎下胞時珍曰治皮膚瘡瘍風熱當用蟬蛻治臟腑經絡當用蟬身各從其類也五倍子澀斂肺鹹酸其性澀能斂肺其氣寒能降火生津化痰止嗽止血斂汗鄭贊寰曰焙研極細以自己漱口水調敷臍上治盜汗如神解酒療消渴泄痢瘡癬五痔下血脫肛膿水濕爛子腸墜下散熱毒消目腫煎水洗之斂瘡口熱散瘡口自斂其色黑能染須丹溪曰倍子屬金與水噙之善收頑痰解熱毒黃昏咳嗽乃火浮肺中不宜用涼藥宜五倍五味斂而降之醫學綱目云王元圭虛而滑精屢與加味四物湯吞河間祕真丸及珍珠粉丸不止後用五倍子一兩茯苓二兩丸服遂愈此則倍子斂澀之功敏於龍骨蛤粉也昂按凡用祕澀藥能通而後能祕此方用茯苓倍於五倍一瀉一收是以能盡其妙也嗽由外感瀉非虛脫者禁用生鹽膚木上乃小蟲食汁遺種結球於葉間故主治之證與鹽膚子葉同功五倍子殼輕脆而中虛可以染皂或生或炒用白蠟外用生肌甘溫屬金生肌止血鄭贊寰曰汪御章年十六常患尿血屢醫不效豫以白蠟加入沖血滋腎藥中遂愈定痛補虛續筋接骨外科要藥斑蝥大瀉以毒攻毒辛寒有毒外用蝕死肌敷疥癬惡瘡內用破石淋拔瘰癧疔腫楊登甫云瘰癧之毒莫不有根大抵治以斑蝥地膽為主制度如法能令其根從小便出如粉片血塊爛肉此其驗也以木通滑石燈心輩導之斑蝥捕得屁射出臭不可聞故奔走下竅直至精溺之處能下敗物痛不可當用須斟酌下狾犬毒九死一生之候急用斑蝥七枚去頭翅足糯米炒黃為末酒煎空心下取下小狗三四十枚如數少再服又方糯米一勺斑蝥二十一枚分三次炒至青煙為度去蝥取米為粉冷水入清油少許空心下取利下毒物如不利再進愈後忌聞鐘鼓聲復發則不可治服之肚痛急者用靛汁或黃連水解之潰肉肌肉近之則爛墮胎豆葉上蟲黃黑斑文去頭足糯米炒熟生用則吐瀉人亦有用米取氣不取質者畏巴豆丹參惡甘草豆花斑蝥芫青葛上亭長地膽四蟲形色不同功略相近食芫花為芫青青緑色尤毒春生食葛花為亭長黑身赤頭夏生食豆花為斑蝥斑色秋生冬入地為地膽黑頭赤尾陶隱居曰乃一物而四時變化者蘇恭曰非也皆極毒須慎用蠍宣去風辛甘有毒色青屬木故治諸風眩掉皆屬肝木驚癇搐掣口眼喎斜白附殭蠶全蠍等分為末名牽正散酒服二錢甚效瘧疾風瘡耳聾帶疝厥陰風木之病東垣曰凡疝氣帶下皆屬於風蠍乃治風要藥俱宜加而用之汪機曰破傷風宜以全蠍防風為主類中風慢脾驚屬虛者忌用全用去足焙或用尾尾力尤緊形緊小者良人被螫者塗蝸牛即解蜈蚣宣去風辛溫有毒入厥陰肝經善走能散治臍風撮口炙末豬乳調服驚癇瘰癧蛇症能制蛇瘡甲趾甲內惡肉突出俗名雞眼睛蜈蚣焙研敷之以南星末醋調敷四圍殺蟲古方治嗽多生用之墮胎取赤足黑頭者火炙去頭足尾甲將荷葉火煨用或酒炙畏蜘蛛蜒蚰不敢過所行之路觸著即死雞屎桑皮鹽中其毒者以桑汁鹽蒜塗之被咬者捕蜘蛛置咬處自吸其毒蜘蛛死放水中吐而活之蟾蜍即癩蝦蟆瀉療疳拔毒蟾土精而應月魄辛涼微毒入陽明胃發汗退熱除濕殺蟲治瘡疽發背未成者用活蟾蜍系瘡上半日蟾必昏憒置水中救其命再易一個三易則毒散矣勢重者剖蟾蜍合瘡上不久必臭不可聞如此二三易其腫自愈小兒勞瘦疳疾蟾酥辛溫大毒助陽氣治疔腫發背小兒疳疾腦疳即蟾蜍眉間白汁能爛人肌肉惟疔疳或合他藥服一二釐取其以毒攻毒腦疳乳和滴鼻中外科多用之蟾蜍肪塗玉刻之如蠟肪音方脂也白頸蚯蚓瀉熱利水蚓土德而星應軫水味性鹹寒故能清熱下行故能利水治溫病大熱狂言大腹黃疸腎風腳氣蘇頌曰腳氣必須用之為使白頸者乃老蚯蚓治大熱搗汁井水調下入藥或曬乾為末或鹽化為水或微炙或燒灰各隨本方中其毒者鹽水解之張將軍病蚯蚓咬毒每夕蚓鳴於體濃煎鹽水浸身數過而愈蚯蚓泥即蚯蚓屎甘寒瀉熱解毒治赤白久痢敷小兒陰囊熱腫腫腮丹毒五穀蟲即糞蛆瀉熱療疳寒治熱病譫音占妄語妄毒痢作吐小兒疳積疳瘡漂淨曬乾或炒或煅為末用人部發一名血餘補和血發者血之餘味苦微寒入足少陰厥陰腎肝補陰消瘀通關格利二便治諸血疾能去心竅之血故亦治驚癇血痢血淋舌血煅末茅根湯服鼻血燒灰吹鼻轉胞不通燒灰服小兒驚熱合雞子黃煎為汁服雞子能去風痰合諸藥煎膏涼血去瘀長肉發屬心稟火氣而上生眉屬肝稟木氣而側生須屬腎稟水氣而下生或曰發屬肝稟木氣而直生眉屬金稟金氣而橫生金無餘氣故短而不長至老金氣鈍則眉長矣昂按肺主皮毛毛亦短而不長者也何以獨無所屬乎毛既為肺之合自當屬肺屬金眉當屬肝屬木以其側生象木枝也此乃臆說附質明者經曰腎者精之處也其華在發王冰注曰腎主髓腦者髓之海發者腦之華腦髓減則發素時珍曰發入土千年不朽以火煅之凝為血質煎煉至枯復有液出誤吞入腹化為症蟲煅煉服食使發不白故本經有自還神化之稱陳藏器曰生人發掛果樹上則烏鳥不敢來又人逃走取其發於緯車上縛之則迷亂不知所適此皆神化子母祕録亂髮燒灰亦治尸疰豬脂調塗小兒燕口即兩角生瘡也宋丞相王郇公小腹切痛備治不效用附子硫黃五夜叉丸之類亦不瘥張駙馬取婦人油頭髮燒灰研篩酒服二錢其痛立止內經腦為髓海沖為血海命門為精海丹田為氣海胃為水穀之海皂莢水洗淨黶罐固煅存性用胎髮尤良補衰涸頭垢治淋及噎膈勞復人牙宣發痘鹹溫有毒治痘瘡倒黶痘疹論出不快而黑陷者豶豬血調下一錢服涼藥而血澀倒陷者麝香酒調服時珍曰欲其竄入腎經發出毒氣蓋劫劑也若伏毒在心不省人事氣虛色白癢塌無膿及熱痱紫泡之證只宜補虛解毒苟誤服此則鬱悶聲啞反成不救煅退火毒研用人乳補虛潤燥甘鹹潤五臟補血液止消渴澤皮膚治風火證昂按老人便祕人乳最良本血所化目得血而能視用點赤澀多淚熱者黃連浸點然性寒滑臟寒胃弱人不宜多服時珍曰人乳無定性其人和平飲食沖淡其乳必平其人躁暴飲酒食辛或有火病其乳必熱又有孕之乳為忌乳最有毒小兒食之吐瀉成疳魃之病內亦損胎昂按乳乃陰血所化生於脾胃攝於衝任未受孕則下為月水既受孕則留而養胎已産則變赤為白上為乳汁以食小兒乃造化之玄微也服之益氣血補腦髓乃謂以人養人也然能滑腸濕脾膩膈天設之以為小兒非壯者所當常服唯製為粉則有益無損又須旋用久則油膻須用一婦人之乳為佳乳雜則其氣雜乳粉參末等分蜜丸名參乳丸大補氣血取年少無病婦人乳白而稠者如兒食良黃赤清色氣腥穢者並不堪用或曝曬用茯苓粉收或水頓取粉尤良取粉法小鍋燒水滾用銀瓢如碗大錫瓢亦可傾乳少許入瓢浮滾水上頓再浮冷水上立干刮取粉用再頓再刮如攤粉皮法紫河車即胞衣一名混沌皮大補氣血甘鹹性溫本人之血氣所生故能大補氣血治一切虛勞損極虛損一損肺皮槁毛落二損心血脈衰少三損脾肌肉消脫四損肝筋緩不收五損腎骨痿不起六極曰氣極血極筋極肌極骨極精極恍惚失志癲癇以初胎及無病婦人者良有胎毒者害人以銀器插入焙煮不黑則無毒長流水洗極淨酒蒸焙乾研末或煮爛搗碎入藥如新瓦炙者反損其精汁亦可調和煮食李時珍曰崔行功小兒方云胞衣宜藏天德月德吉方深埋緊築若為豬狗食令兒癲狂螻蟻食令兒瘡癬鳥雀食令兒惡死棄火中令兒瘡爛近社廟井灶街巷皆有所忌此亦銅山西崩洛鐘東應自然之理今人以之炮炙入藥雖曰以人補人然食其同類獨不犯崔氏之戒乎以故本集如天靈蓋等概不入録童便一名還元水飲自己溺名輪回酒平瀉火補陰散瘀血鹹寒時珍曰溫能引肺火下行從膀胱出乃其舊路降火滋陰甚速潤肺散瘀咸走血治肺痿失音吐衄損傷凡跌打損傷血悶欲死者擘開口以熱尿灌之下咽即醒一切金瘡受杖並宜用之不傷臟腑若用他藥恐無瘀者反致誤人矣胞胎不下皆散瘀之功凡産後血暈敗血入肺陰虛久嗽火蒸如燎者惟此可以治之晉褚澄勞極論曰降火甚速降血甚神飲溲溺百無一死服寒涼藥百無一生取十二歲以下童子少知識無相火不食葷腥酸咸者佳去頭尾取中間一節清沏如水者用當熱飲熱則真氣尚存其行自速冷則惟有鹹寒之性入薑汁行痰韭汁散痰更好冬月用湯溫之李士材曰煉成秋石真元之氣漸失不及童便多矣普濟方治目赤腫痛用自己小便乘熱抹洗即閉目少頃此以真氣退其邪熱也秋石補腎水潤三焦鹹溫滋腎水潤三焦養丹田安五臟退骨蒸軟堅塊治虛勞咳嗽白濁遺精為滋陰降火之聖藥若煎煉失道多服誤服反生燥喝之患咸能走血且經煅煉中寓暖氣使虛陽妄作則真水愈虧蒙筌曰每月取童便每缸用石膏七錢桑條攪澄傾去清液如此二三次乃入秋露水攪澄故名秋石如此數次滓穢淨鹹味減以重紙鋪灰上曬乾刮去在下重濁取輕清者為秋石世醫不取秋時雜收人溺以皂莢水澄曬為陰煉火煅為陽煉盡失於道安能應病況經火煉性卻變溫耶秋石再研入罐鐵盞蓋定鹽泥固濟升打升起盞上者名秋冰味淡而香乃秋石之精英也保壽堂方用童男童女小便各煉成秋石其色如雪和勻加乳汁日曬夜露取日精月華干即加乳待四十九日足收貯配藥摘玄曰腫脹忌鹽只以秋石拌飲食佳人中黃瀉熱甘寒入胃清痰火消食積大解五臟實熱治天行熱狂痘瘡血熱黑陷不起納甘草末於竹筒中緊塞其孔冬月浸糞缸中至春取出洗懸風處陰乾取甘草用亦有用皂莢末者竹須削去青皮一云即糞缸多年黃垽煅存性用糞清一名金汁瀉火熱主治同人中黃用棕皮棉紙上鋪黃土淋糞濾汁入新甕碗復埋土中一年清若泉水全無穢氣用年久者彌佳野間殘糞下土篩敷癰疽如冰著背人中白瀉火鹹平降火散瘀治肺瘀鼻衄刮人中白新瓦火上逼干調服即止勞熱消渴痘瘡倒陷牙疳口瘡即溺垽煅研用以蒙館童子便桶山中老僧溺器刮下者尤佳
