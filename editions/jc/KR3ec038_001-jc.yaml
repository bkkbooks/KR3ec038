body:
  text: 本草備要凡例一注本草者當先注病證不然病之未明藥於何有從前作者罕明斯義第云某藥入某經治某病而已淺術視之蓋茫如也唯李氏綱目裒集諸家附著論說間及病源經疏因之釋藥而兼釋病補前人之未備作後學之指南茲集祖述二書更加增訂藥性病情互相闡發以便資用若每處皆釋則重複煩瑣反生厭瀆故前後間見或因藥論辨讀者匯觀而統會之可也一藥品主治諸家析言者少統言者多如治痰之藥有治燥痰者有治濕痰者諸書第以除痰概之頭痛之藥有治內傷頭痛者有治外感頭痛者諸書唯言治頭痛而已此皆相反之證未可混施舉此二端其餘可以類推矣又每藥之下止言某病宜用而不言某病忌用均屬闕略茲集並加詳註庶無貽誤一每藥先辨其氣味形色次著其所入經絡乃為發明其功用之中不能逐款細注讀者諒之一徐之才曰藥有宣上升下行曰宣通補瀉澀滑燥濕濕即潤也輕重十種是藥之大體而本經不言後人未述凡用藥者審而詳之則靡所遺失矣今為分闡以冠於諸藥之首此十劑也陶宏景加寒熱二劑茲不俱述然本集燥劑即陶氏之熱劑通劑乃徐氏之燥劑而寒劑則多寓於瀉劑也一藥品主治已註明入某臟某腑者則不更言入某經絡以重複無用也一藥品稍近遐僻者必詳其地道形色如習知習見之藥則不加詳註一陰陽升降浮沉已詳於藥性總義中故每品之下不加重注一主治要義及諸家名論用病症用藥名湯頭用頂上十劑用一藥內間附古方便人施用如方藥俱全者則於方名加如有方無藥者則方名不用一藥目次第每藥稍從其類以便查閱一先哲名言有言以人重者有人以言重者須當仍其名氏庶乎後學知所稟承或是或非有可裁斷矣奈何醫集之中率掠古人之言混入已作使讀者蒼黃莫辨涇渭難分習俗移人賢者不免甚有合數人之言砌掇成篇首尾欠貫詞意多乖以故醫學每鮮佳編良深慨息本集採用諸家悉存原名使可考據間有刪節數句者以限於尺幅也有增改數句數字者務暢其文義也亦有錄其言而未悉其名氏者以藏書既寡目力不充難於盡考也或時附入鄙見必加昂按二字以聽時賢之論定其間旁搜遠討義圖貫通取要刪繁詞歸雅飭庶幾豁觀者之心目云耳一是書篇章雖約多有補綱目經疏之所未備者故曰備也一藥有氣味形色經絡主治功用禁忌數端藥性歌賦雖便記誦然限於字句又須用韻是以不能詳括茲集文無一定藥小者語簡藥大者詞繁然皆各為杼軸煅煉成章使人可以誦讀一本草一書讀之率欲睡欲臥以每藥之下所注者不過臟腑經絡甘酸苦澀寒熱溫平升降浮沉病候主治而已未嘗闡發其理使讀之者有義味可咀嚼也即如證類諸本採集頗廣又以眾說繁蕪觀者罔所折衷也是編主治之理務令詳明取用之宜期於確切言暢意晰字少義多作者頗費匠心讀者幸毋忽視一是書之作不專為醫林而設蓋以疾疢人所時有脫或處僻小之區遇庸劣之手脈候欠審用藥乖方而無簡便方書與之較證鮮有不受其誤者是以特著此編兼輯醫方集解一書相輔而行篇章雖約詞旨詳明攜帶不難簡閱甚便倘能人置一本附之篋笥以備緩急亦衛生之一助有識之士當不以愚言為狂謬也一昂自壯立之年便棄制舉蹉跎世變念著書作詩無當人意只堪覆瓿難以垂遠然禽鹿視息無所表見竊用疚心故疲精瘁神著輯方書數種以為有當於民生日用之實且集諸家大成貫穿箋釋或可有功前賢嘉惠來世易世之後倘有嗜吾書而為重梓者庶能傳之久遠此區區立言之意也一是書之作因閱過伯齡圍棋四子譜而師其意章圍棋之譜自唐宋至今千有餘載然必如伯齡之譜有議論有變換而後圍棋之妙顯本草自本經而下不啻數百千家然率言其氣味主治而無義味可尋必須為之字箋句釋明體辨用而後藥性之功全蓋士生千載之後貴能取前人之言寸衡銖稱抉髓掄精庶幾有集成之益無缺略之譏也故拙著內經本草方解湯頭數書皆另為體裁別開徑路以發前賢未竟之旨啟後人便易之門竊謂於醫學頗有闡微廓清之力讀者倘能鑑別斯不虛老人之苦心焉耳藥性總義凡藥酸屬木入肝苦屬火入心甘屬土入脾辛屬金入肺咸屬水入腎此五味之義也凡藥青屬木入肝赤屬火入心黃屬土入脾白屬金入肺黑屬水入腎此五色之義也凡藥酸者能澀能收苦者能瀉能燥能堅甘者能補能和能緩辛者能散能潤能橫行咸者能下能軟堅淡者能利竅能滲泄此五味之用也凡藥寒熱溫涼氣也酸苦甘辛咸味也氣為陽味為陰氣厚者陽中之陽薄者陽中之陰味厚者陰中之陰薄者陰中之陽氣薄則發泄發散厚則發熱溫燥味厚則泄降瀉薄則通利竅滲濕辛甘發散為陽酸苦湧泄為陰鹹味湧泄為陰淡味滲泄為陽輕清升浮為陽重濁沉降為陰陽氣出上竅陰味出下竅清陽發腠理濁陰走五臟清陽實四肢濁陰歸六腑此陰陽之義也凡藥輕虛者浮而升重實者沉而降味薄者升而生象春氣薄者降而收象秋氣厚者浮而長象夏味厚者沉而藏象冬味平者化而成象土氣厚味薄者浮而升味厚氣薄者沉而降氣味俱厚者能浮能沉氣味俱薄者可升可降酸鹹無升辛甘無降寒無浮熱無沉此升降浮沉之義也李時珍曰升者引之以鹹寒則沉而直達下焦沉者引之以酒則浮而上至巔頂一物之中有根升梢降生升熟降者是升降在物亦在人也凡藥根之在土中者半身以上則上升半身以下則下降以生苗者為根以入土者為梢上焦用根下焦用梢半身以上用頭中焦用身半身以下用梢雖一藥而根梢各別用之或差服亦罔效藥之為枝者達四肢為皮者達皮膚為心為乾者內行臟腑質之輕者上入心肺重者下入肝腎中空者發表內實者攻裡枯燥者入氣分潤澤者入血分此上下內外各以其類相從也凡藥色青味酸氣臊性屬木者皆入足厥陰肝足少陽膽經肝與膽相表裡膽為甲木肝為乙木色赤味苦氣焦性屬火者皆入手少陰心手太陽小腸經心與小腸相表裡小腸為丙火心為丁火色黃味甘氣香性屬土者皆入足太陰脾足陽明胃經脾與胃相表裡胃為戊土脾為己土色白味辛氣腥性屬金者皆入手太陰肺手陽明大腸經肺與大腸相表裡大腸為庚金肺為辛金色黑味鹹氣腐性屬水者皆入足少陰腎足太陽膀胱經腎與膀胱相表裡膀胱為壬水腎為癸水凡一臟配一腑腑皆屬陽故為甲丙戊庚壬臟皆屬陰故為乙丁己辛癸也十二經中惟手厥陰心包手少陽三焦經無所主其經通於足厥陰少陽厥陰主血諸藥入肝經血分者併入心包少陽主氣諸藥入膽經氣分者併入三焦命門相火散行於膽三焦心包絡故入命門者併入三焦此諸藥入諸經之部分也藥有相須者同類而不可離也如黃柏知母破故紙胡桃之類相使者我之佐使也相惡者奪我之能也相畏者受彼之制也相反者兩不可合也相殺者制彼之毒也此異同之義也肝苦急血燥苦急急食甘以緩之肝欲散木喜條達急食辛以散之以辛補之以酸瀉之以散為補以斂為瀉心苦緩緩則散逸急食酸以收之心欲軟急食鹹以軟之以咸補之按水能剋火然心以下交於腎為補取既濟之義也以甘瀉之脾苦濕急食苦以燥之脾欲緩舒和急食甘以緩之以甘補之以苦瀉之肺苦氣上逆火旺剋金急食苦以瀉之肺欲收急食酸以收之以酸補之以辛泄之腎苦燥急食辛以潤之腎欲堅堅固則無狂蕩之患急食苦以堅之以苦補之以咸瀉之此五臟補瀉之義也風淫於內治以辛涼佐以苦甘以甘緩之以辛散之風屬木辛為金金能勝木故治以辛涼過辛恐傷真氣故佐以苦甘苦勝辛甘益氣也木性急故以甘緩之木喜條達故以辛散之熱淫於內治以鹹寒佐以苦甘以酸收之以苦發之水勝火故治以鹹寒甘勝咸佐之所以防其過必甘苦者防咸之過而又以瀉熱氣佐實也熱淫故以酸收之熱結故以苦發之濕淫於內治以苦熱佐以酸淡以苦燥之以淡泄之濕為土氣苦熱皆能燥濕淡能利竅滲濕用酸者木能制土也火淫於內治以鹹冷佐以苦辛以酸收之以苦發之相火畏火也故治以鹹冷辛能滋潤酸能收斂苦能泄熱或從其性而升發之也燥淫於內治以苦溫佐以甘辛以苦下之燥屬金苦屬火火能勝金故治以苦溫甘能緩辛能潤苦能下故以為佐也寒淫於內治以甘熱佐以苦辛以咸瀉之以辛潤之以苦堅之土能制水熱能勝寒故治以甘熱苦而辛亦熱品也傷寒內熱者以咸瀉之內燥者以辛潤之苦能瀉熱而堅腎瀉中有補也此六淫主治各有所宜故藥性宜明而施用貴審也人之五臟應五行金木水火土子母相生經曰虛則補其母實則瀉其子又曰子能令母實如腎為肝母心為肝子故入肝者併入腎與心肝為心母脾為心子故入心者併入肝與脾心為脾母肺為脾子故入脾者併入心與肺脾為肺母腎為肺子故入肺者併入脾與腎肺為腎母肝為腎子故入腎者併入肺與肝此五行相生子母相應之義也酸傷筋斂則筋縮辛勝酸苦傷氣苦能瀉氣咸勝苦甘傷肉酸勝甘辛傷皮毛疏散腠理苦勝辛咸傷血咸能滲泄甘勝咸此五行相剋之義也酸走筋筋病毋多食酸筋得酸則拘攣收引益甚也苦走骨骨病毋多食苦骨得苦則陰益甚重而難舉也甘走肉肉病毋多食甘肉得甘則壅氣臚腫益甚也辛走氣氣病毋多食辛氣得辛則散而益虛也咸走血血病毋多食鹹血得咸則凝澀而口渴也咸能滲泄津液此五病之所禁也多食鹹則脈凝泣澀同而變色脈即血也心合脈水剋水多食苦則皮槁而毛拔肺合皮毛火剋金多食辛則筋急而爪枯肝合筋爪者筋之餘為金剋木按肝喜散故辛能補肝惟多則為害多食酸則肉胝䐢而唇揭脾合肉其華在唇水剋土胝音支皮厚也多食甘則骨痛而發落腎合骨其華在發土剋水此五味之所傷也藥之為物各有形性氣質其入諸經有因形相類者如連翹似心而入心荔枝核似睪丸而入腎之類有因性相從者如屬木者入肝屬水者入腎潤者走血分燥者入氣分本天者親上本地者親下之類有因氣相求者如氣香入脾氣焦入心之類有因質相同者如藥之頭入頭干入身枝入肢皮行皮又如紅花蘇木汁似血而入血之類自然之理可以意得也藥有以形名者人參狗脊之類是也有以色名者黃連黑參之類是也有以氣名者豨薟香薷之類是也有以味名者甘草苦參之類是也有以質名者石膏石脂歸身歸尾之類是也有以時名者夏枯款冬之類是也有以能名者何首烏骨碎補之類是也凡藥火制四煅煨炙炒也水制三浸泡洗也水火共制二蒸煮也酒製升提薑製溫散入鹽走腎而軟堅用醋注肝而收斂童便制除劣性而降下米泔制去燥性而和中乳制潤枯生血蜜制甘緩益元陳壁土製借土氣以補中州麵裹曲制抑酷性勿傷上膈黑豆甘草湯漬並解毒致令平和羊酥豬脂塗燒咸滲骨容易脆斷去穰者免脹去心者除煩此制治各有所宜也藥之為用或地道不真則美惡迥別或市肆飾偽則氣味全乖或收採非時則良楛異質或頭尾誤用則呼應不靈或制治不精則功力大減用者不察顧歸咎於藥之罔功譬之兵不精練思以蕩寇克敵適以復眾輿尸也治療之家其可忽諸千金云凡藥須治擇熬泡畢然後秤用不得生秤濕潤藥皆先增分兩燥乃秤之草部黃耆補氣固表瀉火甘溫生用固表無汗能發有汗能止丹溪云黃耆大補陽虛自汗若表虛有邪發汗不出者服此又能自汗朱震亨號丹溪著本草補遺溫分肉實腠理瀉陰火解肌熱炙用補中益元氣溫三焦壯脾胃脾胃一虛土不能生金則肺氣先絕脾胃緩和則肺氣旺而肌表固實補中即所以固表也生血生肌氣能生血血充則肉長經曰血生肉排膿內托瘡癰聖藥毒氣化則成膿補氣故能內托癰疽不能成膿者死不治毒氣盛而元氣衰也痘症亦然痘症不起陽虛無熱者宜之新安汪機治痘症虛寒不起用四君子湯加黃耆紫草多效間有枯萎而死者自咎用藥之不精思之至忘寢食忽悟曰白朮燥濕茯苓滲水宜痘漿之不行也乃減去二味加官桂糯米以助其力因名保元湯人參白朮茯苓甘草名四君子湯王好古曰黃耆實衛氣是表藥益脾胃是中州藥治傷寒尺脈不至補腎元是里藥甄權謂其補腎者氣為水母也日華謂其止崩帶者氣盛則無陷下之憂也蒙筌曰補氣藥多補血藥亦從而補氣補血藥多補氣藥亦從而補血益氣湯雖加當歸因勢寡功被參耆所據補血湯數倍於當歸亦從當歸所引而補血黃耆一兩當歸二錢名補血湯氣藥多而云補血者氣能生血又有當歸為引也表旺者不宜用陰虛者宜少用恐升氣於表而里愈虛矣汪機號石山著本草會編王好古號海藏著湯液本草甄權著藥性論日華著大明本草陳嘉謨著本草蒙筌為補藥之長故名耆俗作耆皮黃肉白堅實者良入補中藥槌扁蜜炙達表生用或曰補腎及治崩帶淋濁宜鹽水浸炒昂按此說非也前症用黃耆非欲抑黃耆使入腎也取其補中升氣則腎受蔭而帶濁崩淋自止即日華氣盛自無陷下之憂也有上病而下取有下病而上取補彼經而益及此經者此類是也茯苓為使惡龜甲白鮮皮畏防風東垣曰黃耆得防風其功益大乃相畏而更以相使也李東垣著用藥法篆甘草有補有瀉能表能里可升可降味甘生用氣平補脾胃不足而瀉心火火急甚者必以此緩之炙用氣溫補三焦元氣而散表寒入和劑則補益入汗劑則解肌解退肌表之熱入涼劑則瀉邪熱白虎湯瀉心湯之類入峻劑則緩正氣薑附加之恐其僭上硝黃加之恐其峻下皆緩之之意入潤劑則養陰血炙甘草湯之類能協和諸藥使之不爭生肌止痛土主肌肉甘能緩痛通行十二經解百藥毒凡解毒藥並須冷飲熱則不效小兒初生拭去口中惡血綿漬汁令咂之能解胎毒故有國老之稱中滿證忌之甘令人滿亦有生用為瀉者以其能引諸藥至於滿所經云以甘補之以甘瀉之是已故別錄甄權並云除滿脾健運則滿除也仲景冶痞滿有甘草瀉心湯又甘草得茯苓則不資滿而反泄滿陶宏景著明醫別錄發明藥性大而結者良補中炙用瀉火生用達莖中腎莖用梢梢止莖中痛淋濁證用之白朮苦參乾漆為使惡遠志反大戟芫花甘遂海藻然亦有並用者胡洽治痰癖十棗湯加甘草東垣治結核與海藻同用丹溪治勞瘵蓮心飲與芫花同行非妙達精微者不知此理十棗湯芫花甘遂大戟等分棗十枚仲景詒傷寒表已解心下有水氣喘咳之劑時珍曰甘草外赤中黃色兼坤離味濃氣薄資全土德協和群品有元老之功普治百邪得王道之化贊帝力而人不知參神功而己不與可謂藥中之良相也昂按甘草之功用如是故仲景有甘草湯甘草芍藥湯甘草茯苓湯炙甘草湯以及桂枝麻黃葛根青龍理中四逆調胃建中柴胡白虎等湯無不重用甘草贊助成功即如後人益氣補中瀉火解毒諸劑皆倚甘草為君必須重用方能見效此古法也奈何時師每用甘草不過二三分而止不知始自何人相習成風牢不可破殊屬可笑附記於此以正其失人參大補元氣瀉火生甘苦微涼甘補陽微苦微寒又能補陰熟甘溫大補肺中元氣東坦曰肺主氣肺氣旺則四臟之氣皆旺精自生而形自盛十劑曰補可去弱人參羊肉之屬是也人參補氣羊肉補形瀉火得升麻補上焦瀉肺火得茯苓補下焦瀉腎火得麥冬瀉火而生脈得黃耆甘草乃甘溫退大熱東垣曰參耆甘草瀉火之聖藥合用名黃耆湯按煩勞則虛而生熱得甘溫以益元氣而邪熱自退故亦謂之瀉益土健脾生金補肺明目開心益智添精神定驚悸邪火退正氣旺則心肝寧而驚悸定除煩渴瀉火故除煩生津故止渴通血脈氣行則血行賀汝瞻曰生脈散用之者以其通經活血則脈自生也古方解散藥行表藥多用之皆取其通經而走表也破堅積氣運則積化消痰水氣旺則痰行水消治虛勞內傷傷於七情六慾飲食作勞為內傷傷於風寒暑濕為外感如內傷發熱時熱時止外感發熱熱甚無休內傷惡寒得暖便解外感惡寒絮火不除內傷頭痛乍痛乍歇外感頭痛連痛無停內傷則手心熱外感則手背熱內傷則口淡無味外感則鼻塞不通內傷則氣口脈盛多屬不足宜溫宜補宜和外感則人迎脈盛多屬有餘宜汗宜吐宜下蓋左人迎主表右氣口主裡也昂按東垣辨內傷外感最詳恐人以治外感者治內傷也今人緣東垣之言凡外傷風寒發熱咳嗽者概不輕易表散每用潤肺退熱藥間附秦艽蘇梗柴胡前胡一二味而羌活防風等絕不敢用不思秦艽陽明藥柴胡少陽藥於太陽有何涉乎以致風寒久郁嗽熱不止變成虛損殺人多矣此又以內傷治外感之誤也附此正之發熱自汗自汗屬陽虛盜汗屬陰虛亦有過服參耆而汗反盛者以陽盛陰虛陽愈補而陰愈虧也又宜清熱養血而汗自止多夢紛紜嘔噦反胃虛咳喘促蒙筌曰歌有肺熱還傷肺之句惟言寒熱不辨虛實若肺中實熱者忌之虛熱者服之何害又曰諸痛無補法不用參耆若久病虛痛何嘗忌此耶瘧痢滑瀉始痢宜下久痢宜補治瘧意同丹溪曰葉先生患痢後甚逼迫正合承氣證予曰氣口脈虛形雖實而面黃白必過飽傷胃與參朮陳芍十餘帖三日後胃氣稍完再與承氣湯二帖而安又曰補未至而下則病者不能當補已至而弗下則藥反添藥匪急匪徐其間間不容髮噫微哉昂按此先補後下法之變者也非胸有定見者不可輕用然後學亦宜知之大承氣湯大黃芒硝枳實厚朴淋瀝脹滿發明云胸脅逆滿由中氣不足作脹者宜補之而脹自除經所謂塞因塞用也俗醫泥於作飽不敢用不知少服反滋壅多服則宣通補之正所以導之也皇甫嵩著本草發明中暑中風及一切血證東垣曰古人治大吐血脈芤洪者並用人參脫血者先益其氣蓋血不自生須得生陽氣之藥乃生陽生則陰長之義也若單用補血藥血無由而生矣凡虛勞吐血能受補者易治不能受補者難治黃潤緊實似人形者良去蘆用補劑用熟瀉火用生煉膏服能回元氣於無何有之鄉有火者天冬膏對服參生時背陽向陰不喜風日宜焙用忌鐵茯苓為使畏五靈脂惡皂莢黑豆紫石英人溲鹹鹵反藜蘆言聞曰東垣理脾胃瀉陰火交泰丸內用人參皂莢是惡而不惡也古方療月閉四物湯加人參五靈脂是畏而不畏也又療痰在胸膈人參藜蘆同用而取其湧越是激其怒性也非洞奧達權者不能知人參蘆能湧吐痰涎體虛人用之以代瓜蒂丹溪曰人參入手太陰補陽中之陰蘆反能瀉太陰之陽亦猶麻黃根苗不同痰在膈在經絡非吐不可吐中就有發散之義一婦性躁味厚暑月因怒而病呃作則舉身跳動昏不知人其人形氣俱實乃痰因怒郁氣不得降非吐不可以參蘆半兩逆流水煎服吐頑痰數碗大汗昏睡而安沙參補陰瀉肺火甘苦微寒味淡體輕專補肺氣清肺養肝兼益脾腎脾為肺母腎為肺子久嗽肺痿金受火克者宜之寒客肺中作嗽者勿服人參補五臟之陽沙參補五臟之陰肺熱者用之以代人參似人參而體輕鬆白實者良生沙地者長大生黃土者瘦小畏防己反黎蘆北地真者難得鄭奠一曰能療胸痹心腹痛邪熱結去皮膚遊風疥癬惡瘡疝氣崩帶丹參補心生血去瘀氣平而降本經微寒宏景曰性應熱味苦色赤入心與包絡破宿血生新血瘀去然後新生安生胎養血墮死胎去瘀調經脈風寒濕熱襲傷營血則經水不調先期屬熱後期屬寒又有血虛血瘀氣滯痰阻之不同大抵婦人之病首重調經經調則百病散除煩熱功兼四物一味丹參散功同四物湯為女科要藥治冷熱勞骨節痛風痹不隨手足緩散不隨人用經曰足受血而能步掌受血而能握腸鳴腹痛崩帶癥瘕音徵加症者有塊可徵瘕者假也移動聚散無常皆血病血虛血瘀之候又治目赤疝痛瘡疥腫毒排膿生肌鄭奠一曰丹參養神定志通利血脈實有神驗畏鹹水忌醋反藜蘆元參補水瀉無根之火苦鹹微寒色黑入腎能壯水以制火散無根浮游之火腎水受寒真陰失守孤陽無根發為火病益精明目利咽喉通二便治骨蒸傳屍傷寒陽毒發斑亦有陰證發斑者懊憹鬱悶不舒煩渴溫瘧洒洒喉痹咽痛本腎藥而治上焦火證壯水以制火也腎脈貫肝膈入肺中循喉嚨系舌本腎虛則相火上炎此喉痹咽腫咳嗽吐血之所由來也潮熱骨蒸亦本於此此與黃耆能治下焦帶濁崩淋同義瘰癘結核寒散火咸軟堅癰疽鼠瘻音漏脾虛泄瀉者忌用蒸過焙用勿犯銅器惡黃耆山茱萸薑棗反藜蘆白朮補脾燥濕苦燥濕經曰脾苦濕急食苦以燥之甘補脾溫和中在血補血在氣補氣同血藥則補血同氣藥則補氣無汗能發有汗能止濕從汗出濕去汗止止汗同耆芍之類發汗加辛散之味燥濕則能利小便生津液既燥濕而又生津何也汪機曰脾惡濕濕勝則氣不得施化津何由生用白朮以除其濕則氣得周流而津液生矣止泄瀉凡水瀉濕也腹痛腸鳴而瀉火也水火相激則腸鳴痛甚而瀉瀉而痛減者食也完穀不化氣虛也在傷寒下利則為邪熱不殺穀也久瀉名脾泄腎虛而命火衰不能生土也有積痰壅滯肺氣不能下降大腸虛而作瀉者宜豁痰有傷風泄瀉者宜散風如脾虛濕瀉者宜白朮凡治瀉丸散優於湯劑消痰水腫滿黃疸濕痹補脾則能進飲食祛勞倦脾主四肢虛則四肢倦怠止肌熱脾主肌肉化症癖同枳實則消痞一消一補名枳朮丸荷葉燒飯為丸脾運則積化也和中則能已嘔吐定痛安胎同黃耆則安胎黃芩除胃熱白朮補脾亦除胃熱利腰臍間血蓋胎氣繫於脾脾虛則蒂無所附故易落利腰臍血者濕除則血氣流行也血燥無濕者禁用能生膿作痛潰瘍忌之補氣故也凡脹滿者忌用白朮閉氣然亦有塞因塞用者肥白者出浙地名雲頭術燥白者出宣歙名狗頭術差勝於浙用糯米泔浸借穀氣以和脾陳壁土炒借土氣以助脾或蜜水炒人乳拌用潤以制其燥千金方曰有人病牙齒出口艱於飲食者名髓溢單用白朮愈蒼朮補脾燥濕宣升陽散郁甘溫辛烈燥胃強脾發汗除濕能升發胃中陽氣東垣曰雄壯上行能除濕下安太陰使邪氣不傳入脾止吐瀉逐痰水許叔微云蒼朮能治水飲之澼囊蓋燥脾以去濕崇土以填科日用蒼朮一斤大棗五十枚去皮搗麻油半兩水二盞研濾汁和丸名神術丸丹溪曰實脾土燥脾濕洵是治痰之本消腫滿辟惡氣闢一切嵐瘴邪惡鬼氣暑濕月焚之佳夷堅志曰有士人遊西湖遇一女子明豔動人重幣求之不得又五年重尋舊遊悵然空返忽遇女子士欣然並行過旅館留半歲將議偕逝女曰向自君去憶念之苦感疾而亡今非人也但君浸陰氣深當暴瀉宜服平胃散以補安精血士驚惋曰藥味皆平何得取效女曰中有蒼朮除邪氣乃為上品也散風寒濕為治痿要藥陽明虛則宗筋縱弛帶脈不引故痿蹶蒼朮陽明經藥經曰治痿獨取陽明合黃柏為二妙散加牛膝名三妙散又能總解痰火氣血濕食六郁丹溪曰諸郁皆因傳化失常氣不得升降病在中焦將欲升之必先降之將欲降之必先升之越鞠丸用蒼朮香附蒼朮能徑入諸經疏泄陽明之濕通行斂澀香附乃陰中快氣之藥一升一降故郁散而平及脾濕下流腸風帶濁帶濁赤者濕傷血分從心小腸來白者濕傷氣分從肺大腸來並有寒熱二證亦有因痰而帶濁者宜二陳加二朮升柴燥結多汗者忌用南陽文氏值亂逃往壺山飢因有人教以餌術遂不飢數十年後歸家顏色更少氣力轉健術一名山精一名山姜導仙錄曰子欲長生當服山精子欲輕翔當服山姜昂按蒼朮善發汗安能長遠服食文氏仙錄之說要亦方書誇張之言也出茅山堅小有硃砂點者良糯米泔浸焙乾同芝麻炒以制其燥二術皆防風地榆為使主治略同第有止汗發汗之異古文本草不分蒼白陶隱君即宏景言有兩種始各施用葳蕤平補而潤去風濕甘平補中益氣潤心肺悅顏色除煩渴治風淫濕毒目痛眥爛風濕寒熱痁瘧痁詩廉切亦瘧也中風暴熱不能動搖頭痛腰痛凡頭痛不止者屬外感宜發散乍痛乍止者屬內傷宜補虛又有偏頭痛者左屬風與血虛右屬痰熱與氣虛腰痛亦有腎虛氣滯痰積血瘀風寒濕熱之不同凡挾虛挾風濕者宜葳蕤莖寒自汗一切不足之證用代參耆不寒不燥大有殊功昂按葳蕤溫潤甘平中和之品若蜜製作丸服之數斤自有殊功與服何首烏地黃者同一理也若僅加數分於煎劑以為可代參耆則失之遠矣大抵此藥性緩久服方能見功而所主者多風濕虛勞之症故臞仙以之服食南陽用治風溫千金外臺亦間用之未嘗恃之重劑也若急虛之證必須參耆方能復脈回陽斯時即用葳蕤斤許亦不能敵參耆數分也時醫因李時珍有可代參耆之語凡遇虛證輒加用之曾何益於病者之分毫哉拙著方解欲採葳蕤古方可以入補劑者終不可得則古人之罕用亦可見矣似黃精而差小黃白多須二藥功用相近而葳蕤更勝竹刀刮去皮節蜜水或酒浸蒸用畏鹹鹵陶宏景曰本經有女萎無葳蕤別錄有葳蕤無女蕤功用正同疑名異爾黃精平補而潤甘平補中益氣安五臟益脾胃潤心肺填精髓助筋骨除風濕下三蟲以其得坤土之精粹久服不飢氣滿則不飢脂川有人虐使婢婢逃入山拔草根食之甚美久食不飢夜宿樹下見草動疑為虎上樹避之及曉而下凌空若飛鳥家人採薪見之告其主設網捕不得或曰此豈有仙骨不過服食靈藥耳遂設酒饌於路果來食之食訖遂不能去擒而詢之指所食之草乃黃精也俗名山生薑九蒸九曬用仙家以為芝草之類服之長生狗脊平補肝腎苦堅腎甘益血能強汗溫養氣治失溺不節腎虛腳弱腰痛寒濕周痹經曰內不在臟腑而外未發於皮獨居分肉之間真氣不能周命曰周痹除風虛強機關利俯仰滋腎益肝則骨健而筋強有黃毛如狗形故曰金毛狗脊去毛切酒拌蒸萆薢為使熬膏良石斛平補肝腎甘淡入脾而除虛熱鹹平入腎而澀元氣益精強陰暖水臟平胃氣補虛勞壯筋骨療風痹腳弱發熱自汗夢遺滑精囊澀餘瀝雷斆曰石斛鎮髓昂按石斛石生之草體瘦無汁味淡難出置之煎劑猝難見功必須熬膏用之為良光澤如金釵股短而中實生石上者良名金釵石斛長而虛者名水斛不堪用去頭根酒浸用惡巴豆畏殭蠶細銼水浸熬膏更良遠志補心腎苦泄熱溫壯氣辛散郁主手少陰心能通腎氣上達於心強志益智補精壯陽聰耳明目利九竅長肌肉助筋骨治迷惑善忘驚悸夢泄能交心腎時珍曰遠志入足少陰腎經非心經藥也強志益精故治健忘蓋精與志皆藏於腎腎精不足則志氣衰不能上通於心故健忘夢泄也腎積奔豚一切癰疽酒煎服經疏曰癰疽皆屬七情憂鬱惱怒而得遠志辛能散郁昂按辛能散郁者多矣何獨遠志三因云蓋亦補腎之力耳繆希雍著本草經疏去心甘草水浸一宿用畏真珠藜蘆得茯苓龍骨良石菖蒲宣通竅補心辛苦而溫芳香而散補肝益心開心孔利九竅明耳目發音聲去濕逐風除痰消積開胃寬中療噤口毒痢楊土瀛曰噤口雖屬脾虛亦熱閉胸膈所致用木香失之溫山藥失之閉唯參苓白朮散加菖蒲米飲下胸次一開自然思食菖蒲黍米酸酒治一切風風痹驚癇崩帶胎漏消腫止痛解毒殺蟲李士材曰仙經稱為水草之精英神仙之靈藥用泔浸飯上蒸之借穀氣而臻於中和真有殊常之效又曰芳香利竅心脾良藥能佐地黃天冬之屬資其宣導若多用獨用亦耗氣血而為殃李士材著藥性解本草通玄根瘦節密一寸九節者良去皮微炒用秦艽為使惡麻黃忌飴糖羊肉鐵器牛膝補肝腎瀉惡血苦酸而平足厥陰少陰經藥肝腎能引諸藥下行酒蒸則甘酸而溫益肝腎強筋骨肝主筋腎主骨治腰膝骨痛足痿筋攣下行故理足補肝則筋舒血行則痛止陰痿失溺筋衰則陰痿腎虛則失溺久瘧下痢傷中少氣以土皆補肝腎之功生用則散惡血破癥結血行則結散治心腹諸痛淋痛尿血熱蓄膀胱便澀而痛曰淋氣淋便澀餘瀝勞淋房勞即發冷淋寒戰後溲膏淋便出如膏石淋精結成石尿血即血淋也鮮色者心與小腸實熱色瘀者腎與膀胱虛冷張子和曰石淋乃肝經移熱於胞中日久熬煎成石非腎與小腸病也大法治淋宜通氣清心平火利濕不宜用補恐濕熱得補增劇也牛膝淋證要藥血淋尤宜用之杜牛膝亦可又有中氣不足致小便不利者宜補中益氣經所謂氣化則能出是也忌用淋藥通之經閉產難下行之效誤用墮胎喉痹齒痛引火下行癰腫惡瘡金瘡傷折以上皆散惡血之功出竹木刺搗爛罨之即出縱瘡口合刺猶自出然性下行而滑竅夢遺失精及脾虛下陷因而腿膝腫痛者禁用出西川及懷慶府長大肥潤者良下行生用入滋補藥酒浸蒸惡龜甲畏白前忌羊肉甘菊花祛風溫補肺腎明目味兼甘苦性稟平和備受四氣冬苗春葉夏蕊秋花飽經霜露得金水之精居多能益金水二臟肺腎以制火而平木心肝木平則風息火降則熱除故能養目血去翳膜與枸杞相對蜜丸久服永無目疾治頭目眩暈風熱散濕痹遊風以單瓣味甘者入藥花小味苦者名苦薏非真菊也牧署閒談云真菊延齡野菊瀉人朮枸杞地骨皮為使黃者入陰分白者入陽分紫者入血分可藥可餌可釀可枕仙經重之五味子補肺腎澀精氣性溫五味俱備皮甘肉酸核中苦辛都有鹹味酸鹹為多故專收斂肺氣而滋腎水氣為水母經曰肺欲收急食酸以收之王好古曰入手太陰血分足少陰氣分益氣生津肺主氣斂故能益益氣故能生津夏月宜常服以瀉火而益金補虛明目強陰澀精仲景八味丸加之補腎蓋內核似腎象形之義退熱斂汗止嘔住瀉寧嗽定喘感風寒而喘嗽者當表散宜羌防蘇桔痰壅氣逆而喘嗽者當清降宜二陳及蘇子降氣湯水氣逆而喘嗽者宜小青龍半夏茯苓湯氣虛病久而喘嗽者宜人參五味除煩渴消水腫解酒毒收耗散之氣瞳子散大嗽初起脈數有實火者忌用丹溪曰五味收肺氣非除熱乎補腎非曖火臟乎乃火熱嗽必用之藥寇氏所謂食之多虛熱者收補之驟也閔守泉每晨吞北五味三十粒固精氣益五臟北產紫黑者良入滋補藥蜜浸蒸入勞嗽藥生用俱槌碎核南產色紅而枯若風寒在肺宜南者蓯蓉為使惡葳蕤熬膏良天門冬瀉肺火補腎水潤燥痰甘苦大寒入手太陰肺氣分清金降火益水之上源肺為腎母下通足少陰腎苦能堅腎寒能去腎家濕熱故亦治骨痿滋腎潤燥止渴消痰蒙筌曰腎主津液燥則凝而為痰得潤劑則痰化所謂治痰之本也澤肌膚利二便治肺痿腫癰肺痿者屬於風寒咳嗽短氣鼻塞胸脹久而成痿有寒痿熱痿二證肺癰者熱毒蘊結咳吐膿血胸中隱痛痿重而癰稍輕治痿宜養血補氣保肺清火治癰宜瀉熱豁痰開提升散癰為邪實痿為正虛不可誤治吐膿吐血苦泄血滯甘益元氣寒止血妄行痰嗽喘促消渴嗌乾煩渴引飲多食善飢為消渴由火盛津枯足下熱痛虛勞骨蒸陰虛有火之證然性冷利胃虛無熱及瀉者忌用取肥大明亮者去心皮酒蒸地黃貝母為使惡鯉魚二冬熬膏並良天冬滋陰助元消腎痰麥冬清心降火止肺咳麥門冬補肺清心瀉熱潤燥甘微苦寒清心潤肺東垣曰入手太陰氣分強陰益精瀉熱除煩微寒能瀉肺火火退則金清金旺則水生陰得水養則火降心寧而精益消痰止嗽午前嗽多屬胃火宜芩連梔柏知母石膏午後嗽及日輕夜重者多屬陰虛宜五味麥冬知母四物行水生津肺清則水道下行故治浮腫火降則腎氣上騰故又治消渴治嘔吐胃火上衝則嘔宜麥冬又有因寒因食因痰因虛之不同痿蹶手足緩縱曰痿蹶陽明濕熱上蒸於肺故肺熱葉焦發為痿蹶經疏曰麥冬實足陽明胃經之正藥客熱虛勞脈絕短氣同人參五味名生脈散蓋心主脈肺朝百脈補肺清心則氣充而脈復又有脈絕將死者服此能復生之夏月火旺灼金服之尤宜東垣曰人參甘寒瀉火熱而益元氣麥冬苦寒滋燥金而清水源五味酸溫瀉丙火而補庚金益五臟之氣也丙火小腸庚金大腸並主津液肺痿吐膿血熱妄行經枯乳閉明目悅顏益水清火但性寒而泄氣弱胃寒人禁用肥大者良去心用入滋補藥酒浸制其寒地黃車前為使惡款冬花苦參青葙木耳款冬花潤肺瀉熱止嗽辛溫純陽瀉熱潤肺消痰除煩定驚明目治咳逆上氣喘渴肺虛挾火喉痹肺痿肺癰咳吐膿血為治嗽要藥燒煙以筒吸之亦良百合款冬等分蜜丸名百花膏治咳嗽痰血凡陰虛勞嗽通用款冬紫菀百部百合沙參生地麥冬五味知柏芩芍如內熱骨蒸加丹皮地骨若嗽而復瀉者為肺移熱於大腸臟腑俱病嗽而發熱不止者為陰虛火炎皆難治寒熱虛實皆可施用本草匯曰隆冬獨秀先春開放得腎之體先肝之用故為溫肺理嗽之最大抵咳必因寒寒為冬氣入肺為逆款冬非肺家專藥乃使肺邪從腎順流而出肺惡寒郭佩蘭著本草匯十一二月開花如黃菊微見花未舒者良生河北關中世多以枇杷蕊偽之揀淨花甘草水浸一宿曝用得紫菀良杏仁為使惡皂莢硝石玄參畏黃耆貝母連翹麻黃青葙辛夷雖畏貝母得之反良紫菀潤肺瀉火辛溫潤肺苦溫下氣補虛調中消痰止渴治寒熱結氣咳逆上氣咳吐膿血專治血痰為血勞聖藥肺經虛熱小兒驚癇亦虛而有熱能開喉痹取惡涎然辛散性滑不宜多用獨用本草匯云苦能達下辛可益金故吐血保肺收為上劑雖入至高善於達下使氣化及於州都小便自利人所不知李士材曰辛而不燥潤而不寒補而不滯誠金玉君子非多用獨用不能速效州都膀胱也根作節紫色潤軟者良人多以車前旋覆根偽之誤服誤人去頭須蜜水浸焙用款冬為使惡天雄瞿麥藁本遠志畏茵陳白者名菀時珍曰紫入血分白入氣分旋覆花一名金沸草瀉下氣消痰咸能軟堅苦辛能下氣行水溫能通血脈入肺大腸經消痰結堅痞唾如膠漆噫氣不除噫於介切俗作噯胸中氣不暢故噯以通之屬不足亦有挾痰挾火者屬有餘仲景治汗吐下後痞硬噫氣有代赭旋覆湯大腸水腫去頭目風然走散之藥冷利大腸虛者慎用類金錢菊去皮帶蕊殼蒸用根能續筋筋斷者搗汁滴傷處用滓敷其上半月不開筋自續矣百部潤肺殺蟲甘苦微溫能潤肺治肺熱咳嗽苦能瀉熱有小毒殺蛔蟯蠅蝨一切樹木蛀蟲觸煙即死治骨蒸傳屍疳積疥癬皆有蟲時珍曰百部亦天冬之類故皆治肺而殺蟲但天冬寒熱嗽宜之百部溫寒嗽宜之根多成百故名取肥實者竹刀劈去心皮酒浸焙用桔梗宣通氣血瀉火散寒載藥上浮苦辛而平色白屬金入肺氣分瀉熱兼入手少陰心足陽明胃經開提氣血表散寒邪清利頭目咽喉開胸膈滯氣凡痰壅喘促鼻塞肺氣不利目赤喉痹咽痛兩少陰火齒痛陽明風熱口瘡肺癰乾咳火鬱在肺胸膈刺痛火鬱上焦下痢腹痛腹滿腸鳴肺火鬱於大腸並宜苦梗以開之為諸藥舟楫載之上浮能引苦泄峻下之劑至於至高之分成功既上行而又能下氣何也肺主氣肺金清濁氣自下行耳養血排膿補內漏故治肺癰時珍曰枳桔湯治胸中痞滿不痛取其通肺利膈下氣也甘桔湯通治咽喉口舌諸病取其苦辛散寒甘平除熱也宋仁宗加荊芥防風連翹遂名如聖湯王好古加味甘桔湯失音加訶子聲不出加半夏上氣加陳皮涎嗽加知母貝母咳渴加五味酒毒加葛根少氣加人參嘔加半夏生薑吐膿血加紫菀肺痿加阿膠胸膈不利加枳殼痞滿加枳實目赤加梔子大黃面腫加茯苓膚痛加黃耆發斑加荊防疫毒加牛蒡大黃不得眠加梔子昂按觀海藏所加則用藥之大較亦可識矣去浮皮泔浸微炒用畏龍膽白芨忌豬肉薺苨補和中解毒寒利肺甘解毒能解百藥及蛇蟲毒在諸藥中毒皆自解和中止嗽治消渴強中渴症下消莖長興盛不交精出名強中消渴之後發為癰疽癰腫疔毒似人參而體虛無心似桔梗而味甘不苦奸賈多用以亂人參時珍曰薺苨即甜桔梗馬兜鈴瀉肺下氣體輕而虛熟則四開象肺故入肺寒能清肺熱苦辛能降肺氣時珍曰錢乙補肺阿膠散用之非取其補肺取其清熱降氣則肺自安也其中阿膠糯米乃補肺之正藥昂按清熱降氣瀉之即所以補之若專一於補適以助火而益嗽也治痰嗽喘促血痔瘻瘡大腸經熱瘻漏也音閭亦音漏痔屬大腸大腸與肺為表裡肺移熱於大腸故腸風痔瘻清臟熱則腑熱亦清矣千金單服治水腫以能瀉肺行水也亦可吐蠱湯劑中用之多作吐蔓生實如鈴去筋膜取子用白前瀉肺降氣下痰辛甘微寒長於降氣下痰止嗽治肺氣壅實胸膈逆滿虛者禁用似牛膝粗長堅直易斷者白前也短小柔軟能彎者白薇也近道多有形色頗同以此別之去頭須甘草水浸一伏時即一晝夜焙用忌羊肉白芨澀補肺逐瘀生新味苦而辛性澀而收得秋金之令入肺止吐血摘玄云試血法吐水內浮者肺血也沉者肝血也半浮沉者心血也各隨所見以羊肺肝心蘸白芨末日日服之佳肺損者能復生之以有形生有形也人之五臟惟肺葉損壞者可以復生台州獄吏憫一重囚囚感之曰吾七犯死罪遭刑拷肺皆損傷得一方用白芨末米飲日服其效如神後囚凌遲剖開胸見肺開竅穴數十皆白芨填補色猶不變也治跌打折骨酒服二錢湯火灼傷油調末敷惡瘡癰腫敗疽死肌去腐逐瘀生新除面上皯皰皯音千去聲面黑氣疱音炮面瘡也塗手足皴裂令人肌滑紫石英為使畏杏仁反烏頭半夏燥濕痰潤腎燥宣通陰陽辛溫有毒體滑性燥能走能散能燥能潤和胃健脾去濕補肝辛散潤腎除濕化痰發表開鬱下逆氣止煩嘔發音聲利水道燥去濕故利水辛通氣能化液故潤燥丹溪謂二陳湯能使大便潤而小便長救暴卒葛生曰凡遇五絕之病用半夏末吹入鼻中即活蓋取其能作嚏也五絕謂縊死溺死壓死魘死產死也治咳逆頭眩火炎痰升則眩痰厥頭痛眉稜骨痛風熱與痰咽痛成無己曰半夏辛散行水氣而潤腎燥又局方半硫丸治老人虛秘皆取其潤滑也俗以半夏南星為性燥誤矣濕去則土燥痰涎不生非二物之性燥也古方用治咽痛喉痹吐血非禁劑也二物亦能散血故破傷撲打皆主之惟陰虛勞損則非濕熱之邪而用利竅行濕之藥是重竭其津液醫之罪也豈藥之咎哉甲乙經用治之眠是果性燥者乎半夏硫黃等分生薑糊丸名半硫丸胸脹仲景小陷胸湯用之傷寒寒熱故小柴胡湯用之痰瘧不眠素問曰胃不和則臥不安半夏能和胃氣而通陰陽靈樞曰陽氣滿不得入於陰陰氣虛故目不得瞑飲以半夏湯陰陽既通其臥立安又有喘嗽不得眠者左不得眠屬肝脹宜清肝右不得眠屬肺脹宜清肺反胃吐食痰膈散痞除癭癭多屬痰消腫止汗勝濕孕婦忌之王好古曰腎主五液化為五濕本經為唾入肝為淚入心為汗入肺為涕入脾為痰痰者因咳而動脾之濕也半夏泄痰之際不能治痰之本治本者治腎也咳無形痰有形無形則潤有形則燥所以為流脾濕而潤腎燥之劑也俗以半夏為肺藥非也止嘔為足陽明除痰為足太陰柴胡為之使故柴胡湯用之雖云止嘔亦助柴芩主寒熱往來是又為足少陽也時珍曰脾無濕不生痰故脾為生痰之源肺為貯痰之器按有聲無痰曰咳蓋傷於肺氣有痰無聲曰嗽蓋動於脾濕也有聲有痰曰咳嗽或因火因風因寒因濕因虛勞因食積宜分證論治大法治嗽當以治痰為先而治痰又以順氣為主宜以半夏南星燥其濕枳殼橘紅利其氣肺虛加溫斂之味肺熱加涼瀉之劑趙繼宗曰二陳治痰世醫執之內有半夏其性燥烈若風寒濕食諸痰則相宜至於勞痰失血諸痰用之反能燥血液而加病按古有三禁血家汗家渴家忌之然亦間有用之者俗以半夏專為除痰而半夏之功用不復見知於世矣小柴胡湯半夏瀉心湯皆用半夏豈為除痰乎火結為痰氣順則火降而痰消圓白而大陳久者良浸七日逐日換水瀝去涎切片薑汁拌性畏生薑用之以制其毒得姜而功愈彰柴胡射干為使畏生薑秦皮龜甲雄黃忌羊肉海藻飴糖惡皂角反烏頭合陳皮茯苓甘草名二陳湯為治痰之總劑寒痰佐以乾薑芥子熱痰佐以黃芩栝蔞濕痰佐以蒼朮茯苓風痰佐以南星前胡痞痰佐以枳實白朮更看痰之所在加導引藥惟燥痰非半夏所司也韓飛霞造麴十法一薑汁浸造名生薑曲治淺近諸痰一礬水煮透兼姜糊造名礬曲礬最能卻水治清水痰一煮皂角汁煉膏和半夏末為曲或加南星或加麝香名皂角曲治風痰開經絡一用白芥子等分或三分之一竹瀝和成略加曲糊名竹瀝曲治皮裡膜外結核隱顯之痰一麻油浸半夏三五日炒乾為末曲糊造成油以潤燥名麻油曲治虛熱勞咳之痰一用臘月黃牛膽汁略加熱蜜和造名牛膽曲治癲癇風痰一用香附蒼朮撫芎等分熬膏和半夏末作曲名開鬱曲治郁痰一用芒硝居半夏十分之三煮透為末煎大黃膏和成名硝磺曲治中風卒厥傷寒宜下由於痰者一用海粉一兩雄黃一兩半夏二兩為末煉蜜和造名海粉曲治積痰沉痼一用黃牛肉煎汁煉膏即霞天膏和半夏末為曲名霞天曲治沉疴痼痰功效最烈以上並照造麴法草菴七日待生黃衣曬乾懸掛風處愈久愈良天南星燥濕宣祛風痰味辛而苦能治風散血是齋方南星防風等分為末治破傷風刀傷撲傷如神名玉真散破傷風者藥敷瘡口溫酒調下二錢打傷至死童便調灌二錢連進三服必活氣溫而燥能勝濕除痰性緊而毒能攻積拔腫補肝風虛凡味辛而散者皆能補肝木喜條達故也為肝脾肺三經之藥治驚癇風眩丹溪曰無痰不作眩身強口噤喉痹舌瘡結核疝瘕癰毒疥癬蛇蟲咬毒調末箍之破結下氣利水墮胎性更烈於半夏與半夏皆燥而毒故墮胎半夏辛而能守南星辛而不守然古安胎方中亦有用半夏者陰虛燥痰禁用根似半夏而大形如虎掌故一名虎掌以礬湯或皂角汁浸三晝夜曝用或酒浸一宿蒸竹刀切開至不麻乃止或姜渣黃泥和包煨熟用造麴法與半夏同造膽星法臘月取黃牛膽汁和南星末納入膽中風乾年久者彌佳畏附子乾薑防風得防風則不麻火炮則毒性緩得牛膽則不燥且膽有益肝膽之功貝母宣散結瀉熱潤肺清火微寒苦瀉心火辛散肺郁入肺經氣分心火降則肺氣寧詩曰言採其虻虻即貝母也取其解鬱潤心肺清虛痰治虛勞煩熱咳嗽上氣吐血咯血肺痿肺癰喉痹君相之火目眩火熱上攻淋瀝小腸邪熱心與小腸相表裡肺為氣化之源癭瘤化痰乳閉產難功專散結除熱敷惡瘡唐時有人膊上生瘡如人面能飲酒食物亦無他苦遍投諸藥悉受之至貝母瘡乃顰眉灌之數日成痂而愈斂瘡口火降邪散瘡口自斂非貝母性收斂也俗以半夏燥毒代以貝母不知貝母寒潤主肺家燥痰半夏溫燥主脾家濕痰設或誤用貽誤非淺故凡風寒濕食諸痰貝母非所宜也宜用半夏南星川產開瓣者良獨顆無瓣者不堪用去心糯米拌炒黃搗用厚朴白薇為使畏秦艽反烏頭栝樓仁俗作瓜蔞瀉火潤肺滑腸止血治熱痰甘補肺本草苦寒潤下能清上焦之火使痰氣下降為治嗽要藥肺受火逼失下降之令故生痰作嗽又能盪滌胸中鬱熱垢膩生津止渴丹溪曰消渴神藥清咽利腸通大便是齋方焙研酒調或米飲下治小便不通通乳消腫治結胸胸痹仲景小陷胸湯用之又云少陽證口渴者小柴胡湯以此易半夏酒黃熱痢二便不通炒香酒服止一切血寒降火瀉者忌用實圓長如熟柿子扁多脂去油用枸杞為使畏牛膝乾漆惡乾薑反烏頭天花粉瀉火潤燥治熱酸能生津甘不傷胃微苦微寒降火潤燥滑痰解渴古方多用治消渴生肌排膿消腫行水通經止小便利膀胱熱解則水行而小便不數治熱狂時疾胃熱疸黃口燥唇乾腫毒發背乳癰瘡痔脾胃虛寒者禁用即栝蔞根畏惡同澄粉食大宜虛熱人夏枯草補陽散結消癭辛苦微寒氣稟純陽補肝血緩肝火解內熱散結氣治癭癧濕痹目珠夜痛樓全善曰目珠連目本即目系也夜痛及點苦寒藥更甚者夜與寒皆陰也夏枯氣稟純陽補厥陰血脈故治此如神以陽和陰也按目白珠屬陽故晝痛點苦寒藥則效黑珠屬陰故夜痛點苦寒藥反劇冬至生夏至枯故名用莖葉海藻瀉熱軟堅痰消癭瘤咸潤下而軟堅寒行水以泄熱故消癭瘤桔核陰㿉之堅聚腹痛曰疝丸痛曰㿉音頹痰飲腳氣水腫之濕熱消宿食治五膈山東海有大葉馬尾二種亦作海菜食洗去鹹水用昂按其用在咸似不宜過洗反甘草東垣治瘰癧馬刀海藻甘草並用蓋激之以潰堅也海帶下水消癭功同海藻似海藻而粗柔弱而長昆布功同海藻而少滑性雄治水腫癭瘤陰㿉膈噎含之咽汁出登萊者搓如繩索出閩越者大葉如菜洗去鹹味用獨活宣搜風去濕辛苦微溫氣緩善搜入足少陰腎氣分以理伏風治本經傷風頭痛頭暈目眩宜與細辛同用風熱齒痛文潞公藥准用獨活地黃等分為末每服三錢痙癇濕痹項背強直手足反張曰痙濕流關節痛而煩曰濕痹風勝濕故二活兼能去濕奔豚疝瘕腎積曰奔豚風寒濕客於腎家所致瘕疝亦然有風不動無風反搖又名獨搖草故治風本經云獨活一名羌活古方惟用獨活後人云是一類二種遂分用以形虛大有臼如鬼眼節疏色黃者為獨活色紫節密氣猛烈者為羌活並出蜀漢又云自西羌來者名羌活故名胡王使者今採諸家所分經絡主治各證以便施用羌活宣搜風發表勝濕辛苦性濕氣雄而散味薄上升入足太陽膀胱以理遊風兼入足少陰厥陰腎肝氣分瀉肝氣搜肝風小無不入大無不通治風濕相搏本經頭痛同川芎治太陽少陰頭痛凡頭痛多用風藥者以巔頂之上唯風藥可到也督脈為病脊強而厥督脈並太陽經剛痙柔痙脊強而厥即痙證也傷寒無汗為剛痙傷風有汗為柔痙亦有血虛發痙者大約風證宜二活血虛忌用中風不語按古人治中風多主外感率用續命愈風等湯以發表用三化湯麻仁丸以攻裡至河間出如雲中風非外來之風良由心火暴甚腎水虛衰東垣則以為本氣自病丹溪以為濕生痰痰生熱熱生風世人復分北方風勁質厚為真中南方地卑質弱為類中不思岐伯云中風大法有四一偏枯半身不遂也二風痱四肢不收也三風癔奄忽不知人也四風痹諸風類痹狀也風證盡矣何嘗有真中類中之說乎此證皆由氣血虧虛醫者不知養血益氣以固本徒用烏附羌獨以驅風命曰虛虛誤人多矣真中定重於類中焉有類中既屬內傷真中單屬外感乎河間東垣皆北人安能盡舍北人而專治南病乎頭旋目赤目赤要藥散肌表八風之邪利周身百節之痛為卻亂反正之主藥若血虛頭痛遍身痛者此屬內證二活並禁用防風宣發表勝濕辛苦性溫升浮為陽搜肝瀉肺散頭目滯氣經絡留濕主上部見血用之為使亦能治崩上焦風邪頭痛目眩脊痛項強周身盡痛太陽膀胱經證徐之才曰得蔥白能行周身又行脾胃二經為去風勝濕之要藥凡風藥皆能勝濕東垣曰卒伍卑賤之職隨所引而止乃風藥中潤劑若補脾胃非此引用不能行散目赤瘡瘍若血虛痙急頭痛不因風寒內傷頭痛泄瀉不因寒濕火升發嗽陰虛盜汗陽虛自汗者並禁用同黃耆芍藥又能實表止汗合黃耆白朮名玉屏風散固表聖藥黃耆得防風而功益大取其相畏而相使也黃潤者良上部用身下部用梢畏萆薢惡乾薑白蘞芫花殺附子毒藁本宣去風寒濕辛溫雄壯為太陽經膀胱風藥寒鬱本經頭痛連腦者必用之凡巔頂痛宜藁本防風酒炒升柴治督脈為病脊強而厥督脈並太陽經貫脊又能下行去濕治婦人疝瘕陰寒腫痛腹中急痛皆太陽寒濕胃風泄瀉夏英公病泄醫以虛治不效霍翁曰此風客於胃也飲以藁本湯而愈蓋藁本能除風濕耳粉刺酒齄音查和白芷作面脂良根紫色似芎藭而輕虛氣香味麻葛根輕宣解肌升陽散火辛甘性平輕揚升發入陰陽經能鼓胃氣上行生津止渴風藥多燥葛根獨能止渴者以能升胃氣入肺而生津耳兼入脾經開腠發汗解肌退熱脾主肌肉為治脾胃虛弱泄瀉之聖藥經曰清氣在下則生飧泄葛根能升陽明清氣療傷寒中風陽明頭痛張元素曰頭痛如破乃陽明中風可用葛根蔥白湯若太陽初病未入陽明而頭痛者不可便服升葛湯發之反引邪氣入陽明也仲景治太陽陽明合病桂枝湯加葛根麻黃又有葛根黃芩黃連解肌湯是用以斷太陽入陽明之路非太陽藥也血痢溫瘧丹溪曰治瘧無汗要有汗散邪為主帶補有汗要無汗扶正為主帶散若陽瘧有汗加參耆白朮以斂之無汗加芩葛蒼朮以發之腸風痘疹能發痘疹丹溪曰凡斑疹已見紅點不可更服升葛湯恐表虛反增斑爛也又能起陰氣散鬱火解酒毒葛花尤良利二便殺百藥毒多用反傷胃氣升散太過生葛汁大寒解溫病大熱吐衄諸血升麻輕宣升陽解毒甘辛微苦足陽明太陰胃脾引經藥參耆上行須此引之亦入手陽明太陰大腸肺表散風邪引蔥白散手陽明風邪同葛根能發陽明之汗引石膏止陽明頭痛齒痛升發火鬱能升陽氣於至陰之下引甘溫之藥上行以補衛氣之散而實其表柴胡引少陽清氣上行升麻引陽明清氣上行故補中湯用為佐使若下元虛者用此升之則下元愈虛又當慎用治時氣毒癘頭痛陽明頭痛痛連齒頰寒熱肺痿吐膿下痢後重後重者氣滯也氣滯於中必上行而後能下降有病大小便秘者用通利藥而罔效重加升麻而反通丹溪曰氣升則水自降經曰地氣上為云天氣下為雨天地不交則萬物不通也久泄經曰清氣在下則生飧泄脫肛崩中帶下能緩帶脈之縮急足寒陰痿目赤口瘡痘瘡升葛湯初發熱時可用痘出後氣弱或泄瀉者可少用否則見點之後必不可用為其解散也斑疹成朵如錦紋者為斑隱隱見紅點者為疹蓋胃熱失下衝入少陽則助相火而成斑衝入少陰則助君火而成疹風熱瘡癰解百藥毒吐蠱毒殺精鬼性陽氣升味甘故也陰虛火動者忌用朱肱活人書言瘀血入里吐衄血者犀角地黃湯乃陽明聖藥如無犀角代以升麻二藥性味相遠何以為代蓋以升麻能引諸藥同入陽明也朱二允曰升麻性升犀角性降用犀角止血乃借其下降之氣清心肝之火使血下行歸經耳倘誤用升麻血隨氣升不愈湧出不止乎古方未可盡泥也里白外黑緊實者良名鬼臉升麻去須蘆用或有參耆補劑須用升柴而又恐其太升發者升麻柴胡並用蜜水炒之別有一種綠升麻繆仲醇用治滯下每每有驗白芷宣發表祛風散濕辛散風溫除濕芳香通竅而表汗行手足陽明大腸胃入手太陰肺色白味辛故入肺而為陽明主藥陽明之脈營於面故治頭面諸疾治陽明頭目昏痛楊吉老方白芷湯泡四五遍蜜丸彈子大名都梁丸每服一丸荊芥點醋茶嚼下楊吉老名介治王定國病時在都梁因以名丸眉稜骨痛風熱與痰同酒浸黃芩為末茶下牙痛上齦屬足陽明下齦屬手陽明二經風熱鼻淵肺主鼻風熱乘肺上爍於腦故鼻多濁涕而淵經曰腦滲為涕宜同細辛辛夷治之目癢淚出面皯干去聲面黑氣瘢疵可作面脂皮膚燥癢三經風熱之病及血崩血閉腸風痔瘻癰疽瘡瘍三經濕熱之病活血排膿腸有敗膿血淋露腥穢致臍腹冷痛須此排之生肌止痛解砒毒蛇傷先以繩扎傷處酒調下白芷末五錢種白芷能闢蛇又治產後傷風血虛頭痛自魚尾上攻多在日晚宜四物加辛芷如氣虛頭痛多在清晨宜芎藁倍參耆保壽堂治正偏頭痛白芷川芎各三錢搽牛腦上加酒頓熟熱食盡醉其病如失魚尾目之上角然其性升散血熱有虛火者禁用色白氣香者佳或微炒用當歸為使惡旋覆花細辛宣散風濕補肝潤腎辛溫散風邪故諸風痹痛咳嗽上氣頭痛脊強者宜之專治少陰頭痛獨活為使辛散浮熱故口瘡喉痹少陰火鼻淵齒蠱者蟲蝕膿爛宜之辛益肝膽故膽虛驚癇風眼淚下者宜之水停心下則腎燥細辛之辛能行水氣以潤之腎燥者心亦燥火屈於水故燥也經曰腎苦燥急食辛以潤之雖手少陰心引經乃足少陰腎本藥能通精氣利九竅故耳聾鼻齆音甕鼻塞不聞香臭也風寒入腦故氣不宣通寒宜表熱宜清有息肉者為末吹鼻倒睫便澀者宜之散結溫經破痰下乳行血發汗能發少陰之汗仲景治少陰證反發熱麻黃附子細辛湯乃治邪在裡之表劑然味厚性烈不可過用不可過一錢多則氣不通悶絕而死雖而無傷可驗開平獄嘗治此不可不知味極辛產華陰者真杜蘅鬼督郵徐長卿皆可亂之揀去雙葉者用惡黃耆山茱畏硝石滑石反藜蘆柴胡宣發表和里退熱升陽苦平微寒味薄氣升為陽主陽氣下陷能引清氣上行而平少陽厥陰之邪熱肝膽心包三焦相火時珍曰行少陽黃芩為佐行厥陰黃連為佐宣暢氣血散結調經昂按人第知柴胡能發表而不知柴胡最能和里故勞藥血藥往往用之補中益氣湯逍遙散皆用柴胡取其和中皆非解表為足少陽膽表藥膽為清淨之府無出無入其經在半表半裡法當和解小柴胡湯之屬是也若病在太陽服之太早則引賊入門若病入陰經復服柴胡則重虛其表最宜詳慎治傷寒邪熱仲景有大小柴胡湯痰熱結實虛勞肌熱寇宗奭曰柴胡本經並無一字治勞藥性論日華子皆言補勞傷醫家執而用之貽誤無窮時珍曰勞有五若勞在肝膽心心包有熱則柴胡乃手足厥陰少陽必用之藥勞在脾胃有熱或陽氣下陷則柴胡為升清退熱必用之藥惟勞在肺腎者不可用耳寇氏一概擯斥殊非通論昂按楊氏秦艽扶羸湯治肺痿成勞咳嗽聲嗄體虛自汗用柴胡為君則肺勞亦有用之者矣藥性論甄權著嘔吐心煩邪在半表半裡則多嘔吐諸瘧寒熱東垣曰諸瘧以柴胡為君佐以引經之藥李士材曰瘧非少陽經慎用喻嘉言曰瘧發必有寒有熱蓋外邪伏於半表半里適在少陽所主之界入與陰爭陽勝則熱出與陽爭陰勝則寒既純熱無寒為癉瘧溫瘧純寒無熱為牝瘧要皆自少陽而造其極偏補偏救弊亦必返還少陽之界使陰陽協和而後愈也謂少陽而兼他經則有之謂他經而不涉少陽則不成其為瘧矣脈縱屢遷而弦之一字實貫徹之也昂按瘧之不離少陽猶咳之不離於肺也談藪云張知閣久病瘧熱時如火年餘骨立醫用茸附諸藥熱益甚孫琳投以小柴胡湯三服脫然琳曰此名勞瘧熱從髓出加以剛劑氣血愈虧熱有在皮膚在臟腑在骨髓在骨髓者非柴胡不可若得銀柴胡只須一服南方者力減故三服乃效也時珍曰觀此則得用藥之妙的矣昂按據孫氏之說是柴胡亦能退骨蒸也頭眩目赤胸痞脅痛凡脅痛多是肝木有餘宜小柴胡湯加青皮川芎白芍又左脅痛宜活血行氣右脅痛宜消食行痰口苦耳聾皆肝膽之邪婦人熱入血室沖為血海即血室也男女皆有之柴胡在臟主血在經主氣胎前產後諸熱小兒痘疹五疳羸熱散十二經瘡疽血凝氣聚功同連翹連翹治血熱柴胡治氣熱為少異陰虛火炎氣升者禁用銀州者根長尺余微白治勞疳良北產者如前胡而軟者良南產者強硬不堪用外感生用內傷升氣酒炒用根中及下降用梢有汗咳者蜜水炒前胡半夏為使惡皂角前胡宣解表瀉下氣治風痰辛以暢肺解風寒甘以悅脾理胸腹苦瀉厥陰肝之熱寒散太陽膀胱之邪微寒一云微溫性陰而降功專下氣氣下則火降而痰消氣有餘便是火火則生痰能除實熱治痰熱哮喘咳嗽嘔逆痞膈霍亂小兒疳氣有推陳致新之績明目安胎無外感者忌用按柴胡前胡均是風藥但柴胡性升前胡性降為不同肝膽經風痰非前胡不能除皮白肉黑味甘氣香者良半夏為使惡皂角忌火麻黃輕發汗辛溫微苦僧繼洪曰中牟產麻黃地冬不積雪性熱故過服泄真氣入足太陽膀胱兼走手少陰陽明心大腸而為肺家專藥能發汗解肌去營中寒邪衛中風熱調血脈通九竅開毛孔治中風傷寒中猶傷也頭痛溫瘧咳逆上氣風寒鬱於肺經經曰諸氣膹郁皆屬於肺痰哮氣喘哮證宜瀉肺氣雖用麻黃而不出汗本草未載赤黑斑毒胃熱一曰斑證表虛不得再汗非便閉亦不可下只宜清解其熱毒風疹痹皮肉不仁目赤腫痛水腫風腫過劑則汗多雲陽夏月禁用汗者心之液過汗則心血為之動搖乃驍悍之劑丹溪以人參麻黃同用亦攻補法也東垣曰十劑曰輕可去實葛根麻黃之屬是也邪客皮毛腠理閉拒營衛不行故謂之實二藥輕清故可去之時珍曰麻黃太陽經藥兼入肺經肺主皮毛葛根陽明經藥兼入脾經脾主肌肉二藥皆輕揚發散而所入不同王好古曰麻黃治衛實桂枝治衛虛雖皆太陽經藥其實營衛藥也心主營為血肺主衛為氣故麻黃為手太陰之劑桂枝為手少陰心之劑時珍曰仲景治傷寒無汗用麻黃有汗用桂枝未有究其精微者津液為汗汗即血也在營則為血在衛則為汗寒傷營營血內澀不能外通於衛衛氣閉固津液不行故無汗發熱而惡寒風傷衛衛氣外滯不能內護於營營氣虛弱津液不固故有汗發熱而惡風然風寒皆由皮毛而入皮毛肺之合也蓋皮毛外閉則邪熱內攻故用麻黃甘草同桂枝引出營分之邪達之肌表佐以杏仁泄肺而和氣汗後無大熱而喘者加石膏活人書夏至後加石膏知母皆泄肺火之藥是麻黃湯雖太陽發汗重劑實散肺經火鬱之藥腠理不密則津液外泄而肺氣虛虛則補其母故用桂枝同甘草外散風邪以救表內伐肝木以防脾佐以芍藥泄木而固脾使以薑棗行脾之津液而和營衛下後微喘者加厚朴杏仁以利肺氣也汗後脈沉遲者加人參以益肺氣也活人書加黃芩為陽旦湯以瀉肺熱也是桂枝湯雖太陽解肌輕劑實為理脾救肺之藥也諸家皆以麻黃桂枝為肺經藥謂傷寒傳足不傳手者誤也桂能平肝發汗用莖去節煮十餘沸掠去浮沫或用醋湯略泡備用亦有用蜜炒者庶免太發止汗用根節無時出汗為自汗屬陽虛夢中出汗為盜汗屬陰虛用麻黃根蛤粉粟米等分為末袋盛撲之佳時珍曰麻黃髮汗駛不能御根節止汗效如影響物理不可測如此自汗有風濕傷風風溫氣虛血虛脾虛陰虛胃熱痰飲中暑亡陽柔痙等證皆可加用蓋其性能行周身肌表引諸藥至衛分而固腠理汗雖為心液然五臟亦各有汗經曰飲食飽甚汗出於胃驚而奪精汗出於心持重遠行汗出於腎疾走恐懼汗出於肝搖體勞苦汗出於脾厚朴白薇為使惡辛夷石膏荊芥一名假蘇輕宣發表祛風理血辛苦而溫芳香而散入肝經氣分兼行血分其性升浮能發汗又云止冷汗虛汗散風濕清頭目利咽喉治傷寒頭痛中風口噤身強項直口面喎斜目中黑花其氣溫散能助脾消食氣香入脾通利血脈治吐衄腸風崩中血痢產風血運產後去血過多腹內空虛則自生風故常有崩運之患不待外風襲之也荊芥最能散血中之風華佗愈風散荊芥三錢微焙為末豆淋酒調服或童便服諸家云甚效瘰癧瘡腫清熱散瘀破結解毒結散熱清則血涼而毒解為風病血病瘡家聖藥荊芥功本治風又兼治血者以其入風木之臟即是藏血之地也李士材曰風在皮裡膜外荊芥主之非若防風能入骨肉也連穗用穗在於巔故善升發治血炒黑用凡血藥用山梔乾薑地榆棕櫚五靈脂等皆應炒黑者以黑勝紅也反魚蟹河豚驢肉連翹輕宣散結瀉火微寒升浮形似心實以蓮房有瓣苦入心故入手少陰厥陰心心包氣分而瀉火兼除手足少陽三焦膽手陽明經大腸氣分濕熱散諸經血凝氣聚營氣壅遏衛氣鬱滯遂成瘡腫利水通經殺蟲止痛消腫排膿皆結者散之凡腫而痛者為實邪腫而不痛為虛邪腫而赤者為結熱腫而不赤為留氣停痰為十二經瘡家聖藥經曰諸瘡痛癢皆屬心火紫蘇宣發表散寒味辛入氣分色紫入血分香溫散寒通心利肺開胃益脾氣香入胃發汗解肌和血下氣寬中消痰祛風定喘止痛安胎利大小腸解魚蟹毒多服泄人真氣時珍曰同陳皮砂仁行氣安胎同霍香烏藥溫中止痛同香附麻黃發熱解肌同芎藭當歸和血散血同桔梗枳殼利膈寬腸同卜子杏仁消痰定喘同木瓜厚朴散溫解暑治霍亂腳氣氣香者良宜橘皮忌鯉魚蘇子與葉同功潤心肺尤能下氣定喘止嗽消痰利膈寬腸溫中開鬱有蘇子降氣湯蘇梗下氣稍緩虛者宜之葉發汗散寒梗順氣安胎子降氣開鬱消痰定喘表弱氣虛者忌用葉腸滑氣虛者忌用子炒研用薄荷輕宣散風熱辛能散涼能清本經溫蓋體溫而用涼也升浮能發汗搜肝氣而抑肺盛消散風熱清利頭目治頭痛頭風中風失音痰嗽口氣語澀舌胎含漱眼耳咽喉口齒諸病辛香通竅而散風熱皮膚癮疹瘰癧瘡疥驚熱凡小兒治驚藥俱宜薄荷湯調骨蒸破血止痢能治血痢血痢病在凝滯辛能散涼能清虛人不宜多服能發汗疏表夏月多服泄人元氣蘇產氣芳者良薄荷貓之酒也犬虎之酒也蜈蚣雞之酒也桑椹鳩之酒也莽草魚之酒也食之皆醉被貓傷者薄荷汁塗之雞蘇一名水蘇一名龍腦薄荷輕宣散熱理血辛而微溫清肺下氣理血辟惡而消穀治頭風目眩肺痿血痢吐衄崩淋喉腥口臭邪熱諸病局方有龍腦雞蘇丸方莖中虛似蘇葉而微長密齒面皺氣甚辛烈木賊輕發汗退目翳溫微甘苦中空輕揚與麻黃同形性亦能發汗解肌升散火鬱風濕入足厥陰少陽血分益肝膽治目疾退翳膜翳乃肝邪郁遏不能上通於目及疝痛脫肛腸風痔瘻赤痢崩中諸血病浮萍輕發汗利濕辛散輕浮入肺經達皮膚能發揚邪汗丹溪曰浮萍發汗甚於麻黃止瘙癢消渴搗汁服生於水又能下水氣利小便治一切風濕癱瘓浮萍一味蜜丸酒服治三十六種風濃煮汁浴治惡疾瘡癩遍身燒煙闢蚊紫背者良蒼耳子一名枲耳即詩卷耳輕發汗散風濕甘苦性溫善發汗散風濕上通腦頂下行足膝外達皮膚治頭痛目暗齒痛鼻淵肢攣痹痛瘰癧瘡疥採根葉熬名萬應膏遍身瘙癢作浴湯佳去刺酒拌蒸忌豬肉聖惠方云葉搗汁治產後痢天麻宣祛風辛溫入肝經氣分益氣強陰通血脈強筋力疏痰氣治諸風眩掉頭旋眼黑語言不遂風濕𤸷音頑痹小兒驚癇諸風掉眩皆屬肝木肝病不能榮筋故見前症天麻入厥陰而治諸疾肝氣和平諸疾自瘳血液衰少及類中風者忌用風藥能燥血故也昂按風藥中須兼養血藥制其燥也養血藥或兼搜風藥宣其滯也古云治風先治血血行風自滅根類黃瓜莖名赤箭有風不動無風反搖一名定風草明亮堅實者佳濕紙包煨熟切片酒浸一宿焙用秦艽宣去寒濕苦燥濕辛散風去腸胃之熱益肝膽之氣養血榮筋風藥中潤劑散藥中補劑治風寒濕痹經曰風寒濕三氣雜至合而為痹風勝為行痹寒勝為痛痹濕勝為著痹痹在於骨則體重在脈則血澀在筋則拘攣在肉則不仁在皮則寒通身攣急血不榮筋虛勞骨蒸時珍曰手足陽陰經藥兼入肝膽陽明有濕則手足痠痛寒熱有熱則日晡潮熱骨蒸聖惠方治急勞煩熱秦艽柴胡各一兩甘草五錢為末每服三錢治小兒骨蒸潮熱食減瘦弱秦艽炙甘草各一兩每服一二錢錢乙加薄荷五錢疸黃酒毒腸風瀉血口噤牙痛齒下齦屬手陽明大腸經張潔古曰秦艽能去下牙痛及本經風濕濕勝風淫之證利大小便牛乳點服兼治黃疸煩渴便赤形作羅紋相交長大黃白左紋者良菖蒲為使畏牛乳豨薟草宣去風濕苦辛生寒熟溫治肝腎風氣四肢麻痹筋骨冷痛腰膝無力風濕瘡瘍若痹痛由脾腎兩虛陰血不足不由風濕而得者忌服風藥能燥血江東人呼豬為豨其草似豬詠臭故名唐成訥有進豨薟表宋張詠進豨薟表云其草金稜銀線素莖紫荄對節而生頗同蒼耳臣吃百服眼目清明即至千服鬚髮烏黑筋力輕健效驗多端以五月五日六月六日七月七日九月九日採者尤佳去粗莖留枝葉花實酒拌蒸曬九次蜜丸甚益元氣豨薟辛苦氣寒故必蒸曬九次加以酒蜜則苦寒之陰濁盡去而清香之美味見矣數不至九陰濁未盡則不能透骨搜風而卻病也搗汁熬膏以甘草生地煎膏煉蜜三味收之酒調服尤妙威靈仙宣行氣祛風辛泄氣咸泄水本草苦元素甘氣溫屬木其性善走能宣疏五臟通行十二經絡治中風痛風頭風頑痹濕熱流於肢節之間腫屬濕痛屬熱汗多屬風麻屬氣虛木屬濕痰死血十指麻木亦是胃中有濕痰死血脾主四肢故也痛風當分新久新痛屬寒宜辛溫藥久痛屬熱宜清涼藥河間所謂暴病非熱久病非寒是也大法宜順氣清痰搜風散濕養血去瘀為要威靈仙傳曰一人手足不遂數十年遇新羅僧曰得一藥可治入山求之乃威靈仙也服之而愈癥瘕積聚痰水宿膿黃疸浮腫大小腸秘風濕痰氣一切冷痛性極快利積疴不痊者服之有捷效然疏泄真氣弱者慎用和砂仁沙糖醋煎治諸骨哽根叢須數百條長者二尺余色深黑俗名鐵腳威靈仙忌茗麵湯釣藤鉤宣除風熱定驚甘微苦寒除心熱平肝風治大人頭旋目眩小兒驚啼瘛瘲音熾縱筋急而縮為瘛筋緩而弛為瘲伸縮不已為瘛瘲俗謂之搐搦是也客忤胎風發斑疹主肝風相火之病風靜火息則諸證自除相火散行於膽三焦心包有刺類釣鉤藤細多鉤者良純用鉤其功加倍久煎則無力茵芋宣去風濕辛苦微溫有小毒治風濕拘攣痹痛時珍曰古方治風癇有茵芋丸治風痹有茵芋酒治產後風有茵芋膏風濕諸證多用之茵芋石南莽草皆治風妙品近世罕知莽草辛溫有毒治頭風癰腫乳癰疝瘕蘇頌曰古方風濕諸酒多用之今人取葉煎湯熱含治牙蟲喉痹甚效甄權曰不入湯莖赤葉如石榴而短厚莖炙用當歸補血潤燥滑腸甘溫和血辛溫散內苦溫助心散寒諸血屬心凡通脈者必先補心當歸苦溫助心入心肝脾心生血肝藏血脾統血為血中之氣藥治虛勞寒熱咳逆上氣血和則氣降溫瘧厥陰肝邪澼痢便血曰澼頭痛腰痛心腹諸痛散寒和氣風痙無汗痙音擎上聲身強項直角弓反張曰痙無汗為剛痙有汗為柔痙當歸辛散風溫和血產後亦有發痙者以脫血無以養筋也宜十全大補湯痿痹癥瘕筋骨緩縱足不任地曰痿風寒濕客於肌肉血脈曰痹血凝氣聚按之堅硬曰症雖堅硬而聚散無常曰瘕尚未至症也癰疽瘡瘍衝脈為病氣逆裡急帶脈為病腹痛腰溶溶如坐水中衝脈起於腎下出於氣街挾臍上行至胸中上頏顙滲諸陽灌諸經下行入足滲三陰灌諸絡為十二經脈之海主血帶脈橫圍於腰如束帶總約諸脈及婦人諸不足一切血證陰虛而陽無所附者潤腸胃澤皮膚養血生肌血旺則肉長排膿止痛血和則痛止然滑大腸瀉者忌用當歸為君白芍為臣地黃為佐芎藭為使名四物湯治血之總劑血虛佐以人參黃耆血熱佐以條芩梔連血積佐以大黃牽牛昂按血屬陰四物能養陰陰得其養則血自生非四物能生血也若氣虛血弱之人當用人參取陽旺生陰血之義多有過服四物陰滯之藥而反致害者使氣血各有所歸故名血滯能通血虛能補血枯能潤血亂能撫蓋其辛溫能行氣分使氣調而血和也東垣曰頭止血而上行身養血而中守尾破血而下流全活血而不走雷斆海藏並曰頭破血時珍曰治上用頭治中用身治下用尾通治全用一定之理也川產力剛善攻秦產力柔善補以秦產頭園尾多肥潤氣香者良名馬尾當歸尾粗堅枯者名鑱頭當歸只宜發散用治血酒製有痰薑製昂按當歸非治痰藥薑製亦臆說耳畏菖蒲海藻生薑惡濕面芎藭補血潤燥宣行氣搜風辛溫升浮為少陽膽引經入手足厥陰心包肝氣分乃血中氣藥助清陽而開諸郁丹溪曰氣升則鬱自降為通陰陽血氣之使潤肝燥而補肝虛肝以瀉為補所謂辛以散之辛以補之上行頭目下行血海衝脈搜風散瘀止痛調經治風濕在頭血虛頭痛能引血下行頭痛必用之加各引經藥太陽羌活陽明白芷少陽柴胡太陰蒼朮少陰細辛厥陰吳茱萸丹溪曰諸經氣鬱亦能頭痛腹痛脅痛氣鬱血鬱濕瀉血痢寒痹筋攣目淚多涕肝熱風木為病諸風掉眩皆屬肝木及癰疽瘡瘍癰從六腑生疽從五臟生皆陰陽相滯而成氣為陽血為陰血行脈中氣行脈外相併周流寒濕搏之則凝滯而行遲為不及火熱搏之則沸騰而行速為太過氣鬱邪入血中為陰滯於陽血鬱邪入氣中為陽滯於陰致生惡毒然百病皆由此起也芎歸能和血行氣而通陰陽男婦一切血證然香竄辛散能走泄真氣單服久服令人暴亡單服則臟有偏勝久服則過劑生邪故有此失若有配合節制則不至此矣昂按芍地酸寒為陰芎歸辛溫為陽故四物取其相濟以行血藥之滯耳川芎辛散豈能生血者乎治法云驗胎法婦人過經三月用川芎末空心熱湯調服一匙腹中微動者是胎不動者是經閉蜀產為川芎秦產為西芎江南為撫芎以川產大塊里白不油辛甘者勝白芷為使畏黃連硝石滑石惡黃耆山茱萸白芍藥補血瀉肝澀斂陰苦酸微寒入肝脾血分為手足太陰肺脾行經藥瀉肝火酸斂汗肝以斂為瀉以散為補安脾肺固腠理肺主皮毛脾主肌肉肝木不剋土則脾安土旺能生金則肺安脾和肺安則腠理固矣和血脈收陰氣斂逆氣酸主收斂散惡血利小便斂陰生津小便自利非通行之謂也緩中止痛東垣曰經曰損其肝者緩其中即調血也益氣除煩斂汗安胎補勞退熱治瀉痢後重能除胃中濕熱脾虛腹痛瀉痢俱太陰病不可缺此寒瀉冷痛忌用虞天民曰白芍不惟治血虛大能行氣古方治腹痛用白芍四錢甘草二錢名芍藥甘草湯蓋腹痛因營氣不從逆於肉裡白芍能行營氣甘草能斂逆氣又痛為肝木克脾土白芍能伐肝故也天民又曰白芍只治血虛腹痛余不治以其酸寒收斂無溫散之功也心痞脅痛脅者肝膽二經往來之道其火上衝則胃脘痛橫行則兩脅痛白芍能理中瀉肝肺脹喘噫噯同癰腫疝瘕其收降之體又能入血海衝脈為血海男女皆有之而至厥陰肝治鼻衄鼻血曰衄音女六切目澀肝血不足退火益陰肝血自足婦人胎產及一切血病又曰產後忌用丹溪曰以其酸寒伐生髮之氣也必不得已酒炒用之可耳時珍曰產後肝血已虛不可更瀉也寇氏曰減芍藥以避中寒微寒如芍藥古人猶諄諄告誡況大苦大寒可肆行而莫之忌耶同白朮補脾同參耆補氣同歸地補血同芎藭瀉肝同甘草止腹痛同黃連止瀉痢同防風發痘症同薑棗溫經散濕赤芍藥主治略同尤能瀉肝火散惡血治腹痛堅積血痹疝瘕邪聚外腎為疝腹內為瘕經閉腸風癰腫目赤皆散瀉之功白補而收赤散而瀉白益脾能於土中瀉木赤散邪能行血中之滯產後俱忌用赤白各隨花色單瓣者入藥酒炒用制其寒婦人血分醋炒下痢後重不炒惡芒硝石斛畏鱉甲小薊反藜蘆生地黃大瀉火甘苦大寒入心腎瀉丙火小腸為丙火心與小腸相表裡導赤散與木通同用清燥金胃大腸火消瘀通經平諸血逆治吐衄崩中唾血者血隨唾出咯血者隨痰咯出或帶血絲出腎經及肺經自兩脅逆上吐出者屬肝經衄血者血溢於腦從鼻而出咳血者咳出痰內有血並屬肺經吐出嘔出成盆成碗者屬胃經經漏不止曰崩血熱則妄行宜以此涼之虛人忌用用於乾地黃可也傷寒陽強痘症大熱痘症用之甚多本草未載多服損胃生掘鮮者搗汁飲之或用酒製則不傷胃生則寒干則涼熱則溫故分為三條以便施用乾地黃補陰涼血甘苦而寒沉陰而降入手足少陰心腎厥陰心包肝及手太陽經小腸滋陰退陽生血涼血治血虛發熱經曰陰虛生內熱勞傷咳嗽咳嗽陰虛者地黃丸為要藥亦能除痰丹溪曰久病陰火上升津液生痰不生血宜補血以制相火其痰自除痿痹驚悸有觸而心動曰驚無驚而自動曰悸即怔忡也有因心虛火動者有因肝虛膽怯者有因水停心下者火畏水故悸也地黃能交心腎而益肝膽亦能行水故治之吐衄尿血痛為血淋不痛為尿血由心腎氣結或憂思房勞所致多屬虛寒不可專作熱治血暈崩經曰陰虛陽搏謂之崩足下熱痛折跌絕筋生地一斤瓜姜糟一斤生薑四兩炒熟吅奄傷折處冷則易之又生地汁三分酒一升半煮服下撲損瘀血填骨髓長肌肉利大小便調經安胎又能殺蟲治心腹急痛海上方搗汁和麵作䬪飪食能利出蟲忌用鹽本草匯曰丹溪雲氣病補血雖不中病亦無害也不知血藥屬陰其性凝滯若胃虛氣弱之人過服歸地等劑反致痞悶飲食減少變證百出至死不悟豈不惜哉大抵血虛固不可專補其氣而氣虛亦不可徒補其血也凡勞病陽虛宜四君補氣陰虛宜四物補血陰陽俱虛者宜合用名八珍湯江浙生者南方陽氣力微北方生者純陰力大以懷慶肥大菊花心者良酒製則上行外行薑製則不泥膈惡貝母畏蕪荑忌萊菔蔥蒜銅鐵器得酒門冬丹皮當歸良熟地黃平補肝腎養血滋陰甘而微溫入手足少陰厥陰經滋腎水補真陰填骨髓生精血聰耳明目耳為腎竅目為肝竅目得血而能視耳得血而能聰黑髮烏髭治勞傷風痹胎產百病為補血之上劑丹溪曰產前當清熱養血為主產後宜大補氣血為主雖有雜證從未治之昂按丹溪產後大補氣血一語誠至當不易之論後人不善用之多有風寒未解瘀血未盡妄施峻補反致大害者不可不察王碩云男子多陰虛宜熟地女子多血熱宜生地以好酒拌砂仁末浸蒸曬九次用地黃性寒得酒與火與日則溫性泥得砂仁則和氣且能引入丹田六味丸用之為君尺脈弱者加桂附所謂益火之原以消陰翳也尺脈旺者加知柏所謂壯水之主以制陽光也何首烏平補肝腎澀精苦堅腎溫補肝甘益血澀收斂精氣添精益髓養血祛風治風先治血血活則風散強筋骨烏髭發故名首烏令人有子為滋補良藥氣血太和則勞瘦風虛崩帶瘡痔瘰癧癰腫諸病自已營血調則癰腫消赤者外科呼為瘡帚止惡瘧益陰補肝瘧疾要藥而本草不言治瘧時珍曰不寒不燥功在地黃天冬諸藥之上有赤白二種夜則藤交一名六藤有陰陽交合之象赤雄入血分白雌入氣分以大如拳五瓣者良三百年者大如栲栳服之成地仙凡使赤白各半泔浸竹刀刮皮切片用黑豆與首烏拌勻鋪柳甑入砂鍋九蒸九曬用茯苓為使忌諸血無鱗魚萊菔蔥蒜鐵器唐時有何首烏者祖名能嗣父名延秀能嗣五十八尚無妻子服此藥七日而思人道娶妻連生數子延秀服之壽百六十歲首烏又服之壽百三十歲發猶烏黑李翱為立何首烏傳然流傳雖久服者尚少明嘉靖初方士邵應節進七寶美髯丹世宗服之連生皇子遂盛行於世方用赤何首烏各一斤黑豆拌九蒸曬茯苓半斤乳拌當歸枸杞菟絲各半斤俱酒浸牛膝半斤酒浸同首烏第七次蒸至第九次破故紙四兩黑芝麻炒蜜丸並忌鐵器昂按地黃何首烏皆君藥也故六味丸以地黃為君七寶丹以何首烏為君各有配合未可同類而共施也即有加減當各依本方隨病而施損益今人多以何首烏加入地黃丸中合兩方而為一方是一藥二君安所適從乎失制方之本義也牡丹皮瀉伏火而補血辛甘寒微入手足少陰心腎厥陰心包肝瀉血中伏火色丹故入血分時珍曰伏火即陰火也陰火即相火也世人專以黃柏治相火不知丹皮之功更勝故仲景腎氣丸用之和血涼血而生血血熱則枯涼則生破積血積瘀不去則新血不生通經脈為吐衄必用之藥血屬陰本靜因相火所逼故越出上竅治中風五勞驚癇瘛瘲筋脈伸縮抽掣為瘛瘲或手足抽掣口眼喎斜卒然眩僕吐涎身軟時發時止為癇皆陰虛血熱風火相搏痰隨火湧所致除煩熱療癰瘡涼血下胞胎退無汗之骨蒸張元素曰丹皮治無汗之骨蒸地骨皮治有汗之骨蒸神不足者手少陰志不足者足少陰故仲景腎氣丸用丹皮治神志不足也按內經曰水之精為志故腎藏志火之精為神故心藏神單瓣花紅者入藥肉厚者佳酒拌蒸用畏貝母菟絲大黃忌蒜胡荽伏砒時珍曰花白者補赤者利人所罕悟宜分別之續斷補肝腎理筋骨苦溫補腎辛溫補肝能宣通血脈而理筋骨主傷中補不足經疏曰味甘故然暖子宮縮小便破瘀血治腰痛胎漏懷妊瀝血崩帶遺精腸風血痢是齋方平胃散一兩川續斷二錢半每服二錢米飲下治時痢亦驗癰痔腫毒又主金瘡折跌以功命名止痛生肌女科外科需為上劑川產良狀如雞腳皮黃皺節節斷者真去向里硬筋酒浸用地黃為使骨碎補補腎治折傷苦溫補腎故治耳鳴耳鳴必由腎虛及腎虛久瀉研末入豬腎煨熟空心食之腎主二便久瀉多屬腎虛不可專責脾胃也腎主骨故治折傷以功命名粥和敷傷處經曰腎者胃之關也前陰利水後陰利谷牙痛炒黑為末擦牙嚥下亦良又入厥陰心包肝能破血止血入血行傷故治折傷粥和末裹傷處根似姜而扁長去毛用或蜜拌蒸益母草一名茺蔚通行瘀血生新血辛微苦寒入手足厥陰心包肝消水行血去瘀生新調經解毒瘀血去則經調治血風血暈血痛血淋胎痛產難崩中帶下帶脈橫於腰間病生於此故名為帶赤屬血白屬氣氣虛者補中益氣而兼升降血虛者養血滋陰而兼調氣為經產良藥消疔腫乳癰亦取其散瘀解毒通大小便然辛散之藥瞳子散大者忌服益母子主治略同調經益精明目血滯病目者則宜之活血順氣逐風氣行則血行血活則風散行中有補治心煩頭痛血虛血熱之候胎產帶崩令人有子有補陰之功時珍曰益母根莖花葉實皆可同用若治瘡腫胎產消水行血則宜並用若治血分風熱明目調經用子為良蓋根莖花葉專於行子則行中有補也產寶濟陰返魂丹小暑端午或六月六日採益母莖葉花實為末蜜丸治胎產百病近效方搗汁熬膏亦良忌鐵子微炒用澤蘭通行血消水苦泄熱甘和血辛散郁香舒脾入足太陰厥陰脾肝通九竅利關節養血氣長肌肉破宿血調月經消癥瘕散水腫防己為使治產後血瀝腰痛瘀行未盡吐血鼻血目痛頭風癰毒撲損補而不滯行而不峻為女科要藥古方澤蘭丸甚多時珍曰蘭草澤蘭一類二種俱生下濕紫莖素枝赤節綠葉葉對節生有細齒但以莖圓節長葉光有歧者為蘭草莖微方節短葉有毛者為澤蘭嫩時並可挼音那而佩之楚辭所謂紉秋蘭以為佩是也朱文公離騷辨證云必花葉俱香燥濕不變方可刈佩今之蘭蕙花雖香而葉無氣質弱易萎不可刈佩吳人呼為香草俗名孩兒菊夏日採置發中則發不䐈浸油塗發去垢香澤故名澤蘭蘭草走氣分故能利水道除痰癖殺蠱辟惡而為消渴良藥經曰數食肥甘傳為消渴治之以蘭除陳氣也澤蘭走血分故能消水腫塗癰毒破瘀除症而為婦人要藥以為今之山蘭者誤矣防己為使寇宗奭朱丹溪並以蘭草為山蘭之葉李時珍考眾說以譏之按別本云蘭葉甘寒清肺開胃消痰利水解鬱調經閩產者力勝閩產為勝則是建蘭矣李士材云蘭葉稟金水之氣故入肺臟東垣方中嘗用之內經所謂治之以蘭除陳氣者是也余屢驗之李時珍又謂東垣所用乃蘭草也其集諸家之言曰陳遁齋閒覽云楚騷之蘭或以為都梁香或以為澤蘭或以為猗蘭當以澤蘭為正今之所種如麥門冬者名幽蘭非真蘭也故陳止齋著盜蘭說以譏之既名幽蘭正合騷經矣方虛谷訂蘭說言古之蘭草即今之千金草俗名孩兒菊者今之所謂蘭其葉如茅者根名土續斷因花馥郁故得蘭名楊升庵曰世以如蒲萱者為蘭九畹之受誣也久矣又吳草廬有蘭說曰蘭為醫經上品有根有莖草之植者也今所謂蘭無枝無莖因黃山谷稱之世遂謬指為離騷之蘭寇氏本草溺於流俗反疑歸說為非夫醫經為實用豈可誣哉今之蘭果可以利水殺蟲而除痰癖乎其種盛於閩朱子閩人豈不識其土產而辨析若此世俗至今猶以非蘭為蘭何其惑之甚也昂按朱子辨蘭援離騷紉偑以為證竊謂紉偑亦騷人風致之詞耳如所云飲木蘭之墜露餐秋菊之落英豈真露可飲而英可餐乎又云制芰荷以為衣集芙蓉以為裳豈真芰荷可衣芙蓉可裳乎宋儒釋經執泥恐未可為定論也第騷經既言秋蘭則非春蘭明矣本經既言澤蘭則非山蘭明矣是離騷之秋蘭當屬本經之澤蘭無疑也然離騷不嘗曰春蘭兮秋菊乎不又曰結幽蘭而延佇乎不又曰疏石蘭以為芳乎若秋蘭既屬之澤蘭將所謂春蘭幽蘭石蘭者又不得為山蘭當是何等之蘭乎且山蘭為花中最上之品古今評者列之梅菊之前今反屈於孩兒菊之下以為盜襲其名世間至賤之草皆收入本草獨山蘭清芬佳品擯棄不錄何其不幸若斯之甚也本草殺蟲之藥良多皆未必有驗至於行水消痰固山蘭之葉力所優為者也蓋李時珍陳方吳楊輩皆泥定陳藏器以澤蘭蘭草為一類二種遂並騷經而疑之崇澤蘭而黜山蘭遂令蘭草無復有用之者不思若以為一類則本經蘭草一條已屬重出何以本經蘭草反列之上品而澤蘭止為中品乎況一入氣分一入血分迥然不同也又騷經言蘭者凡五除木蘭人所共識其餘春蘭秋蘭幽蘭石蘭若皆以為孩兒菊是不特一類二種且四種一類矣而以為九畹之受誣豈理也哉蓋本經言澤蘭所以別乎山也言蘭草明用葉而不用其花也騷經言秋蘭所以別乎春也言石蘭所以別乎澤也愚謂秋蘭當屬澤蘭而春蘭石蘭定是山蘭其曰幽蘭則山蘭之別名以其生於深山窮谷故也寇氏朱氏之論又安可全非也姑附愚說以咨多識之士白薇瀉血熱苦鹹而寒陰陽沖任之藥利陰氣下水氣主中風身熱支滿忽忽不知人陰虛火旺則內熱主風火氣焚灼故身熱支滿痰隨火湧故不知人血厥汗出過多血少陽氣獨上氣塞不行而厥婦人尤多此證宜白薇湯白薇當歸各一兩參五錢甘草錢半每服五錢熱淋溫瘧洒洒寒熱痠痛寒熱作則營氣不能內營故痠痛婦人傷中淋露血熱千金白薇散治胎前產後遺尿不知時白薇芍藥等分酒調服丹溪曰此即河間所謂熱甚廷孔鬱結神無所依不能收禁之意也廷孔女人溺孔也產虛煩嘔仲景安中益氣竹皮丸用之經疏曰古方調經種子往往用之蓋不孕緣於血熱血少而其源起於真陰不足陽勝而內熱故營血日枯也益陰清熱則血自生旺而有子矣須佐以歸地芍藥杜仲蓯蓉等藥似牛膝而短小柔軟去須酒洗用惡大黃大戟山茱薑棗艾葉宣理氣血燥逐寒濕苦辛生溫熟熱純陽之性能回垂絕之元陽通十二經走三陰太少厥理氣血逐寒濕暖子宮止諸血溫中開鬱調經安胎胎動腰痛下血膠艾湯良阿膠艾葉煎服亦治虛痢治吐衄崩帶治帶要藥腹痛冷痢霍亂轉筋皆理氣血逐寒濕之效殺蛇治癬醋煎外科有用干艾作湯投白礬二三錢洗瘡然後敷藥者蓋人血氣冷必假艾力以佐陽而艾性又能殺蟲也以之灸音九火能透諸經而治百病血熱為病者禁用灸火則氣下行入藥則熱上衝不可過劑丹田氣弱臍腹冷者以熟艾裝袋兜臍腹甚妙寒濕腳氣亦宜以此夾入襪內陳者良揉搗如綿謂之熟艾灸火用婦人丸散醋煮搗餅再為末用入茯苓數片同研則易細煎服宜鮮者苦酒醋也香附為使艾附丸調婦人諸病宋時重湯陰艾自明成化來則以蘄州艾為勝云灸酒罈一灸便透蒙筌發明並以野艾為真蘄艾雖香實非艾種延胡索宣活血利氣辛苦而溫入手足太陰肺脾厥陰心包肝經能行血中氣滯氣中血滯通小便除風痹治氣凝血結上下內外諸痛通則不痛癥瘕崩淋月候不調氣血不和因而凝滯不以時至產後血暈暴血上衝折傷積血疝氣危急為活血利氣第一藥然辛溫走而不守獨用力迅宜兼補氣血藥通經墜胎血熱氣虛者禁用根如半夏肉黃小而堅者良酒炒行血醋炒止血生用破血炒用調血紅花古名紅蘭花通行血潤燥辛苦甘溫入肺經而破瘀血活血瘀行則血活有熱結於中暴吐紫黑血者吐出為好吐未盡加桃仁紅花行之大抵鮮血宜止瘀血宜行潤燥消腫止痛凡血熱血瘀則作腫作痛治經閉便難血運口噤胎死腹中非活血行血不能下痘瘡血熱本草不言治痘喉痹不通又能入心經生新血須兼補益藥為佐使俗用染紅並作胭脂胭脂活血解毒痘疔挑破以油胭脂敷之良少用養血多則行血過用能使血行不止而斃血生於心包藏於肝屬於沖任紅花汁與相類故治血病有產婦血悶而死名醫陸氏以紅花敷十斤煮湯寢婦於上而熏之湯冷再加半日而蘇金匱有紅蘭花酒云治婦人六十二種風茜草通行血色赤入營氣溫行滯味酸走肝而咸走血本經苦寒入厥陰心包肝血分能行血止血能行故能止消瘀通經又能止吐崩尿血消瘀通經酒煎一兩通經甚效治風痹黃疸疸有五黃疸谷疸酒疸黃汗疸女勞疸此蓋蓄血發黃不專於溫熱者也女勞疸必屬腎虛亦不可以濕熱例治當用四物知柏壯其水參術培其氣隨證而加利濕清熱藥崩運撲損痔瘻瘡癤血少者忌用根可染絳忌鐵紫草瀉血熱滑腸甘鹹氣寒入厥陰心包肝血分涼血活血利九竅通二便鹹寒性滑治心腹邪氣即熱也水腫五痘瘑癬惡瘡血熱所致及痘瘡血熱毒盛二便閉澀者血熱則毒閉得紫草涼之則血行而毒出大便利者忌之活幼心書云紫草性寒小兒脾實者可用脾虛者反能作瀉古方惟用茸取其初得陽氣以類觸類用發痘瘡今人不達此理一概用之誤矣瀉者忌用去頭須酒洗凌霄花一名紫葳瀉血熱甘酸而寒入厥陰心包肝血分能去血中伏火破血去瘀生產乳余疾崩帶癥瘕腸結不大便血閉淋閟風癢血熱生風之證女科多用孕婦忌之本經云養胎經疏云破血之藥非所宜也肺癰有用之為君藥者凌霄花為末和密陀僧唾調敷酒齄甚驗藤生花開五瓣黃赤有點不可近鼻嗅之傷腦大小薊瀉涼血甘溫大明曰涼皆能破血下氣行而帶補治吐衄腸癰女子赤白濁安胎涼血之功小薊力微能破瘀生新保精養血退熱補虛不能如大薊之消癰毒丹溪曰小薊治下焦結熱血淋本事方一人冷氣入陰囊腫滿疼痛煎大薊汁服立瘥兩薊相似花如髻大薊莖高而葉皺小薊莖低而葉不皺皆用根三七一名山漆瀉散瘀定痛甘苦微溫散血定痛治吐血衄血血痢血崩目赤癰腫醋磨塗即散已破者為末摻之為金瘡杖瘡要藥杖時先服一二錢則血不衝心杖後敷之去瘀消腫易愈大抵陽明厥陰血分之藥故治血病此藥近時始出軍中恃之從廣西山洞來者略似白芨地黃有節味微甘頗似人參以末摻豬血中血化為水者真近出一種葉似菊艾而勁厚有岐尖莖有赤稜夏秋開黃花蕊如金絲盤紐可愛而氣不香根大如牛蒡味甘極易繁衍云是三七治金瘡折傷血病甚效與南中來者不同地榆澀止血苦酸微寒性沉而澀本草未嘗言澀然能收汗止血皆酸斂之功也入下焦除血熱治吐衄崩中血虛禁用腸風血鮮者為腸風隨感而見也血瘀者為臟毒積久而發也糞前為近血出腸胃糞後為遠血出肺肝血痢蘇頌曰古方斷下多用之寇宗奭曰虛寒瀉痢及初起者忌用蘇頌著本草圖科似柳根外黑裡紅取上截炒黑用梢皮行血得發良惡麥冬蒲黃生滑行血炒澀止血甘平厥陰心包肝血分藥生用性滑行血消瘀通經脈利小便祛心腹膀胱寒熱同五靈脂治心腹血氣痛名失笑散療撲打損傷瘡癤諸腫一婦舌脹滿口以蒲黃頻摻比曉乃愈宋度宗舌脹滿口御醫用蒲黃乾薑末等分搽之愈時珍曰觀此則蒲黃之涼血活血可知矣蓋舌為心苗心包相火乃其臣使得乾薑是陰陽相濟也炒黑性澀止一切血崩帶泄精香蒲花中蕊屑湯成入藥
