front:
  text: 陳序醫學始於內經藥品始於本經藥性之於醫特其一端耳而生殺反掌匪細故也同雷而下考其性正其用廣其數詳其義歷數十百家宜亦無餘蘊矣然皆偏有所長求其詞句雅煉意旨賅明不簡不繁體裁合節者則未之數見也汪子訒庵予之至交也少長宮牆逾壯厭薄制舉遂自逸以老然經史百家靡不殫究而於岐黃之書為尤嗜蓋以刀圭家鮮能探注而養生者又不可以不知也予交訒庵久尊酒論文之暇輒及醫旨殆於其間有玄解乎近以本草一帙示予蓋會蕞諸家而手自裁定者也名曰備要徵序於予予知非以予言為重以予稍解此中意旨耳夫本草大者莫如綱目謂其類多而難窮也小本莫如湯液又未免失之稍略即余小刻醫學五種其一為本草十劑蓋推徐氏之說而擴充之但與方解相表裡而於嬰兒瘍科藥則未之及茲本精於搜逸嚴於樹裁於湯液則補其闕略於綱目則汰其繁蕪益以經疏諸書使義類昭著文約而指博以云備要亶其然乎是書行世則從來諸家別刻皆可廢覽矣嗟乎使訒庵得行其志將躋民生於仁壽其見諸事功者曷止如是今伏處衡茅僅著方書以寄意然其惓惓博濟之心則一也是訒庵之為訒庵也夫眷同學弟陳豐拜撰童序乙已夏武林武蝶生先生言及新安汪訒庵本草備要醫方集解二書簡要易明鄉僻無醫之所與不知醫之人讀之瞭然且卷帙無多行李便於攜帶其中醫方無不神效歷試歷驗洵為有濟於世之書惜坊本舛訛漶漫幾至不能卒讀如能重訂鋟行亦造福不小京江包松溪包美東包子璥諸君子聞之欣然願為重刊而蝶翁遂以仇校自任於是松溪諸君酉居金開雕雕既成有謂方書中精詳而罕傳者頗多此書淺略且已遍行海內家有其書何必多此一舉此蓋泥於海鹽吳遵程之說不知吳氏之成方切用本草從新即因汪氏書而推廣之良足補所未備然例以先河後海之義則汪氏安可忽者擬俟此書工竣即續刊吳氏之書以與汪氏書相輔而行此特先河之義也噫嘻醫豈易言哉病情萬變治不一端近之淺學急求速化往往鈔撮湯頭藥性編寫為歌訣人挾一冊率爾懸壺以性命為嘗試曾有友人偶患腸風以柿乾燒灰飲服而愈醫者驚為奇方紀而錄之不知即載在本草備要柿干注內則是醫家於此二書罕有涉其淺而領其略也遑問其他今之重梓是書正以其淺而易明略而知要以便於人人之用耳若夫高材敏達之士欲廣究醫理之奧則最古之內經難經神農本草經最博之千金外臺諸書俱在原不以淺略域之也抑聞之行遠自邇登高自卑苟由此而尋源竟委以遊灝博而歸於精微為三折肱之良醫登一世於仁壽是二書者又未必非梯航之一助云道光二十五年仲冬月童濂敘於揚州自序醫學之要莫先於切脈脈候不真則虛實莫辨攻補妄施鮮不夭人壽命者其次則當明藥性如病在某經當用某藥或有因此經而旁達他經者是以補母瀉子扶弱抑強義有多端指不一定自非兼貫博通析微洞奧不但呼應不靈或反致邪失正先正云用藥如用兵誠不可以不慎也古今著本草者無慮數百家其中精且詳者莫如李氏綱目考究淵博指示周明所以嘉惠斯人之心良方切至第卷帙浩繁卒難究殫舟車之上攜取為難備則備矣而未能要也他如主治指掌藥性歌賦聊以便初學之誦習要則要矣而未能備也近如蒙筌經疏世稱善本蒙筌附類頗著精義然文拘對偶辭太繁縟而闕略尚多經疏發明主治之理制方參互之義又著簡誤以究其失可謂盡善然未暇詳地道明制治辨真偽解處偶有付會常品時多芟黜均為千慮之一失余非岐黃家而喜讀其書三餘之暇特為諸家本草由博返約取適用者凡四百品匯為小帙某藥入某經治某病必為明其氣味形色所以主治之由間附古人畏惡兼施制防互濟用藥深遠之意而以土產修治畏惡附於後以十劑宣通補瀉冠於前既著其功亦明其過使人開卷瞭然庶幾用之不致舛誤以去備則已備矣以去要則又要矣通敏之士由此而究圖焉醫學之精微可以思過半矣題曰本草備要用以就正於宗工焉休寧訒庵汪昂題於延禧堂增補本草備要自序言之可貴而足以垂後者必性命之文也其次則經濟之文也余於理學既無所窺又六經四子之書燦如星日即漢疏宋注且有遺譏況余愚瞽凡民安敢以管蠡仰測高深也哉性命之文吾無及矣若經濟之文必須見諸實事方能載諸簡編余少困棘闈壯謝制舉長甘蓬虆終鮮通榮經濟之文吾無望焉耳至於詞章詩賦月露風雲縱極精工無裨實用揚子所謂雕蟲篆刻壯夫不為不其然乎竊謂醫藥之書雖無當於文章巨麗之觀然能起人沉疴益人神智弱可令壯郁可使寬無關道脈而能有助剛大之形軀不繫政刑而實有裨生成之大德言不墮綺語之障用有當施濟之仁群居飽食之餘或可以愧小慧而勝猶賢也乎是用寄意此中思以壽世初則謂醫學與堪輿不同堪輿當有秘奧天機不欲輕泄若醫集所以濟生救疾自應無微不闡無隱不彰恣意極言不遣余蘊及泛覽諸書惟靈素難經仲景叔和奧衍宏深不易究殫自唐宋而下名家百氏方書非不燦陳而義蘊殊少詮釋如本草第言治某病某病而不明所以主治之由醫方第云用某藥某藥而不明所以當用之理千書一律開卷茫如即間有辨析病源訓解藥性者率說焉而不詳語焉而不暢醫理雖云深造文字多欠通明難以豁觀者之心目良用憮然不揣固陋爰採諸家之長輯為本草備要醫方集解二篇理法全宗古人體裁更為創制本草則字箋句釋仿傳注之詳明醫療則詮證釋方兼百家之論辨書分兩帙用實相資要令不知醫之人讀之瞭然庶裨實用兩書甫出幸海內名賢頗垂鑑許今本草原刻字已漫滅特再加釐訂用酬世好抑世尚有議余藥味之簡者余惟歌賦湯液藥僅二百四十種拙集廣至四百種不為少矣如食物僅可充口腹僻藥非治所常需者安能盡錄蓋既取其備又欲其要應如是止也茲因重梓更增備而可用者約六十品聊以厭言者之口仍不礙攜者之艱苟小道之可觀倘不至致遠之恐泥也乎康熙甲戌歲陽月休寧八十老人訒庵汪昂書於延禧堂
